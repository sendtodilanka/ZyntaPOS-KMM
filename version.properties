# ─────────────────────────────────────────────────────────────────────────────
# ZyntaPOS Version Configuration
#
# Single source of truth for all version information across the project.
# Both Android (versionCode/versionName) and Desktop (packageVersion) read
# from this file via Gradle. CI pipelines can bump these values automatically.
#
# Versioning scheme: Semantic Versioning (https://semver.org)
#   MAJOR.MINOR.PATCH[-LABEL]
#
#   MAJOR — Incompatible API/schema changes (database migration required)
#   MINOR — New features, backward-compatible
#   PATCH — Bug fixes, backward-compatible
#   LABEL — Optional pre-release label (alpha, beta, rc)
#
# Build number: Auto-incremented integer used as Android versionCode.
#   Bump this on every release build. CI should auto-increment.
# ─────────────────────────────────────────────────────────────────────────────

# Semantic version components
VERSION_MAJOR=1
VERSION_MINOR=0
VERSION_PATCH=0

# Pre-release label (empty for stable releases, e.g. alpha.1, beta.2, rc.1)
VERSION_LABEL=

# Build number — auto-incremented, used as Android versionCode
# Must be a positive integer that increases with every release
VERSION_BUILD=1

# Computed full version string (for reference — actual computation in Gradle)
# VERSION_NAME = 1.0.0
# VERSION_CODE = 1
# Edge case test 2 — full pipeline verification
# rapid-fire push 1
