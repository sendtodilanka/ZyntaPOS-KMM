# ═══════════════════════════════════════════════════════════════════
# ZyntaPOS — PostgreSQL 16 configuration
# Tuned for Contabo Cloud VPS 10: 4 vCPU, 8 GB RAM, NVMe SSD
# ═══════════════════════════════════════════════════════════════════

# ── Memory ─────────────────────────────────────────────────────────
shared_buffers = 512MB              # 25% of total RAM (2 GB would be ideal but leave headroom)
effective_cache_size = 3GB          # Planner estimate of OS + PG cache
work_mem = 16MB                     # Per-sort/hash — 10 connections * 4 ops = ~640 MB peak
maintenance_work_mem = 128MB        # VACUUM, index builds

# ── WAL / Durability ────────────────────────────────────────────────
wal_buffers = 16MB
checkpoint_completion_target = 0.9
wal_compression = on

# ── Connections ─────────────────────────────────────────────────────
max_connections = 50                # HikariCP maxPoolSize(10) × 3 services + headroom

# ── Performance ─────────────────────────────────────────────────────
random_page_cost = 1.1              # NVMe SSD — near-sequential random reads
effective_io_concurrency = 200      # High concurrency for NVMe
default_statistics_target = 100

# ── Logging ─────────────────────────────────────────────────────────
log_min_duration_statement = 1000   # Log queries taking > 1 second
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_checkpoints = on
log_connections = off               # Too noisy for prod
log_disconnections = off
log_lock_waits = on

# ── Locale ─────────────────────────────────────────────────────────
lc_messages = 'en_US.UTF-8'
lc_monetary = 'en_US.UTF-8'
lc_numeric = 'en_US.UTF-8'
lc_time = 'en_US.UTF-8'
