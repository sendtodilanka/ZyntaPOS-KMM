# ═══════════════════════════════════════════════════════════════════
# ZyntaPOS canary nginx config
#
# Routes each request to the correct healthcheck HTML file based on
# the Host header (e.g. Host: api.zyntapos.com → /api.zyntapos.com.html).
# Falls back to index.html for unrecognised hosts.
#
# /ping — lightweight liveness probe used by deploy.yml smoke test
#         and verify.yml workflow. Returns 200 "ok" with the Host name.
# ═══════════════════════════════════════════════════════════════════

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Liveness probe — used by CI smoke tests and monitoring
    location = /ping {
        return 200 "ok";
        add_header Content-Type  "text/plain; charset=utf-8";
        add_header X-Served-By  "$http_host" always;
        add_header Cache-Control "no-store"  always;
    }

    # Route by Host header to per-subdomain canary page
    location / {
        try_files /$http_host.html /index.html =404;
    }
}
