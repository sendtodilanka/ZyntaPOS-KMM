# ZyntaPOS — Compose Compiler Stability Configuration (S-02)
#
# Marks all domain model classes in :shared:domain as stable so the Compose
# compiler can skip recomposition when these types are passed as composable
# parameters and their values haven't changed.
#
# Background: Domain models are immutable `data class` types with only `val`
# properties, but some contain `List<T>` fields which the Compose compiler
# conservatively treats as unstable (Kotlin's stdlib List is not @Stable).
# This config overrides that conservative assumption without pulling Compose
# into the :shared:domain module (which must remain framework-free per ADR-002).
#
# Wildcard `*` matches all classes directly inside the listed package (non-recursive).
# Add sub-packages explicitly if needed.

com.zyntasolutions.zyntapos.domain.model.*
