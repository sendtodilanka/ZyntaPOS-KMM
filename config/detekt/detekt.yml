# ============================================================
# ZyntaPOS — Detekt Configuration
# Builds upon the default ruleset and customises for a
# Compose Multiplatform / KMM project.
# ============================================================
#
# Phase 1: Lenient thresholds to unblock CI during rapid feature development
# Phase 2 gate: Before Phase 2 merge, promote warningsAsErrors to true and tighten thresholds
# Phase 2 targets: LongMethod ≤ 80, LongParameterList ≤ 6, CyclomaticComplexity ≤ 15
#
# ============================================================

config:
  validation: true
  warningsAsErrors: false          # Phase 1: warnings only; Phase 2: promote to errors

# ── Style ───────────────────────────────────────────────────────
style:
  WildcardImport:
    active: true
    excludeImports:
      # Compose framework packages that are idiomatic to wildcard-import
      - 'androidx.compose.animation.*'
      - 'androidx.compose.animation.core.*'
      - 'androidx.compose.foundation.*'
      - 'androidx.compose.foundation.layout.*'
      - 'androidx.compose.foundation.lazy.*'
      - 'androidx.compose.foundation.lazy.grid.*'
      - 'androidx.compose.material.icons.*'
      - 'androidx.compose.material.icons.filled.*'
      - 'androidx.compose.material.icons.outlined.*'
      - 'androidx.compose.material3.*'
      - 'androidx.compose.runtime.*'
      - 'androidx.compose.ui.*'
      - 'androidx.compose.ui.unit.*'
  MaxLineLength:
    active: true
    maxLineLength: 150             # Compose DSL chains and SQL mappers often exceed 120
    excludeCommentStatements: true
    excludeRawStrings: true
    excludeImportStatements: true
  MagicNumber:
    active: false                  # too noisy for UI code with dp/sp literals
  ReturnCount:
    active: false                  # Compose screens legitimately use early returns
  ForbiddenComment:
    active: false                  # TODO/FIXME are acceptable during active development
  NewLineAtEndOfFile:
    active: false                  # auto-formatting handles this; not worth failing CI
  MatchingDeclarationName:
    active: false                  # Compose files often have a public enum/sealed + @Composable
  # Enabled in Phase 1 hardening (2026-02-25). Suppress per-file with @Suppress if needed.
  UnusedPrivateProperty:
    active: true
    allowedNames: '_|ignored|expected|serialVersionUID'
  UnusedParameter:
    active: true
    allowedNames: '_|ignored|expected'
  # Architecture boundary enforcement (ADR-001, ADR-002, ADR-003)
  # These forbidden imports flag violations of Clean Architecture layering.
  # The rules are scoped to the domain source set by excluding all non-domain paths.
  # False positives in data/security/feature modules are suppressed by the excludes below.
  ForbiddenImport:
    active: true
    imports:
      - value: 'com.zyntasolutions.zyntapos.data.*'
        reason: 'Domain layer must not import from the data layer (Clean Architecture — see CLAUDE.md)'
      - value: 'com.zyntasolutions.zyntapos.hal.*'
        reason: 'Domain layer must not import hardware abstractions (Clean Architecture — see CLAUDE.md)'
      - value: 'com.zyntasolutions.zyntapos.security.*'
        reason: 'Domain layer must not import security primitives directly; use SecureStoragePort (ADR-003)'
    excludes:
      # Exclude non-domain modules where these imports are legitimate.
      # Only :shared:domain (i.e., shared/domain/**) is the enforced boundary.
      - '**/data/**'
      - '**/feature/**'
      - '**/navigation/**'
      - '**/designsystem/**'
      - '**/composeApp/**'
      - '**/androidApp/**'
      - '**/tools/**'
      - '**/seed/**'
      - '**/hal/**'
      - '**/security/**'
      - '**/core/**'

# ── Complexity ──────────────────────────────────────────────────
complexity:
  LongMethod:
    active: true
    threshold: 200                 # Composable screens are naturally long; revisit in Phase 2
  CyclomaticComplexMethod:
    active: true
    threshold: 60                  # ViewModel when-blocks with many intents; revisit in Phase 2
  LargeClass:
    active: true
    threshold: 600
  TooManyFunctions:
    active: false                  # Extension-file patterns generate false positives
  LongParameterList:
    active: true
    functionThreshold: 15          # Compose functions pass many params (state, callbacks, modifiers)
    constructorThreshold: 15       # ViewModels inject many use cases via constructor
    ignoreDefaultParameters: true
    ignoreAnnotated:
      - 'Composable'
  ComplexCondition:
    active: true
    allowedConditions: 5

# ── Naming ──────────────────────────────────────────────────────
naming:
  FunctionNaming:
    active: true
    excludes:
      - '**/designsystem/**'       # Composable functions use PascalCase by convention
      - '**/feature/**'            # Screen composables are PascalCase
      - '**/navigation/**'         # NavGraph composables are PascalCase
      - '**/App.kt'                # App() composable
    functionPattern: '[a-z][a-zA-Z0-9]*'
  TopLevelPropertyNaming:
    active: true
    constantPattern: '[A-Z][A-Za-z0-9_]*'
    propertyPattern: '[A-Za-z][A-Za-z0-9_]*'
  VariableNaming:
    active: true
    variablePattern: '[a-zA-Z][A-Za-z0-9_]*'  # allow UPPER_CASE for ESC/POS byte constants
    excludes:
      - '**/printer/**'            # ESC/POS command bytes use CMD_* naming
      - '**/reports/printer/**'

# ── Potential Bugs ──────────────────────────────────────────────
potential-bugs:
  UnsafeCast:
    active: true
  UselessPostfixExpression:
    active: true
  UseCheckOrError:
    active: false                  # Result.kt and DatabaseKeyProvider use throw for cross-platform compat

# ── Performance ─────────────────────────────────────────────────
performance:
  SpreadOperator:
    active: false                  # used idiomatically in Compose modifier chains

# ── Exceptions ──────────────────────────────────────────────────
exceptions:
  TooGenericExceptionCaught:
    active: true
    exceptionNames:
      - 'Error'
      - 'Throwable'
    allowedExceptionNameRegex: '_'
  TooGenericExceptionThrown:
    active: false                  # repository / exporter layers wrap platform exceptions
  SwallowedException:
    active: true
    ignoredExceptionTypes:
      - 'InterruptedException'
      - 'MalformedURLException'
      - 'NumberFormatException'
      - 'ParseException'
    allowedExceptionNameRegex: '_|(ignore|expected).*'
  ThrowsCount:
    active: false                  # API service error mapping legitimately throws per status code

# ── Empty Blocks ────────────────────────────────────────────────
empty-blocks:
  EmptyFunctionBlock:
    active: true
    ignoreOverridden: true

# ── Coroutines ──────────────────────────────────────────────────
coroutines:
  GlobalCoroutineUsage:
    active: true
