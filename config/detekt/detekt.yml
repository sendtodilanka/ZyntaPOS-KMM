# ============================================================
# ZyntaPOS — Detekt Configuration
# Builds upon the default ruleset and customises for a
# Compose Multiplatform / KMM project.
# ============================================================
#
# Phase 1: Lenient thresholds to unblock CI during rapid feature development
# Phase 2 gate: Before Phase 2 merge, promote warningsAsErrors to true and tighten thresholds
# Phase 2 targets: LongMethod ≤ 80, LongParameterList ≤ 6, CyclomaticComplexity ≤ 15
#
# ============================================================

config:
  validation: true
  warningsAsErrors: false          # Phase 1: warnings only; Phase 2: promote to errors

# ── Style ───────────────────────────────────────────────────────
style:
  WildcardImport:
    active: true
    excludeImports:
      # Compose framework packages that are idiomatic to wildcard-import
      - 'androidx.compose.animation.*'
      - 'androidx.compose.animation.core.*'
      - 'androidx.compose.foundation.*'
      - 'androidx.compose.foundation.layout.*'
      - 'androidx.compose.foundation.lazy.*'
      - 'androidx.compose.foundation.lazy.grid.*'
      - 'androidx.compose.material.icons.*'
      - 'androidx.compose.material.icons.filled.*'
      - 'androidx.compose.material.icons.outlined.*'
      - 'androidx.compose.material3.*'
      - 'androidx.compose.runtime.*'
      - 'androidx.compose.ui.*'
      - 'androidx.compose.ui.unit.*'
  MaxLineLength:
    active: true
    maxLineLength: 150             # Compose DSL chains and SQL mappers often exceed 120
    excludeCommentStatements: true
    excludeRawStrings: true
    excludeImportStatements: true
    excludes:
      # Compose screen and UI component files have long DSL chains (parameter lists, modifier
      # chains, string resource access) that are structurally impossible to keep under 150
      # chars without sacrificing readability.
      - '**/*Screen.kt'
      - '**/*Dialog.kt'
      - '**/components/**/*.kt'
      - '**/designsystem/**/*.kt'
      # Test stub implementations frequently exceed 150 chars due to fully-qualified type
      # names in override signatures and single-expression stubs.
      - '**/*Test.kt'
      - '**/*Spec.kt'
      # String resource table — entries are key-value pairs; splitting them reduces
      # readability without improving code quality.
      - '**/i18n/EnglishStrings.kt'
  MagicNumber:
    active: false                  # too noisy for UI code with dp/sp literals
  ReturnCount:
    active: false                  # Compose screens legitimately use early returns
  ForbiddenComment:
    active: false                  # TODO/FIXME are acceptable during active development
  NewLineAtEndOfFile:
    active: false                  # auto-formatting handles this; not worth failing CI
  # MatchingDeclarationName moved to naming ruleset (where it belongs in Detekt 1.23.x)
  # Enabled in Phase 1 hardening (2026-02-25). Suppress per-file with @Suppress if needed.
  UnusedPrivateMember:
    active: true
    ignoreAnnotated:
      - 'Preview'
      - 'androidx.compose.ui.tooling.preview.Preview'
      - 'androidx.compose.ui.tooling.preview.PreviewParameter'
  UnusedPrivateProperty:
    active: true
    allowedNames: '_.*|ignored|expected|serialVersionUID'
    excludes:
      - '**/theme/**'              # ZyntaColors palette — intentional full color system definitions
  UnusedParameter:
    active: true
    allowedNames: '_.*|ignored|expected'
    ignoreAnnotated:
      - 'Composable'               # Composable API params may be unused in scaffold implementations
  # Architecture boundary enforcement (ADR-001, ADR-002, ADR-003)
  # These forbidden imports flag violations of Clean Architecture layering.
  # The rules are scoped to the domain source set by excluding all non-domain paths.
  # False positives in data/security/feature modules are suppressed by the excludes below.
  ForbiddenMethodCall:
    active: true
    methods:
      - reason: 'Use ProcessBuilder with explicit arguments instead'
        value: 'java.lang.Runtime.exec'
      - reason: 'Use ProcessBuilder with explicit arguments instead'
        value: 'java.lang.Runtime.exec(String)'
      - reason: 'Use ProcessBuilder with explicit arguments instead'
        value: 'java.lang.Runtime.exec(Array<String>)'
      - reason: 'Native library loading is forbidden in application code'
        value: 'java.lang.System.loadLibrary'
      - reason: 'Java deserialization is forbidden; use kotlinx-serialization'
        value: 'java.io.ObjectInputStream.readObject'
      - reason: 'Avoid Thread.sleep; use coroutine delay instead'
        value: 'java.lang.Thread.sleep'
  ForbiddenImport:
    active: true
    imports:
      - value: 'com.zyntasolutions.zyntapos.data.*'
        reason: 'Domain layer must not import from the data layer (Clean Architecture — see CLAUDE.md)'
      - value: 'com.zyntasolutions.zyntapos.hal.*'
        reason: 'Domain layer must not import hardware abstractions (Clean Architecture — see CLAUDE.md)'
      - value: 'com.zyntasolutions.zyntapos.security.*'
        reason: 'Domain layer must not import security primitives directly; use SecureStoragePort (ADR-003)'
    excludes:
      # Exclude non-domain modules where these imports are legitimate.
      # Only :shared:domain (i.e., shared/domain/**) is the enforced boundary.
      - '**/data/**'
      - '**/feature/**'
      - '**/navigation/**'
      - '**/designsystem/**'
      - '**/composeApp/**'
      - '**/androidApp/**'
      - '**/tools/**'
      - '**/seed/**'
      - '**/hal/**'
      - '**/security/**'
      - '**/core/**'

# ── Complexity ──────────────────────────────────────────────────
complexity:
  LongMethod:
    active: true
    threshold: 200                 # Composable screens are naturally long; revisit in Phase 2
    ignoreAnnotated:
      - 'Composable'               # Compose screens are naturally long — see CLAUDE.md Phase 1
    excludes:
      - '**/navigation/**'         # NavGraph builder functions enumerate all destinations — inherently long
  CyclomaticComplexMethod:
    active: true
    threshold: 150                 # Phase 1: handleIntent when-blocks; tighten to 15 in Phase 2

  LargeClass:
    active: true
    threshold: 1500                # Phase 1: revisit in Phase 2
  TooManyFunctions:
    active: false                  # Extension-file patterns generate false positives
  LongParameterList:
    active: true
    functionThreshold: 15          # Compose functions pass many params (state, callbacks, modifiers)
    constructorThreshold: 30       # Phase 1: ViewModels inject many use cases; tighten in Phase 2
    ignoreDefaultParameters: true
    ignoreAnnotated:
      - 'Composable'
  ComplexCondition:
    active: true
    threshold: 5
  NestedBlockDepth:
    active: true
    threshold: 8                   # Phase 1: MVVM best-effort patterns can nest deeply

# ── Naming ──────────────────────────────────────────────────────
naming:
  MatchingDeclarationName:
    active: false                  # Compose files often have a public enum/sealed + @Composable in one file
  FunctionNaming:
    active: true
    excludes:
      - '**/designsystem/**'       # Composable functions use PascalCase by convention
      - '**/feature/**'            # Screen composables are PascalCase
      - '**/navigation/**'         # NavGraph composables are PascalCase
      - '**/App.kt'                # App() composable
      - '**/tools/**'          # Debug console composables use PascalCase by convention
    functionPattern: '[a-z][a-zA-Z0-9]*'
  ConstructorParameterNaming:
    active: true
    parameterPattern: '_?[a-z][A-Za-z0-9]*'         # allow _ prefix for scaffold/unused constructor params
    privateParameterPattern: '_?[a-z][A-Za-z0-9]*'  # allow _ prefix for private constructor params
  FunctionParameterNaming:
    active: true
    parameterPattern: '_?[a-z][A-Za-z0-9]*'   # allow _ prefix for explicitly unused function params
  TopLevelPropertyNaming:
    active: true
    constantPattern: '_?[A-Z][A-Za-z0-9_]*'   # allow _ prefix for unused scaffold constants
    propertyPattern: '[A-Za-z][A-Za-z0-9_]*'
  VariableNaming:
    active: true
    variablePattern: '_?[a-zA-Z][A-Za-z0-9_]*'  # allow _ prefix + UPPER_CASE for ESC/POS bytes
    excludes:
      - '**/printer/**'            # ESC/POS command bytes use CMD_* naming
      - '**/reports/printer/**'

# ── Potential Bugs ──────────────────────────────────────────────
potential-bugs:
  UnsafeCast:
    active: true
  UselessPostfixExpression:
    active: true
  # UseCheckOrError removed — rule was dropped from Detekt 1.23.x

# ── Performance ─────────────────────────────────────────────────
performance:
  SpreadOperator:
    active: false                  # used idiomatically in Compose modifier chains

# ── Exceptions ──────────────────────────────────────────────────
exceptions:
  TooGenericExceptionCaught:
    active: true
    exceptionNames:
      - 'Error'
      - 'Throwable'
    allowedExceptionNameRegex: '_'
  TooGenericExceptionThrown:
    active: false                  # repository / exporter layers wrap platform exceptions
  SwallowedException:
    active: false              # Phase 1: re-enable in Phase 2 after audit
  # ThrowsCount removed — rule was dropped from Detekt 1.23.x exceptions ruleset

# ── Empty Blocks ────────────────────────────────────────────────
empty-blocks:
  EmptyFunctionBlock:
    active: true
    ignoreOverridden: true

# ── Coroutines ──────────────────────────────────────────────────
coroutines:
  GlobalCoroutineUsage:
    active: true
