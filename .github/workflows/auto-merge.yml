name: Branch CI → Auto PR → Auto Merge

# ─────────────────────────────────────────────────────────────────────────────
# AUTONOMOUS COMMIT-TO-MAIN PIPELINE
#
# Every push to a non-main/develop branch goes through three stages:
#
#   Stage 1 — validate   Run the exact same CI gates as ci.yml:
#                         build + lint + detekt + tests.
#                         If anything fails, the pipeline stops here.
#                         Main is never touched.
#
#   Stage 2 — auto-pr    Only runs if Stage 1 is fully green.
#                         Creates a PR targeting main (or reuses an open one).
#                         Enables GitHub's native auto-merge (squash + delete
#                         branch).  Uses PAT_TOKEN so that ci.yml is triggered
#                         on the PR (GITHUB_TOKEN cannot do this).
#
#   Stage 3 — ci.yml     GitHub triggers ci.yml on the new PR automatically.
#                         This is the FINAL safety gate.  Auto-merge only
#                         executes once ALL required status checks pass and the
#                         branch is up-to-date with main.
#
# ── Prerequisites ────────────────────────────────────────────────────────────
#
#   IMPORTANT: This repository MUST be PUBLIC for CI to work without
#   exhausting the 2000 free-plan minutes (private repos use metered minutes;
#   macOS release runners at 10× multiplier drain the quota in hours).
#   Public repos get unlimited GitHub Actions minutes on the free plan.
#
# ── One-time GitHub repo setup (do this once in the web UI) ──────────────────
#
#   1. Settings → General → Pull Requests
#      ✅ Allow auto-merge
#
#   2. Settings → Branches → Add branch protection rule for "main"
#      ✅ Require a pull request before merging
#      ✅ Require status checks to pass before merging
#         → Add check: "Build & Test"   (job name from ci.yml)
#      ✅ Require branches to be up to date before merging
#      ✅ Do not allow bypassing the above settings
#
#   3. Settings → Secrets and variables → Actions → New repository secret
#      Name:  PAT_TOKEN
#      Value: a Personal Access Token with "repo" scope
#      (GitHub → top-right avatar → Settings → Developer settings →
#       Personal access tokens → Tokens (classic) → Generate new token)
#      This is required because GITHUB_TOKEN cannot trigger ci.yml on the PR.
#
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - 'feature/**'
      - 'fix/**'
      - 'hotfix/**'
      - 'chore/**'
      - 'refactor/**'
      - 'docs/**'
      - 'claude/**'
      - 'test/**'
      - 'build/**'
      - 'ci/**'
      - 'perf/**'
      - 'style/**'

# Default permissions for the validate job (read-only).
# The auto-pr job overrides these with the scopes it needs.
permissions:
  contents: read

# Cancel an in-progress run for the same branch when a newer push arrives.
# This prevents stale runs from creating duplicate PRs or racing to merge.
# IMPORTANT: Only the validate job is cancelled. The auto-pr job must NOT
# be cancelled mid-flight or it may leave a PR without auto-merge enabled.
# The `needs: validate` dependency ensures auto-pr only starts when validate
# fully succeeds, so cancelling before auto-pr starts is always safe.
concurrency:
  group: branch-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # Stage 1 — Validate
  #
  # Mirrors ci.yml exactly so the same failures that would block a PR also
  # block PR creation.  Keeping both in sync is intentional — if ci.yml
  # changes, update this job to match.
  # ════════════════════════════════════════════════════════════════════════════
  validate:
    name: Build & Test (pre-merge)
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── Java ────────────────────────────────────────────────────────────────
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      # ── Override daemon JVM to use the CI JDK (avoids foojay.io download) ──
      - name: Point org.gradle.java.home to CI JDK
        run: echo "org.gradle.java.home=$JAVA_HOME" >> gradle.properties

      # ── Gradle ──────────────────────────────────────────────────────────────
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false   # always write cache on feature branches

      # ── Secrets / local.properties ──────────────────────────────────────────
      - name: Create local.properties from dev template
        run: ./scripts/setup-local-properties.sh

      # ── Shared Modules ──────────────────────────────────────────────────────
      - name: Build :shared:core (JVM)
        run: ./gradlew :shared:core:jvmJar --stacktrace

      - name: Build :shared:domain (JVM)
        run: ./gradlew :shared:domain:jvmJar --stacktrace

      - name: Build :shared:data (JVM)
        run: ./gradlew :shared:data:jvmJar --stacktrace

      - name: Build :shared:hal (JVM)
        run: ./gradlew :shared:hal:jvmJar --stacktrace

      - name: Build :shared:security (JVM)
        run: ./gradlew :shared:security:jvmJar --stacktrace

      # ── Android ─────────────────────────────────────────────────────────────
      - name: Build Android debug APK
        run: ./gradlew :androidApp:assembleDebug --stacktrace

      # ── Desktop ─────────────────────────────────────────────────────────────
      - name: Build Desktop JVM JAR
        run: ./gradlew :composeApp:jvmJar --stacktrace

      # ── Lint ────────────────────────────────────────────────────────────────
      - name: Run Android Lint (debug)
        run: ./gradlew :androidApp:lintDebug --stacktrace

      - name: Run Detekt (static analysis)
        run: ./gradlew detekt --stacktrace

      # ── Tests ───────────────────────────────────────────────────────────────
      - name: Run all tests (JVM targets)
        run: ./gradlew allTests --stacktrace --continue

      # ── Artifacts ───────────────────────────────────────────────────────────
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pre-merge-test-reports-${{ github.run_id }}
          path: '**/build/reports/tests/'
          retention-days: 3

      - name: Upload lint & Detekt reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pre-merge-lint-reports-${{ github.run_id }}
          path: |
            **/build/reports/lint-results*.html
            **/build/reports/detekt/
          retention-days: 3

  # ════════════════════════════════════════════════════════════════════════════
  # Stage 2 — Auto PR + Auto Merge
  #
  # Runs only when validate is fully green.
  # Creates the PR with PAT_TOKEN so that ci.yml fires on the pull_request
  # event (GITHUB_TOKEN is blocked from triggering subsequent workflows).
  # Auto-merge is enabled with --squash so main history stays linear.
  # Branch is deleted automatically after merge.
  # ════════════════════════════════════════════════════════════════════════════
  auto-pr:
    name: Create PR & Enable Auto-Merge
    needs: validate
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Derive a human-readable PR title from the branch name ───────────────
      # e.g.  feature/add-hold-order   →  "add hold order"
      #        fix/M12-cart-rounding    →  "M12 cart rounding"
      #        claude/fix-workflows-abc →  "fix workflows abc"
      - name: Derive PR title
        id: title
        run: |
          BRANCH="${{ github.ref_name }}"
          # Strip the type prefix (everything up to and including the first /)
          TITLE="${BRANCH#*/}"
          # Replace hyphens and underscores with spaces
          TITLE="${TITLE//-/ }"
          TITLE="${TITLE//_/ }"
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"

      # ── Create PR (or reuse an open one) ────────────────────────────────────
      # PAT_TOKEN is used here so GitHub fires ci.yml on the PR.
      # If PAT_TOKEN is not set, fall back to GITHUB_TOKEN with a warning
      # (ci.yml will NOT be triggered automatically in fallback mode).
      - name: Create PR (skip if already open)
        id: pr
        env:
          # Prefer PAT_TOKEN; fall back to GITHUB_TOKEN with a warning.
          # SECURITY: Pass secrets via env vars — never interpolate them
          # directly into bash with ${{ secrets.X }} inside run: blocks,
          # as that embeds the value into the shell command string.
          GH_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          # Expose whether PAT_TOKEN was provided so bash can check without
          # interpolating the secret value into the script source.
          HAS_PAT_TOKEN: ${{ secrets.PAT_TOKEN != '' }}
        run: |
          BRANCH="${{ github.ref_name }}"
          TOKEN_TYPE="PAT_TOKEN"
          if [ "$HAS_PAT_TOKEN" != "true" ]; then
            TOKEN_TYPE="GITHUB_TOKEN (fallback — ci.yml may not auto-trigger on PR)"
            echo "::warning::PAT_TOKEN secret is not set. Using GITHUB_TOKEN fallback."
            echo "::warning::ci.yml will NOT be triggered automatically on the PR."
            echo "::warning::Set PAT_TOKEN (repo scope) to enable fully autonomous merging."
          fi
          echo "Using token type: $TOKEN_TYPE"

          # Reuse existing open PR for this branch if one exists
          EXISTING=$(gh pr list \
            --head "$BRANCH" \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number // empty' 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already open for branch $BRANCH — skipping create"
            echo "pr_number=$EXISTING" >> "$GITHUB_OUTPUT"
          else
            # Write PR body to a temp file to avoid shell-quoting issues
            {
              echo "## Automated PR"
              echo ""
              echo "Branch CI (Stage 1) passed before this PR was created."
              echo ""
              echo "**Pre-merge checks (branch CI):**"
              echo "- Build — shared modules (core, domain, data, hal, security)"
              echo "- Build — Android debug APK"
              echo "- Build — Desktop JVM JAR"
              echo "- Android Lint"
              echo "- Detekt static analysis"
              echo "- All JVM tests"
              echo ""
              echo "**What happens next:**"
              echo "\`ci.yml\` runs on this PR (the final safety gate). When all required status"
              echo "checks pass and the branch is up to date with \`main\`, GitHub will"
              echo "automatically squash-merge and delete the source branch. No human action"
              echo "needed."
              echo ""
              printf "> Triggered by \`%s\` — @%s\n" \
                "${{ github.sha }}" "${{ github.actor }}"
            } > /tmp/pr_body.md

            PR_URL=$(gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "${{ steps.title.outputs.title }}" \
              --body-file /tmp/pr_body.md)

            PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
            echo "Created PR #$PR_NUMBER → $PR_URL"
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          fi

      # ── Enable auto-merge ───────────────────────────────────────────────────
      # --squash   keeps main history linear (one commit per PR)
      # --delete-branch  cleans up the source branch after merge
      # --auto     the actual merge only fires once ALL required checks pass
      #
      # continue-on-error: true prevents a circular deadlock where a failed
      # enable-auto-merge step marks this job as failed, which marks the PR as
      # "unstable", which causes the next run to fail again with the same error.
      # If auto-merge cannot be enabled, the PR stays open and can be merged
      # manually once CI passes.
      - name: Enable auto-merge (squash + delete branch on merge)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          # Skip if already enabled (idempotent)
          EXISTING=$(gh pr view "${{ steps.pr.outputs.pr_number }}" \
            --json autoMergeRequest --jq '.autoMergeRequest // empty' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "Auto-merge already enabled on PR #${{ steps.pr.outputs.pr_number }} — skipping"
            exit 0
          fi
          gh pr merge "${{ steps.pr.outputs.pr_number }}" \
            --auto \
            --squash \
            --delete-branch
          echo "Auto-merge enabled on PR #${{ steps.pr.outputs.pr_number }}"

      # ── Step Summary ────────────────────────────────────────────────────────
      - name: Write pipeline summary
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr view "${{ steps.pr.outputs.pr_number }}" \
            --json url --jq '.url' 2>/dev/null || \
            echo "https://github.com/${{ github.repository }}/pull/${{ steps.pr.outputs.pr_number }}")

          {
            echo "## Branch CI → Auto-PR → Auto-Merge"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Branch** | \`${{ github.ref_name }}\` |"
            echo "| **Commit** | \`${{ github.sha }}\` |"
            echo "| **Actor** | @${{ github.actor }} |"
            echo "| **PR** | [#${{ steps.pr.outputs.pr_number }}]($PR_URL) |"
            echo "| **Stage 1 (branch CI)** | ✅ Passed |"
            echo "| **Stage 2 (auto-merge)** | ✅ Enabled — squash into \`main\` |"
            echo "| **Branch after merge** | Deleted automatically |"
            echo ""
            echo "### Next"
            echo "GitHub is running \`ci.yml\` on the PR now."
            echo "The PR will be squash-merged into \`main\` automatically once"
            echo "all required status checks pass."
          } >> "$GITHUB_STEP_SUMMARY"
