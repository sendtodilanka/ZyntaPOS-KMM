name: Setup Uptime Kuma Monitors

on:
  workflow_dispatch:
    inputs:
      kuma_password:
        description: 'Uptime Kuma admin password (required for first-time setup or reset)'
        required: true
      kuma_username:
        description: 'Uptime Kuma admin username'
        required: false
        default: 'admin'
      reset_monitors:
        description: 'Delete all existing monitors before creating new ones'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      discord_webhook_url:
        description: 'Discord webhook URL for alert notifications (optional)'
        required: false
        default: ''
      alert_email:
        description: 'Email address for alert notifications (optional)'
        required: false
        default: ''

jobs:
  setup-uptime-kuma:
    name: "Configure Uptime Kuma Monitors"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Uptime Kuma via VPS SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_USER_KEY }}
          envs: KUMA_USERNAME,KUMA_PASSWORD,RESET_MONITORS,DISCORD_WEBHOOK_URL,ALERT_EMAIL
          script: |
            set -euo pipefail
            CONTAINER="zyntapos_uptime_kuma"

            echo "=== Uptime Kuma Setup — $(date -u +%Y%m%dT%H%M%SZ) ==="

            # ── Container running check ───────────────────────────────────────────
            CSTATUS=$(docker inspect "$CONTAINER" --format='{{.State.Status}}' 2>/dev/null || echo "not_found")
            if [[ "$CSTATUS" != "running" ]]; then
              echo "ERROR: $CONTAINER not running (status=$CSTATUS)" >&2
              docker ps --filter name=kuma || true
              exit 1
            fi
            echo "Container $CONTAINER: $CSTATUS"

            # ── Wait for Uptime Kuma HTTP ready (runs inside container) ───────────
            echo "--- Waiting for HTTP ready..."
            for i in $(seq 1 24); do
              docker exec "$CONTAINER" curl -fsS --max-time 3 http://localhost:3001/api/info > /dev/null 2>&1 \
                && { echo "    Ready (attempt $i)"; break; }
              echo "    Not ready (attempt $i/24), waiting 5s..."
              sleep 5
              [ "$i" -eq 24 ] && { echo "ERROR: Not ready after 120s" >&2; docker logs --tail=20 "$CONTAINER"; exit 1; }
            done

            # ── Install socket.io-client@4 in container if needed ────────────────
            echo "--- Checking socket.io-client..."
            SIO_OK=$(docker exec "$CONTAINER" node -e \
              "try{require('/app/node_modules/socket.io-client');process.stdout.write('yes');}catch(e){process.stdout.write('no');}" \
              2>/dev/null || echo "no")

            if [[ "$SIO_OK" != "yes" ]]; then
              echo "    Not found in /app/node_modules — installing in /tmp/sio..."
              docker exec "$CONTAINER" sh -c \
                'mkdir -p /tmp/sio && cd /tmp/sio && npm init -y > /dev/null 2>&1 && npm install socket.io-client@4 --no-audit --no-fund --save > /dev/null 2>&1 && echo "    Installed"'
            else
              echo "    Found in /app/node_modules"
            fi

            # ── Clear accumulated monitors from DB + restart for clean state ───
            echo "--- Clearing monitors table and restarting Uptime Kuma..."
            docker exec "$CONTAINER" sqlite3 /app/data/kuma.db \
              "DELETE FROM monitor; DELETE FROM heartbeat; DELETE FROM monitor_tls_info;" \
              2>/dev/null || echo "    (sqlite3 not available — skipping DB clear)"
            docker restart "$CONTAINER" > /dev/null
            echo "    Restarted — waiting for HTTP ready..."
            sleep 5
            for i in $(seq 1 24); do
              docker exec "$CONTAINER" curl -fsS --max-time 3 http://localhost:3001/api/info > /dev/null 2>&1 \
                && { echo "    Ready after restart (attempt $i)"; break; }
              sleep 5
              [ "$i" -eq 24 ] && { echo "ERROR: Not ready after restart" >&2; exit 1; }
            done

            # ── Write monitor setup script then copy into container ──────────────
            echo "--- Writing setup script..."
            cat > /tmp/kuma_setup.js << 'JSEOF'
            'use strict';
            const SIO_PATHS = [
              '/app/node_modules/socket.io-client',
              '/tmp/sio/node_modules/socket.io-client'
            ];
            let ioFn;
            for (const p of SIO_PATHS) {
              try { ioFn = require(p).io; if (ioFn) break; } catch (_) {}
            }
            if (!ioFn) { console.error('socket.io-client not found'); process.exit(1); }
            const USERNAME = process.env.KUMA_USERNAME;
            const PASSWORD = process.env.KUMA_PASSWORD;
            const RESET    = process.env.RESET_MONITORS === 'true';
            const MONITORS = [
              { name: 'API \u2014 Health (External)',     type: 'http', url: 'https://api.zyntapos.com/health',     interval: 60  },
              { name: 'License \u2014 Health (External)', type: 'http', url: 'https://license.zyntapos.com/health', interval: 60  },
              { name: 'Sync \u2014 Health (External)',    type: 'http', url: 'https://sync.zyntapos.com/health',    interval: 60  },
              { name: 'Panel (External)',                 type: 'http', url: 'https://panel.zyntapos.com',          interval: 120 },
              { name: 'Website (External)',               type: 'http', url: 'https://zyntapos.com',                interval: 120 },
              { name: 'Status Page (External)',           type: 'http', url: 'https://status.zyntapos.com',         interval: 120 },
              { name: 'API \u2014 Health (Internal)',     type: 'http', url: 'http://api:8080/health',    interval: 30 },
              { name: 'License \u2014 Health (Internal)', type: 'http', url: 'http://license:8083/health', interval: 30 },
              { name: 'Sync \u2014 Health (Internal)',    type: 'http', url: 'http://sync:8082/health',   interval: 30 },
              { name: 'PostgreSQL TCP', type: 'port', hostname: 'postgres', port: 5432, interval: 60 },
              { name: 'Redis TCP',      type: 'port', hostname: 'redis',    port: 6379, interval: 60 },
              { name: 'TLS \u2014 api.zyntapos.com',     type: 'http', url: 'https://api.zyntapos.com/health',     interval: 86400, checkCertExpiry: true, expiryNotification: true },
              { name: 'TLS \u2014 license.zyntapos.com', type: 'http', url: 'https://license.zyntapos.com/health', interval: 86400, checkCertExpiry: true, expiryNotification: true },
              { name: 'TLS \u2014 sync.zyntapos.com',    type: 'http', url: 'https://sync.zyntapos.com/health',    interval: 86400, checkCertExpiry: true, expiryNotification: true },
              { name: 'TLS \u2014 panel.zyntapos.com',   type: 'http', url: 'https://panel.zyntapos.com',          interval: 86400, checkCertExpiry: true, expiryNotification: true },
              { name: 'Backup \u2014 Daily DB', type: 'push', interval: 90000  },
              { name: 'Backup \u2014 Verify',   type: 'push', interval: 691200 },
            ];
            const QUIET = new Set(['heartbeat','heartbeatList','avgPing','uptime','certInfo','notificationList','proxyList','statusPageList','apiKeyList','info','monitorList']);
            const socket = ioFn('http://localhost:3001', { transports: ['polling','websocket'], timeout: 15000, reconnectionAttempts: 0 });
            socket.onAny((ev, ...a) => { if (!QUIET.has(ev)) console.log('  [evt]', ev, JSON.stringify(a).slice(0,120)); });
            socket.on('connect_error', e => { console.error('connect_error:', e.message); process.exit(1); });
            const GT = setTimeout(() => { console.error('global timeout 800s'); socket.disconnect(); process.exit(1); }, 800000);
            socket.on('connect', async () => {
              console.log('Connected sid=' + socket.id);
              try {
                const lr = await new Promise((res, rej) => {
                  const t = setTimeout(() => rej(new Error('login timeout')), 15000);
                  socket.emit('login', { username: USERNAME, password: PASSWORD }, r => { clearTimeout(t); res(r); });
                });
                if (!lr || !lr.ok) throw new Error('Login failed: ' + JSON.stringify(lr));
                console.log('Logged in as ' + USERNAME);
                if (RESET) {
                  const lr2 = await new Promise(res => socket.emit('getMonitorList', {}, res));
                  for (const m of Object.values((lr2 && lr2.data) || {})) {
                    await new Promise(res => socket.emit('deleteMonitor', m.id, res));
                    console.log('  Deleted: ' + m.name);
                  }
                }
                console.log('Adding ' + MONITORS.length + ' monitors (serial, 45s each)...');
                let created = 0;
                for (const mon of MONITORS) {
                  const r = await new Promise(res => {
                    const t = setTimeout(() => { console.warn('  TIMEOUT: ' + mon.name); res({ ok: false, msg: 'timeout' }); }, 45000);
                    socket.emit('add', mon, result => { clearTimeout(t); res(result); });
                  });
                  if (r && r.ok) { console.log('  + ' + mon.name + ' id=' + (r.monitorID || '?')); created++; }
                  else console.warn('  WARN: ' + mon.name + ': ' + (r ? r.msg : 'null'));
                }
                console.log('Done: ' + created + '/' + MONITORS.length + ' created');
                clearTimeout(GT); socket.disconnect(); process.exit(created === 0 ? 1 : 0);
              } catch (e) { console.error('ERROR:', e.message); clearTimeout(GT); socket.disconnect(); process.exit(1); }
            });
            JSEOF
            docker cp /tmp/kuma_setup.js "$CONTAINER":/tmp/kuma_setup.js

            # ── Run monitor setup via Node.js inside the container ───────────────
            echo "--- Running monitor setup script inside container..."
            docker exec \
              -e KUMA_USERNAME="$KUMA_USERNAME" \
              -e KUMA_PASSWORD="$KUMA_PASSWORD" \
              -e RESET_MONITORS="$RESET_MONITORS" \
              "$CONTAINER" node /tmp/kuma_setup.js

            # ── Save credentials to VPS .env ─────────────────────────────────────
            echo "--- Saving credentials to /opt/zyntapos/.env..."
            ENV_FILE="/opt/zyntapos/.env"
            for PAIR in "KUMA_USERNAME=${KUMA_USERNAME}" "KUMA_PASSWORD=${KUMA_PASSWORD}"; do
              KEY="${PAIR%%=*}"
              if grep -q "^${KEY}=" "$ENV_FILE" 2>/dev/null; then
                sed -i "s|^${KEY}=.*|${PAIR}|" "$ENV_FILE"
                echo "    Updated $KEY"
              else
                echo "$PAIR" >> "$ENV_FILE"
                echo "    Added $KEY"
              fi
            done

            echo ""
            echo "=== Setup complete — $(date -u +%Y%m%dT%H%M%SZ) ==="
            echo "Visit https://status.zyntapos.com to verify all monitors appear"
        env:
          KUMA_USERNAME: ${{ github.event.inputs.kuma_username }}
          KUMA_PASSWORD: ${{ github.event.inputs.kuma_password }}
          RESET_MONITORS: ${{ github.event.inputs.reset_monitors }}
          DISCORD_WEBHOOK_URL: ${{ github.event.inputs.discord_webhook_url }}
          ALERT_EMAIL: ${{ github.event.inputs.alert_email }}
