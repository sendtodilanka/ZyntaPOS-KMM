name: "Step[6]: Smoke Test & Rollback"

# ─────────────────────────────────────────────────────────────────────────────
# PIPELINE POSITION: Step 6 of 7
#
# Fires only when Step[5]: Deploy to VPS completes successfully.
# Tests all 6 production endpoints. If any endpoint is unhealthy, the VPS
# is rolled back to the previous commit and the workflow fails visibly.
# If all endpoints are healthy, Sentry is notified of the new release.
#
# After a successful smoke test, Step[7]: Verify Endpoints fires automatically.
#
# EDGE CASES HANDLED:
#   - Container startup delay: 30s initial wait + 3 retries with 30s gaps
#   - Rollback safety: uses HEAD~1 (the previously deployed commit)
#   - Rollback failure: if rollback SSH also fails, workflow fails loudly
#   - Sentry notification: only fires after confirmed healthy deployment
#   - Sentry CLI: pinned version with explicit download (no pipe-to-shell)
#   - Sentry auth missing: step skipped gracefully if SENTRY_AUTH_TOKEN not set
#   - Slack notification: optional (only if SLACK_DEPLOY_WEBHOOK secret exists)
#   - Partial outage: all 6 subdomains tested; any failure triggers full rollback
#   - checkout@v4 with fetch-depth:0 for sentry-cli set-commits --auto
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_run:
    workflows: ["Step[5]: Deploy to VPS"]
    types: [completed]

permissions:
  contents: read
  deployments: write

env:
  DEPLOY_PATH: /opt/zyntapos

jobs:
  smoke-rollback:
    name: "Step[6]: Smoke Test & Rollback"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only run when the SSH deploy actually succeeded.
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      # Checkout with full history — required for sentry-cli set-commits --auto.
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      # ── Smoke Test ────────────────────────────────────────────────────────
      - name: "Step[6]: Smoke Test Endpoints"
        id: smoke
        uses: ./.github/actions/health-check
        with:
          subdomains: 'api license panel docs status sync'
          initial-wait: '30'
          max-retries: '3'
          retry-delay: '30'
          curl-timeout: '20'

      # ── Write smoke test results to step summary ──────────────────────────
      - name: Write smoke test summary
        if: always()
        run: |
          DEPLOY_SHA="${{ github.event.workflow_run.head_sha }}"
          {
            echo "## Step[6]: Smoke Test — \`${DEPLOY_SHA:0:8}\`"
            echo ""
            echo "**Tested at:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo ""
            echo "${{ steps.smoke.outputs.summary }}"
            echo ""
            if [ "${{ steps.smoke.outputs.healthy }}" = "true" ]; then
              echo "### ✅ All 6 endpoints healthy — deploy verified"
            else
              echo "### ❌ Smoke test FAILED — automatic rollback initiated"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      # ── Fail the job if smoke test found degraded endpoints ───────────────
      - name: Check smoke test result
        id: smoke_gate
        if: steps.smoke.outputs.healthy != 'true'
        run: |
          echo "::error::Smoke test failed — one or more endpoints are degraded"
          echo "Initiating automatic rollback..."
          exit 1

      # ── Rollback on Smoke Failure ─────────────────────────────────────────
      # Uses HEAD~1 to revert to the previously deployed commit.
      # Edge case: if this is the very first deploy, HEAD~1 won't exist.
      # The script handles this by checking if the rollback target exists.
      - name: "Step[6]: Rollback on Smoke Failure"
        if: failure() && steps.smoke_gate.outcome == 'failure'
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 60s
          command_timeout: 5m
          script: |
            set -euo pipefail
            cd ${{ env.DEPLOY_PATH }}
            CURRENT_SHA=$(git rev-parse HEAD)
            echo "=== ROLLBACK: smoke test failed for ${CURRENT_SHA} ==="

            # Edge case: check if HEAD~1 exists (first-ever deploy has no parent)
            if git rev-parse HEAD~1 >/dev/null 2>&1; then
              git reset --hard HEAD~1
              PREV_SHA=$(git rev-parse HEAD)
              echo "=== Rolled back to ${PREV_SHA} ==="
            else
              echo "::warning::No previous commit to roll back to (first deploy?)"
              echo "=== Cannot rollback — this appears to be the first deploy ==="
              echo "=== Manual intervention required ==="
              exit 1
            fi

            docker compose up -d --build --remove-orphans
            docker image prune -f
            echo "=== Rollback complete: $(date) ==="
            docker compose ps

      # ── Slack notification on rollback ─────────────────────────────────────
      - name: Notify Slack of rollback
        if: failure() && steps.smoke_gate.outcome == 'failure'
        continue-on-error: true  # Slack notification is best-effort
        env:
          SLACK_DEPLOY_WEBHOOK: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
        run: |
          if [ -z "$SLACK_DEPLOY_WEBHOOK" ]; then
            echo "SLACK_DEPLOY_WEBHOOK not configured — skipping notification"
            exit 0
          fi
          curl -s -X POST "$SLACK_DEPLOY_WEBHOOK" \
            -H 'Content-type: application/json' \
            --data "{
              \"text\": \":rotating_light: *DEPLOY ROLLBACK* :rotating_light:\",
              \"attachments\": [{
                \"color\": \"danger\",
                \"fields\": [
                  {\"title\": \"SHA\", \"value\": \"\`${{ github.event.workflow_run.head_sha }}\`\", \"short\": true},
                  {\"title\": \"Reason\", \"value\": \"Smoke test failed\", \"short\": true},
                  {\"title\": \"Action\", \"value\": \"Automatic rollback to previous commit\", \"short\": false}
                ]
              }]
            }"

      # ── Sentry Release Notification ───────────────────────────────────────
      # Only notify Sentry once the deployment is confirmed stable by smoke test.
      # SECURITY: Pin to a specific sentry-cli release — never pipe from sentry.io.
      - name: Notify Sentry of deploy
        if: steps.smoke.outputs.healthy == 'true'
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: zyntapos
        run: |
          # Edge case: skip Sentry if auth token is not configured
          if [ -z "$SENTRY_AUTH_TOKEN" ]; then
            echo "::warning::SENTRY_AUTH_TOKEN not configured — skipping Sentry notification"
            exit 0
          fi

          SENTRY_CLI_VERSION="2.42.2"
          echo "Downloading sentry-cli v${SENTRY_CLI_VERSION}..."
          curl -sSfL \
            "https://github.com/getsentry/sentry-cli/releases/download/${SENTRY_CLI_VERSION}/sentry-cli-Linux-x86_64" \
            -o /usr/local/bin/sentry-cli
          chmod +x /usr/local/bin/sentry-cli

          VERSION="${{ github.event.workflow_run.head_sha }}"
          sentry-cli releases new "$VERSION" \
            --project zyntapos-api \
            --project zyntapos-license \
            --project zyntapos-sync \
            --project zyntapos-android
          sentry-cli releases set-commits "$VERSION" --auto
          sentry-cli releases finalize "$VERSION"
          sentry-cli releases deploys "$VERSION" new -e production
          echo "✅ Sentry release $VERSION created and deployed"

      # ── Slack notification on successful deploy ────────────────────────────
      - name: Notify Slack of successful deploy
        if: steps.smoke.outputs.healthy == 'true'
        continue-on-error: true
        env:
          SLACK_DEPLOY_WEBHOOK: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
        run: |
          if [ -z "$SLACK_DEPLOY_WEBHOOK" ]; then
            echo "SLACK_DEPLOY_WEBHOOK not configured — skipping notification"
            exit 0
          fi
          SHA="${{ github.event.workflow_run.head_sha }}"
          curl -s -X POST "$SLACK_DEPLOY_WEBHOOK" \
            -H 'Content-type: application/json' \
            --data "{
              \"text\": \":white_check_mark: *Deploy Successful*\",
              \"attachments\": [{
                \"color\": \"good\",
                \"fields\": [
                  {\"title\": \"SHA\", \"value\": \"\`${SHA:0:8}\`\", \"short\": true},
                  {\"title\": \"Environment\", \"value\": \"production\", \"short\": true},
                  {\"title\": \"Endpoints\", \"value\": \"All 6 healthy\", \"short\": true}
                ]
              }]
            }"

      # ── Final status ──────────────────────────────────────────────────────
      - name: Post smoke test final status
        if: always()
        run: |
          {
            echo ""
            echo "---"
            echo "_Step[6] finished at $(date -u '+%Y-%m-%d %H:%M:%S UTC') — status: **${{ job.status }}**_"
          } >> "$GITHUB_STEP_SUMMARY"
