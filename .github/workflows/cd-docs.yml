name: Deploy API Docs to Cloudflare Pages

on:
  push:
    branches: [main]
    paths: ['zyntapos-docs/**']
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy API Docs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: zyntapos-docs
        run: npm install

      - name: Lint OpenAPI specs
        working-directory: zyntapos-docs
        run: npx @redocly/cli lint openapi/*.yaml
        continue-on-error: true

      - name: Build static site
        working-directory: zyntapos-docs
        run: node build.js

      - name: Verify build output
        run: |
          test -f zyntapos-docs/dist/index.html
          test -f zyntapos-docs/dist/openapi/api-v1.yaml
          echo "Build output verified"

      - name: Create Cloudflare Pages project (if not exists)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project create zyntapos-docs --production-branch=main
        continue-on-error: true

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=zyntapos-docs --commit-dirty=true
          workingDirectory: zyntapos-docs
