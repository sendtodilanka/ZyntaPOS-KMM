name: CF Email Routing Debug
on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Query Cloudflare Email Routing
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e

          echo "=== Get Zone ID for zyntapos.com ==="
          ZONE_RESP=$(curl -s -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones?name=zyntapos.com")
          echo "$ZONE_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(json.dumps(d, indent=2))" | head -30
          ZONE_ID=$(echo "$ZONE_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['result'][0]['id'])")
          echo "Zone ID: $ZONE_ID"

          echo ""
          echo "=== Email Routing Settings ==="
          curl -s -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/email/routing" \
            | python3 -c "import sys,json; print(json.dumps(json.load(sys.stdin), indent=2))"

          echo ""
          echo "=== Email Routing Rules ==="
          curl -s -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/email/routing/rules" \
            | python3 -c "import sys,json; print(json.dumps(json.load(sys.stdin), indent=2))"

          echo ""
          echo "=== Catch-All Rule ==="
          curl -s -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/email/routing/rules/catch_all" \
            | python3 -c "import sys,json; print(json.dumps(json.load(sys.stdin), indent=2))"

          echo ""
          echo "=== Destination Addresses ==="
          curl -s -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/email/routing/addresses" \
            | python3 -c "import sys,json; print(json.dumps(json.load(sys.stdin), indent=2))"
