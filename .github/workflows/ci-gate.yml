name: "Step[3+4]: CI Gate"

# ─────────────────────────────────────────────────────────────────────────────
# PIPELINE POSITION: Steps 3 & 4 of 7
#
# THE MERGE GATE — Full build + lint + detekt + tests.
# Runs on:
#   - pull_request to main  → blocks merge until green (branch protection)
#   - push to main          → triggers deploy via repository_dispatch
#   - workflow_dispatch      → manual re-run from Actions tab
#
# CHAINING: On push-to-main success, dispatches "deploy-trigger" event to
# start Step[5]. Uses repository_dispatch instead of workflow_run to avoid
# ghost workflow interference (GitHub platform bug with deleted workflows).
#
# EDGE CASES HANDLED:
#   - PR + push double-trigger: concurrency group deduplicates per PR number
#   - Stale PRs: newer push cancels in-progress CI on same PR
#   - Merge queue: push-to-main run ensures merged code is verified before deploy
#   - Test flakiness: --continue flag runs all tests, reports all failures
#   - Test reporting: JUnit XML published as PR check annotations via dorny/test-reporter
#   - Deploy dispatch only on push (not PR): explicit event_name guard
# ─────────────────────────────────────────────────────────────────────────────

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  actions: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ── Full build + lint + test via reusable workflow ──────────────────────────
  build-and-test:
    name: "Step[3+4]: Build & Test"
    uses: ./.github/workflows/_reusable-build-test.yml
    with:
      run-tests: true
      run-lint: true
      upload-apk: true
      artifact-retention-days: 7
      timeout-minutes: 45
      artifact-suffix: '-ci-${{ github.run_id }}'

  # ── Test Result Reporting ──────────────────────────────────────────────────
  test-report:
    name: "Publish Test Results"
    needs: build-and-test
    if: always() && needs.build-and-test.result != 'cancelled'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download JUnit XML
        uses: actions/download-artifact@v4
        with:
          name: junit-xml-ci-${{ github.run_id }}
          path: test-results
        continue-on-error: true

      - name: Publish test results
        if: hashFiles('test-results/**/TEST-*.xml') != ''
        uses: dorny/test-reporter@v1
        with:
          name: 'JUnit Test Results'
          path: 'test-results/**/TEST-*.xml'
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

  # ── Trigger Deploy (push-to-main only) ───────────────────────────────────
  # Uses repository_dispatch to chain to cd-deploy.yml.
  # Only fires on push events (not PRs) and only when build succeeds.
  trigger-deploy:
    name: "Trigger Deploy"
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: write
    steps:
      - name: Dispatch deploy event
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}
          event-type: deploy-trigger
          client-payload: '{"sha": "${{ github.sha }}", "run_id": "${{ github.run_id }}"}'
