name: "Step[3+4]: CI Gate"

# ─────────────────────────────────────────────────────────────────────────────
# PIPELINE POSITION: Steps 3 & 4 of 7
#
# THE MERGE GATE — Full build + lint + detekt + tests.
# Runs on:
#   - pull_request to main  → blocks merge until green (branch protection)
#   - push to main          → triggers deploy via repository_dispatch
#   - workflow_dispatch      → manual re-run from Actions tab
#
# CHAINING: On push-to-main success, dispatches "deploy-trigger" event to
# start Step[5]. Uses repository_dispatch instead of workflow_run to avoid
# ghost workflow interference (GitHub platform bug with deleted workflows).
#
# EDGE CASES HANDLED:
#   - PR + push double-trigger: concurrency groups keyed by event_name so they
#     never cancel each other. Only PR runs use cancel-in-progress (push-to-main
#     runs must complete to trigger deploy).
#   - Stale PRs: newer push cancels in-progress CI on same PR
#   - Merge queue: push-to-main run ensures merged code is verified before deploy
#   - Test flakiness: --continue flag runs all tests, reports all failures
#   - Test reporting: JUnit XML published as PR check annotations via dorny/test-reporter
#   - Deploy dispatch only on push (not PR): explicit event_name guard
# ─────────────────────────────────────────────────────────────────────────────

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  actions: read
  packages: write
  security-events: write   # Required for Detekt SARIF upload to Security tab

concurrency:
  group: ci-gate-${{ github.event_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ── Full build + lint + test via reusable workflow ──────────────────────────
  build-and-test:
    name: "Step[3+4]: Build & Test"
    uses: ./.github/workflows/_reusable-build-test.yml
    with:
      run-tests: true
      run-lint: true
      upload-apk: true
      artifact-retention-days: 7
      timeout-minutes: 45
      artifact-suffix: '-ci-${{ github.run_id }}'

  # ── Test Result Reporting ──────────────────────────────────────────────────
  test-report:
    name: "Publish Test Results"
    needs: build-and-test
    if: always() && needs.build-and-test.result != 'cancelled'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download JUnit XML
        uses: actions/download-artifact@v4
        with:
          name: junit-xml-ci-${{ github.run_id }}
          path: test-results
        continue-on-error: true

      - name: Publish test results
        if: hashFiles('test-results/**/TEST-*.xml') != ''
        uses: dorny/test-reporter@v1
        with:
          name: 'JUnit Test Results'
          path: 'test-results/**/TEST-*.xml'
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

  # ── Build & Push Backend Docker Images to GHCR (push-to-main only) ─────────
  # Runs in parallel with test-report after build-and-test succeeds.
  # Pushes :latest and :<sha> tags so the VPS can pull without building.
  build-backend-images:
    name: "Build & Push Backend Docker Images"
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: [api, license, sync]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image — ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/zyntapos-${{ matrix.service }}:latest
            ghcr.io/${{ github.repository_owner }}/zyntapos-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Build & Push Website Docker Image to GHCR (push-to-main only) ──────────
  # Builds the Astro marketing website into an nginx Docker image.
  # Runs in parallel with build-backend-images after build-and-test succeeds.
  build-website-image:
    name: "Build & Push Website Docker Image"
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image — website
        uses: docker/build-push-action@v6
        with:
          context: website
          file: website/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/zyntapos-website:latest
            ghcr.io/${{ github.repository_owner }}/zyntapos-website:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Trigger Deploy (push-to-main only) ───────────────────────────────────
  # Uses repository_dispatch to chain to cd-deploy.yml.
  # Only fires on push events (not PRs) and only when ALL builds succeed.
  trigger-deploy:
    name: "Trigger Deploy"
    needs: [build-and-test, build-backend-images, build-website-image]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: write
    steps:
      - name: Extract commit title
        id: commit
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          # Use env var to safely handle special characters in commit messages
          TITLE=$(echo "$COMMIT_MSG" | head -1 | tr -d '"' | cut -c1-80)
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"

      - name: Dispatch deploy event
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}
          event-type: deploy-trigger
          client-payload: '{"sha": "${{ github.sha }}", "run_id": "${{ github.run_id }}", "title": "${{ steps.commit.outputs.title }}"}'
