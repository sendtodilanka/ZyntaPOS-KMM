name: "Step[3+4]: CI Gate"

# ─────────────────────────────────────────────────────────────────────────────
# PIPELINE POSITION: Steps 3 & 4 of 7
#
# THE MERGE GATE — Full build + lint + detekt + tests.
# Runs on:
#   - pull_request to main  → blocks merge until green (branch protection)
#   - push to main          → triggers deploy via repository_dispatch
#   - workflow_dispatch      → manual re-run from Actions tab
#
# CHAINING: On push-to-main success, dispatches "deploy-trigger" event to
# start Step[5]. Uses repository_dispatch instead of workflow_run to avoid
# ghost workflow interference (GitHub platform bug with deleted workflows).
#
# EDGE CASES HANDLED:
#   - PR + push double-trigger: concurrency groups keyed by event_name so they
#     never cancel each other. Only PR runs use cancel-in-progress (push-to-main
#     runs must complete to trigger deploy).
#   - Stale PRs: newer push cancels in-progress CI on same PR
#   - Merge queue: push-to-main run ensures merged code is verified before deploy
#   - Test flakiness: --continue flag runs all tests, reports all failures
#   - Test reporting: JUnit XML published as PR check annotations via dorny/test-reporter
#   - Deploy dispatch only on push (not PR): explicit event_name guard
# ─────────────────────────────────────────────────────────────────────────────

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  actions: read
  packages: write
  security-events: write   # Required for Detekt SARIF upload to Security tab

concurrency:
  group: ci-gate-${{ github.event_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ── Full build + lint + test via reusable workflow ──────────────────────────
  build-and-test:
    name: "Step[3+4]: Build & Test"
    uses: ./.github/workflows/_reusable-build-test.yml
    secrets:
      GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
    with:
      run-tests: true
      run-lint: true
      upload-apk: true
      artifact-retention-days: 7
      timeout-minutes: 45
      artifact-suffix: '-ci-${{ github.run_id }}'

  # ── Website: Build validation (runs only when website/** files changed) ─────
  # ci-website.yml runs full Playwright + Lighthouse tests on website PRs, but
  # it is NOT a required CI Gate check (separate workflow). This job closes the
  # gap by catching website build failures inside the merge gate.
  # Skipped on non-website changes to avoid adding 5+ min to every PR.
  test-website:
    name: "Website Build (validate)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: website

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 2   # need HEAD~1 for changed-files diff

      - name: Detect website file changes
        id: changes
        run: |
          # Check if any website/** files changed in this PR or push
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -c '^website/' || true)
          echo "website_changed=${CHANGED}" >> "$GITHUB_OUTPUT"
          echo "Website files changed: ${CHANGED}"

      - name: Set up Node.js
        if: steps.changes.outputs.website_changed != '0'
        uses: actions/setup-node@v4
        with:
          node-version-file: website/.nvmrc

      - name: Install dependencies
        if: steps.changes.outputs.website_changed != '0'
        run: npm install

      - name: npm audit (security)
        if: steps.changes.outputs.website_changed != '0'
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Build Astro site
        if: steps.changes.outputs.website_changed != '0'
        run: npx astro build
        env:
          SITE_URL: https://www.zyntapos.com

      - name: Skip (no website changes)
        if: steps.changes.outputs.website_changed == '0'
        run: echo "No website/** files changed — skipping website build."

  # ── Backend: Compile + Unit Tests (PR + push-to-main) ──────────────────────
  # Validates that all three backend Gradle subprojects compile and pass unit
  # tests BEFORE they are merged. Without this, compilation errors only surface
  # during the Docker shadowJar build on push-to-main (post-merge), requiring
  # a follow-up fix PR to unblock the deploy chain.
  #
  # Each backend subproject has its own settings.gradle.kts and Gradle wrapper;
  # they are NOT compiled by the root KMP build.
  test-backend:
    name: "Backend Compile & Test"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        service: [api, license, sync]
    defaults:
      run:
        working-directory: backend/${{ matrix.service }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ matrix.service }}-${{ hashFiles(format('backend/{0}/**/*.gradle.kts', matrix.service)) }}
          restore-keys: gradle-${{ runner.os }}-${{ matrix.service }}-

      - name: Compile backend/${{ matrix.service }}
        run: |
          chmod +x ./gradlew
          ./gradlew compileKotlin --no-daemon --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx2g -Xms512m"

      - name: Run unit tests — ${{ matrix.service }}
        run: |
          ./gradlew test --no-daemon --continue --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx2g -Xms512m"
        continue-on-error: false

      - name: Upload test reports — ${{ matrix.service }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports-${{ matrix.service }}-${{ github.run_id }}
          path: backend/${{ matrix.service }}/build/reports/tests/
          retention-days: 7
          if-no-files-found: ignore

  # ── Admin Panel: TypeScript, ESLint, Vitest, npm audit, Playwright ──────────
  # Runs in parallel with build-and-test. Visual snapshot tests are excluded
  # because pixel comparisons differ between local and ubuntu-22.04 renderers.
  # Node 22 aligns with ci-admin-panel.yml (was Node 20 — version inconsistency).
  test-admin-panel:
    name: "Admin Panel Tests"
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: admin-panel

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: admin-panel/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit (security)
        run: npm audit --audit-level=high
        continue-on-error: true   # Report-only until audit backlog is triaged

      - name: TypeScript check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Vitest unit tests (with coverage)
        run: npm run test:ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Playwright e2e tests (nav + a11y + smoke)
        run: npx playwright test e2e/navigation.spec.ts e2e/accessibility.spec.ts e2e/smoke.spec.ts
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: admin-panel/playwright-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Vitest coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-coverage-${{ github.run_id }}
          path: admin-panel/coverage/
          retention-days: 7
          if-no-files-found: ignore

  # ── Flyway Migration Validation ───────────────────────────────────────────
  # Spins up a fresh PostgreSQL container and applies all Flyway migrations for
  # api and license services. Catches SQL syntax errors and version conflicts
  # BEFORE they reach production and cause a deploy-time outage.
  # sync service has no Flyway migrations (Redis only).
  validate-migrations:
    name: "Validate DB Migrations (${{ matrix.service }})"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            db: zyntapos_api
          - service: license
            db: zyntapos_license

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: ${{ matrix.db }}
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Run Flyway migrations — ${{ matrix.service }}
        uses: docker://flyway/flyway:10
        with:
          args: >-
            -url=jdbc:postgresql://postgres:5432/${{ matrix.db }}
            -user=ci
            -password=ci
            -locations=filesystem:/github/workspace/backend/${{ matrix.service }}/src/main/resources/db/migration
            migrate

  # ── Docker Compose Config Validation ─────────────────────────────────────
  # Validates docker-compose.yml syntax before merge. Catches broken YAML,
  # invalid service references, or misconfigured volumes without needing the VPS.
  validate-compose:
    name: "Validate docker-compose.yml"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate docker-compose.yml
        run: docker compose config --quiet

      - name: Validate docker-compose.admin.yml
        run: |
          if [ -f docker-compose.admin.yml ]; then
            docker compose -f docker-compose.admin.yml config --quiet
          fi

  # ── Test Result Reporting ──────────────────────────────────────────────────
  test-report:
    name: "Publish Test Results"
    needs: build-and-test
    if: always() && needs.build-and-test.result != 'cancelled'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download JUnit XML
        uses: actions/download-artifact@v4
        with:
          name: junit-xml-ci-${{ github.run_id }}
          path: test-results
        continue-on-error: true

      - name: Publish test results
        if: hashFiles('test-results/**/TEST-*.xml') != ''
        uses: dorny/test-reporter@v1
        with:
          name: 'JUnit Test Results'
          path: 'test-results/**/TEST-*.xml'
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

  # ── Build & Push Backend Docker Images to GHCR (push-to-main only) ─────────
  # Runs in parallel with test-report after build-and-test succeeds.
  # Pushes :latest and :<sha> tags so the VPS can pull without building.
  build-backend-images:
    name: "Build & Push Backend Docker Images"
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: [api, license, sync]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image — ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/zyntapos-${{ matrix.service }}:latest
            ghcr.io/${{ github.repository_owner }}/zyntapos-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Build & Push Website Docker Image to GHCR (push-to-main only) ──────────
  # Builds the Astro marketing website into an nginx Docker image.
  # Runs in parallel with build-backend-images after build-and-test succeeds.
  build-website-image:
    name: "Build & Push Website Docker Image"
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image — website
        uses: docker/build-push-action@v6
        with:
          context: website
          file: website/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/zyntapos-website:latest
            ghcr.io/${{ github.repository_owner }}/zyntapos-website:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Build & Push Admin Panel Docker Image to GHCR (push-to-main only) ──────
  # Builds the React admin panel into an nginx Docker image.
  # Runs in parallel with build-backend-images after build-and-test succeeds.
  build-admin-panel-image:
    name: "Build & Push Admin Panel Docker Image"
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image name
        id: image
        run: echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push image — admin-panel
        uses: docker/build-push-action@v6
        with:
          context: admin-panel
          file: admin-panel/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.image.outputs.repo }}/admin-panel:latest
            ghcr.io/${{ steps.image.outputs.repo }}/admin-panel:${{ github.sha }}
          build-args: |
            VITE_API_URL=https://api.zyntapos.com
            VITE_LICENSE_URL=https://license.zyntapos.com
            VITE_SYNC_URL=https://sync.zyntapos.com
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Trigger Deploy (push-to-main only) ───────────────────────────────────
  # Uses repository_dispatch to chain to cd-deploy.yml.
  # Only fires on push events (not PRs) and only when ALL builds succeed.
  trigger-deploy:
    name: "Trigger Deploy"
    needs: [build-and-test, test-website, test-admin-panel, test-backend, validate-migrations, validate-compose, build-backend-images, build-website-image, build-admin-panel-image]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: write
    steps:
      - name: Extract commit title
        id: commit
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          # Use env var to safely handle special characters in commit messages
          TITLE=$(echo "$COMMIT_MSG" | head -1 | tr -d '"' | cut -c1-80)
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"

      - name: Dispatch deploy event
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}
          event-type: deploy-trigger
          client-payload: '{"sha": "${{ github.sha }}", "run_id": "${{ github.run_id }}", "title": "${{ steps.commit.outputs.title }}"}'
