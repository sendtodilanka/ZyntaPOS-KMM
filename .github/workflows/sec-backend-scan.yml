name: Backend Security Scan

# ── TODO-009 Level 4: OWASP Dependency Check + Trivy Container Scan ──────────
#
# Runs:
#   • Weekly (Monday 01:00 UTC = 06:30 LKT) — scheduled sweep
#   • On demand (workflow_dispatch)
#
# NOTE: push trigger intentionally removed — ci-gate.yml already builds and
# pushes Docker images on every push to main, catching compilation errors.
# Security CVE scanning on every push creates noise and redundant builds;
# the weekly sweep is sufficient for vulnerability management.
#
# Results: uploaded as SARIF → GitHub Security → Code Scanning alerts
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: "0 1 * * 1"   # Monday 01:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # Required to upload SARIF results

# ── Shared environment for all OWASP jobs ────────────────────────────────────
# OWASP Dependency Check NVD download needs significant heap.
env:
  GRADLE_OPTS: "-Xmx2g -Xms512m -XX:MaxMetaspaceSize=512m"
  # Cache-bust key: increment to force fresh NVD download after corruption
  NVD_CACHE_VERSION: "v4"
  # CVSS 11 = report-only (max CVSS is 10.0, so never fails build).
  # Vulnerabilities still appear in SARIF → GitHub Security tab.
  # Local dev defaults to 7.0 (see build.gradle.kts).
  OWASP_FAIL_CVSS: "11"

jobs:
  # ── OWASP Dependency Check — backend/api ────────────────────────────────────
  owasp-api:
    name: OWASP — API
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: backend/api

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-api-${{ hashFiles('backend/api/build.gradle.kts', 'backend/api/settings.gradle.kts') }}
          restore-keys: gradle-${{ runner.os }}-api-

      - name: Cache OWASP NVD database
        uses: actions/cache@v4
        with:
          path: ~/.gradle/dependency-check-data
          key: owasp-nvd-${{ env.NVD_CACHE_VERSION }}-${{ runner.os }}-${{ github.run_id }}
          restore-keys: owasp-nvd-${{ env.NVD_CACHE_VERSION }}-${{ runner.os }}-

      - name: Run OWASP Dependency Check
        run: |
          chmod +x ./gradlew
          ./gradlew dependencyCheckAnalyze --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx2g -Xms512m" \
            --stacktrace --info
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          OWASP_FAIL_CVSS: "11"
        timeout-minutes: 30
        continue-on-error: true   # NVD download can hit rate-limits or timeouts; CVSS-11 is report-only anyway

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report-api
          path: backend/api/build/reports/dependency-check-report.html
          retention-days: 30
          if-no-files-found: warn

      - name: Upload OWASP SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: backend/api/build/reports/dependency-check-report.sarif
          category: owasp-api
        continue-on-error: true

  # ── OWASP Dependency Check — backend/license ────────────────────────────────
  owasp-license:
    name: OWASP — License
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: backend/license

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-license-${{ hashFiles('backend/license/build.gradle.kts') }}
          restore-keys: gradle-${{ runner.os }}-license-

      - name: Cache OWASP NVD database
        uses: actions/cache@v4
        with:
          path: ~/.gradle/dependency-check-data
          key: owasp-nvd-${{ env.NVD_CACHE_VERSION }}-${{ runner.os }}-${{ github.run_id }}
          restore-keys: owasp-nvd-${{ env.NVD_CACHE_VERSION }}-${{ runner.os }}-

      - name: Run OWASP Dependency Check
        run: |
          chmod +x ./gradlew
          ./gradlew dependencyCheckAnalyze --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx2g -Xms512m" \
            --stacktrace --info
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          OWASP_FAIL_CVSS: "11"
        timeout-minutes: 30
        continue-on-error: true   # NVD download can hit rate-limits or timeouts; CVSS-11 is report-only anyway

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report-license
          path: backend/license/build/reports/dependency-check-report.html
          retention-days: 30
          if-no-files-found: warn

      - name: Upload OWASP SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: backend/license/build/reports/dependency-check-report.sarif
          category: owasp-license
        continue-on-error: true

  # ── OWASP Dependency Check — backend/sync ───────────────────────────────────
  owasp-sync:
    name: OWASP — Sync
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: backend/sync

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-sync-${{ hashFiles('backend/sync/build.gradle.kts') }}
          restore-keys: gradle-${{ runner.os }}-sync-

      - name: Cache OWASP NVD database
        uses: actions/cache@v4
        with:
          path: ~/.gradle/dependency-check-data
          key: owasp-nvd-${{ env.NVD_CACHE_VERSION }}-${{ runner.os }}-${{ github.run_id }}
          restore-keys: owasp-nvd-${{ env.NVD_CACHE_VERSION }}-${{ runner.os }}-

      - name: Run OWASP Dependency Check
        run: |
          chmod +x ./gradlew
          ./gradlew dependencyCheckAnalyze --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx2g -Xms512m" \
            --stacktrace --info
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          OWASP_FAIL_CVSS: "11"
        timeout-minutes: 30
        continue-on-error: true   # NVD download can hit rate-limits or timeouts; CVSS-11 is report-only anyway

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report-sync
          path: backend/sync/build/reports/dependency-check-report.html
          retention-days: 30
          if-no-files-found: warn

      - name: Upload OWASP SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: backend/sync/build/reports/dependency-check-report.sarif
          category: owasp-sync
        continue-on-error: true

  # ── Trivy Container Image Scan ────────────────────────────────────────────────
  trivy-images:
    name: Trivy — Container Image Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        service: [api, license, sync]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (${{ matrix.service }})
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/${{ matrix.service }}/Dockerfile
          load: true
          tags: zyntapos-${{ matrix.service }}:scan
          cache-from: type=gha   # Reuse layers from ci-gate.yml build-backend-images
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scan
        # Pinned to v0.35.0 SHA — versions ≤0.34.2 were compromised (2026-03-19 supply chain attack)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: "zyntapos-${{ matrix.service }}:scan"
          format: "sarif"
          output: "trivy-${{ matrix.service }}.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"   # Don't fail the build; alert via SARIF
          timeout: "15m"

      - name: Verify SARIF file exists
        if: always()
        run: |
          if [ ! -f "trivy-${{ matrix.service }}.sarif" ]; then
            echo "::warning::Trivy SARIF not generated for ${{ matrix.service }}. Creating empty SARIF."
            cat > "trivy-${{ matrix.service }}.sarif" <<'SARIF'
          {
            "version": "2.1.0",
            "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json",
            "runs": [{
              "tool": { "driver": { "name": "Trivy", "version": "0.35.0", "rules": [] } },
              "results": []
            }]
          }
          SARIF
          fi

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: "trivy-${{ matrix.service }}.sarif"
          category: "trivy-${{ matrix.service }}"
        continue-on-error: true

  # ── Snyk Container Scan ──────────────────────────────────────────────────────
  snyk-images:
    name: Snyk — Container Image Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Snyk scans the same images Trivy already built; run after Trivy to reuse cache
    needs: trivy-images
    if: always()
    strategy:
      fail-fast: false
      matrix:
        service: [api, license, sync]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (${{ matrix.service }})
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/${{ matrix.service }}/Dockerfile
          load: true
          tags: zyntapos-${{ matrix.service }}:scan
          cache-from: type=gha   # Reuse layers from Trivy build (same runner context via cache)
          cache-to: type=gha,mode=max

      - name: Run Snyk container scan
        uses: snyk/actions/docker@master
        continue-on-error: true   # Report-only — don't fail the build
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: zyntapos-${{ matrix.service }}:scan
          args: --severity-threshold=high --file=backend/${{ matrix.service }}/Dockerfile

      - name: Upload Snyk SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk.sarif
          category: snyk-${{ matrix.service }}
        continue-on-error: true

  # ── Summary gate (required check) ───────────────────────────────────────────
  security-scan-summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    needs: [owasp-api, owasp-license, owasp-sync, trivy-images, snyk-images]
    if: always()
    steps:
      - name: Check scan results
        run: |
          echo "═══════════════════════════════════════════════════"
          echo "  Backend Security Scan — Summary"
          echo "═══════════════════════════════════════════════════"
          echo ""
          echo "| Job | Result |"
          echo "|-----|--------|"
          echo "| OWASP API | ${{ needs.owasp-api.result }} |"
          echo "| OWASP License | ${{ needs.owasp-license.result }} |"
          echo "| OWASP Sync | ${{ needs.owasp-sync.result }} |"
          echo "| Trivy Images | ${{ needs.trivy-images.result }} |"
          echo "| Snyk Images | ${{ needs.snyk-images.result }} |"
          echo ""

          # OWASP jobs use continue-on-error (CVSS-11 = report-only, timeouts are non-blocking).
          # Only Trivy failures (infra-level scan) block the summary gate.
          FAILED=false
          if [ "${{ needs.trivy-images.result }}" = "failure" ]; then
            FAILED=true
          fi

          # Warn (but don't fail) if OWASP jobs hit errors or timeouts
          for result in "${{ needs.owasp-api.result }}" "${{ needs.owasp-license.result }}" "${{ needs.owasp-sync.result }}"; do
            if [ "$result" = "failure" ]; then
              echo "::warning::An OWASP scan job reported failure (likely NVD download timeout). Check the job log."
            fi
          done

          if [ "$FAILED" = "true" ]; then
            echo "::error::One or more Trivy container scans FAILED. Check job logs above."
            exit 1
          else
            echo "✅ Security scan gate passed."
            echo "Review SARIF results in the Security tab → Code scanning alerts."
          fi
