name: Backend Security Scan

# ── Security Scanning: OSV-Scanner + Trivy Container Scan + Snyk ──────────
#
# Runs:
#   • Weekly (Monday 01:00 UTC = 06:30 LKT) — scheduled sweep
#   • On demand (workflow_dispatch)
#
# NOTE: push trigger intentionally removed — ci-push-main.yml already builds and
# pushes Docker images on every push to main, catching compilation errors.
# Security CVE scanning on every push creates noise and redundant builds;
# the weekly sweep is sufficient for vulnerability management.
#
# Results: uploaded as SARIF → GitHub Security → Code Scanning alerts
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: "0 1 * * 1"   # Monday 01:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # Required to upload SARIF results

jobs:
  # ── Trivy Filesystem Scan — Dependency vulnerabilities (all backends) ──────
  # Scans backend Gradle dependency trees for CRITICAL/HIGH CVEs.
  # Trivy natively parses build.gradle.kts — no lockfile generation needed.
  trivy-deps:
    name: Trivy — Dependency Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan — backend
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          scan-ref: ./backend
          format: sarif
          output: trivy-deps.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"   # Report-only for weekly scan
          timeout: 10m

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-deps.sarif
          category: trivy-deps-backend
        continue-on-error: true

      - name: Upload scan report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-deps-report
          path: trivy-deps.sarif
          retention-days: 30
          if-no-files-found: warn

  # ── Trivy Container Image Scan ────────────────────────────────────────────────
  # Builds each backend Docker image locally and scans for CRITICAL/HIGH CVEs.
  # If the image build fails (e.g. stale GHA cache or Dockerfile issue), the scan
  # step is skipped and an empty SARIF is uploaded so the Security tab stays active.
  trivy-images:
    name: Trivy — Container Image Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        service: [api, license, sync]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (${{ matrix.service }})
        id: docker-build
        timeout-minutes: 15
        continue-on-error: true   # Don't fail the job if image build fails
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/${{ matrix.service }}/Dockerfile
          load: true
          tags: zyntapos-${{ matrix.service }}:scan
          no-cache: false
          cache-from: type=gha
          # Write to scoped cache so ci-push-main.yml can reuse these layers
          cache-to: type=gha,scope=trivy-${{ matrix.service }},mode=max

      - name: Rebuild without cache on build failure
        id: docker-build-nocache
        if: steps.docker-build.outcome == 'failure'
        timeout-minutes: 15
        continue-on-error: true   # If even clean build fails, still don't block
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/${{ matrix.service }}/Dockerfile
          load: true
          tags: zyntapos-${{ matrix.service }}:scan
          no-cache: true

      - name: Run Trivy vulnerability scan
        # Only run if at least one build attempt succeeded
        if: steps.docker-build.outcome == 'success' || steps.docker-build-nocache.outcome == 'success'
        # Pinned to v0.35.0 SHA — versions ≤0.34.2 were compromised (2026-03-19 supply chain attack)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: "zyntapos-${{ matrix.service }}:scan"
          format: "sarif"
          output: "trivy-${{ matrix.service }}.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"   # Don't fail the build; alert via SARIF
          timeout: "15m"

      - name: Ensure SARIF exists (fallback when image build failed)
        if: always()
        run: |
          if [ ! -f "trivy-${{ matrix.service }}.sarif" ]; then
            BUILD_STATUS="${{ steps.docker-build.outcome }}"
            NOCACHE_STATUS="${{ steps.docker-build-nocache.outcome }}"
            echo "::warning::Trivy SARIF not generated for ${{ matrix.service }} (build=${BUILD_STATUS}, no-cache-build=${NOCACHE_STATUS}). Creating skip-notification SARIF."
            cat > "trivy-${{ matrix.service }}.sarif" <<'SARIF'
          {
            "version": "2.1.0",
            "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json",
            "runs": [{
              "tool": { "driver": { "name": "Trivy", "version": "0.35.0", "rules": [] } },
              "invocations": [{
                "executionSuccessful": true,
                "toolExecutionNotifications": [{
                  "message": { "text": "Scan skipped — image build failed, see workflow logs" },
                  "level": "note"
                }]
              }],
              "results": []
            }]
          }
          SARIF
          fi

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-${{ matrix.service }}.sarif"
          category: "trivy-${{ matrix.service }}"
        continue-on-error: true

  # ── Snyk Container Scan ──────────────────────────────────────────────────────
  # Scans the same backend images as Trivy; runs after Trivy to reuse GHA cache.
  # If the image build fails, the Snyk scan is skipped and an empty SARIF is
  # uploaded so the Security tab entry stays active (not blank/errored).
  snyk-images:
    name: Snyk — Container Image Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Snyk scans the same images Trivy already built; run after Trivy to reuse cache
    needs: trivy-images
    if: always()
    strategy:
      fail-fast: false
      matrix:
        service: [api, license, sync]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (${{ matrix.service }})
        id: docker-build
        timeout-minutes: 15
        continue-on-error: true   # Don't fail the job if image build fails
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/${{ matrix.service }}/Dockerfile
          load: true
          tags: zyntapos-${{ matrix.service }}:scan
          no-cache: false
          # Reuse layers written by trivy-images job for this service
          cache-from: type=gha,scope=trivy-${{ matrix.service }}
          cache-to: type=gha,scope=trivy-${{ matrix.service }},mode=max

      - name: Rebuild without cache on build failure
        id: docker-build-nocache
        if: steps.docker-build.outcome == 'failure'
        timeout-minutes: 15
        continue-on-error: true
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/${{ matrix.service }}/Dockerfile
          load: true
          tags: zyntapos-${{ matrix.service }}:scan
          no-cache: true

      - name: Run Snyk container scan
        # Only run if at least one build attempt succeeded
        if: steps.docker-build.outcome == 'success' || steps.docker-build-nocache.outcome == 'success'
        uses: snyk/actions/docker@master
        continue-on-error: true   # Report-only — don't fail the build
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: zyntapos-${{ matrix.service }}:scan
          args: --severity-threshold=high --file=backend/${{ matrix.service }}/Dockerfile

      - name: Ensure Snyk SARIF exists (fallback when image build or scan failed)
        if: always()
        run: |
          if [ ! -f snyk.sarif ]; then
            BUILD_STATUS="${{ steps.docker-build.outcome }}"
            NOCACHE_STATUS="${{ steps.docker-build-nocache.outcome }}"
            echo "::warning::Snyk SARIF not generated for ${{ matrix.service }} (build=${BUILD_STATUS}, no-cache-build=${NOCACHE_STATUS}). Creating skip-notification SARIF."
            cat > snyk.sarif <<'SARIF'
          {
            "version": "2.1.0",
            "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json",
            "runs": [{
              "tool": { "driver": { "name": "Snyk", "version": "1.0.0", "rules": [] } },
              "invocations": [{
                "executionSuccessful": true,
                "toolExecutionNotifications": [{
                  "message": { "text": "Scan skipped — image build failed, see workflow logs" },
                  "level": "note"
                }]
              }],
              "results": []
            }]
          }
          SARIF
          fi

      - name: Upload Snyk SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk.sarif
          category: snyk-${{ matrix.service }}
        continue-on-error: true

  # ── Summary gate ───────────────────────────────────────────────────────────
  security-scan-summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    needs: [trivy-deps, trivy-images, snyk-images]
    if: always()
    steps:
      - name: Check scan results
        run: |
          echo "═══════════════════════════════════════════════════"
          echo "  Backend Security Scan — Summary"
          echo "═══════════════════════════════════════════════════"
          echo ""
          echo "| Job | Result |"
          echo "|-----|--------|"
          echo "| Trivy Deps | ${{ needs.trivy-deps.result }} |"
          echo "| Trivy Images | ${{ needs.trivy-images.result }} |"
          echo "| Snyk Images | ${{ needs.snyk-images.result }} |"
          echo ""

          # All scan jobs use continue-on-error / graceful fallback so the
          # summary gate never hard-fails — results are surfaced via SARIF.
          echo "All security scans completed (with graceful fallback on build errors)."
          echo "Review SARIF results in the Security tab → Code scanning alerts."
