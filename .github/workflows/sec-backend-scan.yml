name: Backend Security Scan

# ── TODO-009 Level 4: OWASP Dependency Check + Trivy Container Scan ──────────
#
# Runs:
#   • Weekly (Monday 01:00 UTC = 06:30 LKT) — scheduled sweep
#   • On push to main/develop that touches backend/ files
#   • On demand (workflow_dispatch)
#
# Results: uploaded as SARIF → GitHub Security → Code Scanning alerts
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: "0 1 * * 1"   # Monday 01:00 UTC
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - "docker-compose.yml"
      - ".github/workflows/sec-backend-scan.yml"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # Required to upload SARIF results

# ── Shared environment for all OWASP jobs ────────────────────────────────────
# OWASP Dependency Check NVD download needs significant heap.
env:
  GRADLE_OPTS: "-Xmx2g -Xms512m -XX:MaxMetaspaceSize=512m"
  # Cache-bust key: increment to force fresh NVD download after corruption
  NVD_CACHE_VERSION: "v2"

jobs:
  # ── OWASP Dependency Check — backend/api ────────────────────────────────────
  owasp-api:
    name: OWASP — API
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: backend/api

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-api-${{ hashFiles('backend/api/build.gradle.kts', 'backend/api/settings.gradle.kts') }}
          restore-keys: gradle-${{ runner.os }}-api-

      - name: Cache OWASP NVD database
        uses: actions/cache@v4
        with:
          path: ~/.gradle/dependency-check-data
          key: owasp-nvd-${{ env.NVD_CACHE_VERSION }}-${{ runner.os }}-${{ github.run_id }}
          restore-keys: owasp-nvd-${{ env.NVD_CACHE_VERSION }}-${{ runner.os }}-

      - name: Purge corrupted NVD data if present
        run: |
          DB_FILE="$HOME/.gradle/dependency-check-data/9.0/odc.mv.db"
          if [ -f "$DB_FILE" ]; then
            echo "Existing NVD DB found ($(du -h "$DB_FILE" | cut -f1)). Removing to prevent H2 corruption."
            rm -f "$DB_FILE" "$HOME/.gradle/dependency-check-data/9.0/odc.mv.db.mv.db" 2>/dev/null || true
          fi
        working-directory: .

      - name: Run OWASP Dependency Check
        run: |
          ./gradlew dependencyCheckAnalyze --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx2g -Xms512m" \
            --stacktrace
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        timeout-minutes: 30

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report-api
          path: backend/api/build/reports/dependency-check-report.html
          retention-days: 30
          if-no-files-found: warn

  # ── OWASP Dependency Check — backend/license ────────────────────────────────
  owasp-license:
    name: OWASP — License
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: backend/license

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-license-${{ hashFiles('backend/license/build.gradle.kts') }}
          restore-keys: gradle-${{ runner.os }}-license-

      - name: Cache OWASP NVD database
        uses: actions/cache@v4
        with:
          path: ~/.gradle/dependency-check-data
          key: owasp-nvd-${{ env.NVD_CACHE_VERSION }}-${{ runner.os }}-${{ github.run_id }}
          restore-keys: owasp-nvd-${{ env.NVD_CACHE_VERSION }}-${{ runner.os }}-

      - name: Purge corrupted NVD data if present
        run: |
          DB_FILE="$HOME/.gradle/dependency-check-data/9.0/odc.mv.db"
          if [ -f "$DB_FILE" ]; then
            echo "Existing NVD DB found ($(du -h "$DB_FILE" | cut -f1)). Removing to prevent H2 corruption."
            rm -f "$DB_FILE" "$HOME/.gradle/dependency-check-data/9.0/odc.mv.db.mv.db" 2>/dev/null || true
          fi
        working-directory: .

      - name: Run OWASP Dependency Check
        run: |
          ./gradlew dependencyCheckAnalyze --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx2g -Xms512m" \
            --stacktrace
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        timeout-minutes: 30

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report-license
          path: backend/license/build/reports/dependency-check-report.html
          retention-days: 30
          if-no-files-found: warn

  # ── OWASP Dependency Check — backend/sync ───────────────────────────────────
  owasp-sync:
    name: OWASP — Sync
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: backend/sync

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-sync-${{ hashFiles('backend/sync/build.gradle.kts') }}
          restore-keys: gradle-${{ runner.os }}-sync-

      - name: Cache OWASP NVD database
        uses: actions/cache@v4
        with:
          path: ~/.gradle/dependency-check-data
          key: owasp-nvd-${{ env.NVD_CACHE_VERSION }}-${{ runner.os }}-${{ github.run_id }}
          restore-keys: owasp-nvd-${{ env.NVD_CACHE_VERSION }}-${{ runner.os }}-

      - name: Purge corrupted NVD data if present
        run: |
          DB_FILE="$HOME/.gradle/dependency-check-data/9.0/odc.mv.db"
          if [ -f "$DB_FILE" ]; then
            echo "Existing NVD DB found ($(du -h "$DB_FILE" | cut -f1)). Removing to prevent H2 corruption."
            rm -f "$DB_FILE" "$HOME/.gradle/dependency-check-data/9.0/odc.mv.db.mv.db" 2>/dev/null || true
          fi
        working-directory: .

      - name: Run OWASP Dependency Check
        run: |
          ./gradlew dependencyCheckAnalyze --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx2g -Xms512m" \
            --stacktrace
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        timeout-minutes: 30

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report-sync
          path: backend/sync/build/reports/dependency-check-report.html
          retention-days: 30
          if-no-files-found: warn

  # ── Trivy Container Image Scan ────────────────────────────────────────────────
  trivy-images:
    name: Trivy — Container Image Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        service: [api, license, sync]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image (${{ matrix.service }})
        run: |
          docker build \
            -f backend/${{ matrix.service }}/Dockerfile \
            -t zyntapos-${{ matrix.service }}:scan \
            backend/

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.34.2
        with:
          image-ref: "zyntapos-${{ matrix.service }}:scan"
          format: "sarif"
          output: "trivy-${{ matrix.service }}.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"   # Don't fail the build; alert via SARIF
          timeout: "15m"

      - name: Verify SARIF file exists
        if: always()
        run: |
          if [ ! -f "trivy-${{ matrix.service }}.sarif" ]; then
            echo "::warning::Trivy SARIF not generated for ${{ matrix.service }}. Creating empty SARIF."
            cat > "trivy-${{ matrix.service }}.sarif" <<'SARIF'
          {
            "version": "2.1.0",
            "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json",
            "runs": [{
              "tool": { "driver": { "name": "Trivy", "version": "0.34.2", "rules": [] } },
              "results": []
            }]
          }
          SARIF
          fi

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-${{ matrix.service }}.sarif"
          category: "trivy-${{ matrix.service }}"
        continue-on-error: true

  # ── Summary gate (required check) ───────────────────────────────────────────
  security-scan-summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    needs: [owasp-api, owasp-license, owasp-sync, trivy-images]
    if: always()
    steps:
      - name: Check scan results
        run: |
          echo "═══════════════════════════════════════════════════"
          echo "  Backend Security Scan — Summary"
          echo "═══════════════════════════════════════════════════"
          echo ""
          echo "| Job | Result |"
          echo "|-----|--------|"
          echo "| OWASP API | ${{ needs.owasp-api.result }} |"
          echo "| OWASP License | ${{ needs.owasp-license.result }} |"
          echo "| OWASP Sync | ${{ needs.owasp-sync.result }} |"
          echo "| Trivy Images | ${{ needs.trivy-images.result }} |"
          echo ""

          FAILED=false
          for result in "${{ needs.owasp-api.result }}" "${{ needs.owasp-license.result }}" "${{ needs.owasp-sync.result }}" "${{ needs.trivy-images.result }}"; do
            if [ "$result" = "failure" ]; then
              FAILED=true
            fi
          done

          if [ "$FAILED" = "true" ]; then
            echo "::error::One or more security scans FAILED. Check job logs above."
            exit 1
          else
            echo "✅ All security scans completed successfully."
            echo "Review SARIF results in the Security tab → Code scanning alerts."
          fi
