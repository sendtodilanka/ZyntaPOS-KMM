name: Dependabot Auto-Merge

# ─────────────────────────────────────────────────────────────────────────────
# Automatically enables auto-merge on Dependabot PRs once CI passes.
#
# WHY: Dependabot branches (dependabot/gradle/*, dependabot/github_actions/*)
# do not match the branch patterns in auto-merge.yml, so they never get
# auto-merge enabled. Without this workflow, Dependabot PRs pile up
# indefinitely even when CI is green.
#
# SAFETY:
#   - Only fires on Dependabot PRs (actor check)
#   - Only enables auto-merge; the actual merge is gated by the "Build & Test"
#     required status check configured on main branch protection
#   - Uses squash merge to keep main history linear
#   - Does NOT approve the PR — approval is not required (no required reviewer
#     rule on the main branch protection policy)
# ─────────────────────────────────────────────────────────────────────────────

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Enable Auto-Merge for Dependabot
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Only act on PRs opened by Dependabot
    if: github.actor == 'dependabot[bot]'

    steps:
      - name: Enable auto-merge (squash + delete branch)
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          # Idempotent: skip if already enabled
          EXISTING=$(gh pr view "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --json autoMergeRequest --jq '.autoMergeRequest // empty' 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            echo "Auto-merge already enabled on PR #${{ github.event.pull_request.number }} — skipping"
            exit 0
          fi

          gh pr merge "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --auto \
            --squash \
            --delete-branch
          echo "✅ Auto-merge enabled on Dependabot PR #${{ github.event.pull_request.number }}"

      - name: Write step summary
        run: |
          {
            echo "## Dependabot Auto-Merge Enabled"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **PR** | #${{ github.event.pull_request.number }} |"
            echo "| **Branch** | \`${{ github.head_ref }}\` |"
            echo "| **Status** | ✅ Auto-merge enabled — squash into \`main\` when CI passes |"
          } >> "$GITHUB_STEP_SUMMARY"
