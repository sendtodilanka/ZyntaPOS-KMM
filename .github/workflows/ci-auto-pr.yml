name: "Step[2]: Auto PR & Enable Merge"

# ─────────────────────────────────────────────────────────────────────────────
# PIPELINE POSITION: Step 2 of 7
#
# Fires when Step[1] dispatches "auto-pr-trigger" via repository_dispatch.
# Creates a PR targeting main (or reuses an open one) and enables GitHub's
# native auto-merge (squash + delete branch).
#
# PAT_TOKEN is required so GitHub fires Step[3+4]: CI Gate on the new PR.
# GITHUB_TOKEN cannot trigger subsequent workflow runs — that is a GitHub
# security restriction.
#
# PREREQUISITES (one-time setup in GitHub repo settings):
#   Settings → General → Pull Requests:  Allow auto-merge
#   Settings → Branches → main:          Require status check "Step[3+4]: Build & Test"
#   Settings → Secrets → PAT_TOKEN:      Personal Access Token with "repo" scope
#
# EDGE CASES HANDLED:
#   - Existing PR: reuses open PR for the same branch (idempotent)
#   - Auto-merge already enabled: idempotent check before enabling
#   - PAT_TOKEN missing: falls back to GITHUB_TOKEN with warnings
#   - Branch name parsing: handles feature/*, fix/*, claude/* with slug cleanup
#   - Auto-labeling: applies labels based on branch prefix
# ─────────────────────────────────────────────────────────────────────────────

on:
  repository_dispatch:
    types: [ auto-pr-trigger ]

permissions:
  contents: read

concurrency:
  group: step2-auto-pr-${{ github.event.client_payload.branch }}
  cancel-in-progress: true

jobs:
  auto-pr:
    name: "Step[2]: Auto PR & Enable Merge"
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    permissions:
      contents: write
      pull-requests: write

    steps:
      # gh CLI requires a git repo context to resolve owner/repo
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Derive PR title and labels
        id: meta
        run: |
          BRANCH="${{ github.event.client_payload.branch }}"
          PREFIX="${BRANCH%%/*}"

          TITLE="${BRANCH#*/}"
          TITLE="${TITLE//-/ }"
          TITLE="${TITLE//_/ }"
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

          case "$PREFIX" in
            feature)   LABEL="enhancement" ;;
            fix|hotfix) LABEL="bug" ;;
            claude)    LABEL="ai-generated" ;;
            docs)      LABEL="documentation" ;;
            refactor)  LABEL="refactor" ;;
            perf)      LABEL="performance" ;;
            build|ci)  LABEL="ci/cd" ;;
            test)      LABEL="testing" ;;
            chore)     LABEL="chore" ;;
            style)     LABEL="style" ;;
            *)         LABEL="enhancement" ;;
          esac
          echo "label=$LABEL" >> "$GITHUB_OUTPUT"

      - name: Create or find PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          HAS_PAT_TOKEN: ${{ secrets.PAT_TOKEN != '' }}
        run: |
          BRANCH="${{ steps.meta.outputs.branch }}"
          if [ "$HAS_PAT_TOKEN" != "true" ]; then
            echo "::warning::PAT_TOKEN secret is not set. Using GITHUB_TOKEN fallback."
            echo "::warning::Step[3+4]: CI Gate will NOT be triggered automatically on the PR."
          fi

          # Check for open PR first
          EXISTING=$(gh pr list \
            --head "$BRANCH" \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number // empty' 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already open for branch $BRANCH — reusing"
            echo "pr_number=$EXISTING" >> "$GITHUB_OUTPUT"
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check if the branch HEAD is already in main (nothing new to merge)
          BRANCH_SHA="${{ github.event.client_payload.sha }}"
          if git fetch origin main --depth=50 2>/dev/null && \
             git merge-base --is-ancestor "$BRANCH_SHA" origin/main 2>/dev/null; then
            echo "Branch HEAD $BRANCH_SHA is already in main — nothing to merge"
            echo "pr_number=" >> "$GITHUB_OUTPUT"
            echo "created=false" >> "$GITHUB_OUTPUT"
            echo "already_merged=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Create new PR
          {
            echo "## Automated PR"
            echo ""
            echo "Step[1]: Branch Validate passed before this PR was created."
            echo ""
            echo "**Branch:** \`$BRANCH\`"
            echo ""
            echo "**Pre-merge checks (Step[1] — build-only):**"
            echo "- Build — shared modules (core, domain, data, hal, security)"
            echo "- Build — Android debug APK"
            echo "- Build — Desktop JVM JAR"
            echo ""
            echo "**What happens next:**"
            echo "Step[3+4]: CI Gate runs on this PR (full test + lint + detekt)."
            echo "When all required status checks pass and the branch is up to date"
            echo "with \`main\`, GitHub will automatically squash-merge and delete the"
            echo "source branch."
            echo ""
            printf "> Triggered by \`%s\` — @%s\n" \
              "${{ github.event.client_payload.sha }}" \
              "${{ github.event.client_payload.actor }}"
          } > /tmp/pr_body.md

          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "${{ steps.meta.outputs.title }}" \
            --body-file /tmp/pr_body.md \
            --label "${{ steps.meta.outputs.label }}")

          PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
          echo "Created PR #$PR_NUMBER → $PR_URL"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "created=true" >> "$GITHUB_OUTPUT"

      - name: Ensure label on existing PR
        if: steps.pr.outputs.created == 'false' && steps.pr.outputs.already_merged != 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit "${{ steps.pr.outputs.pr_number }}" \
            --add-label "${{ steps.meta.outputs.label }}" 2>/dev/null || true

      - name: Enable auto-merge (squash + delete branch)
        if: steps.pr.outputs.already_merged != 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr view "${{ steps.pr.outputs.pr_number }}" \
            --json autoMergeRequest --jq '.autoMergeRequest // empty' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "Auto-merge already enabled on PR #${{ steps.pr.outputs.pr_number }} — skipping"
            exit 0
          fi
          gh pr merge "${{ steps.pr.outputs.pr_number }}" \
            --auto \
            --squash \
            --delete-branch
          echo "Auto-merge enabled on PR #${{ steps.pr.outputs.pr_number }}"

      - name: Write pipeline summary
        if: steps.pr.outputs.already_merged != 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr view "${{ steps.pr.outputs.pr_number }}" \
            --json url --jq '.url' 2>/dev/null || \
            echo "https://github.com/${{ github.repository }}/pull/${{ steps.pr.outputs.pr_number }}")

          {
            echo "## Step[1-2] Complete: Branch Validate → Auto PR"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Branch** | \`${{ steps.meta.outputs.branch }}\` |"
            echo "| **Commit** | \`${{ github.event.client_payload.sha }}\` |"
            echo "| **Actor** | @${{ github.event.client_payload.actor }} |"
            echo "| **PR** | [#${{ steps.pr.outputs.pr_number }}]($PR_URL) |"
            echo "| **Label** | \`${{ steps.meta.outputs.label }}\` |"
            echo "| **Step[1] (build validate)** | Passed |"
            echo "| **Step[2] (auto-merge)** | Enabled — squash into \`main\` |"
            echo "| **Branch after merge** | Deleted automatically |"
            echo ""
            echo "### Next"
            echo "Step[3+4]: CI Gate is running full build + lint + detekt + tests on the PR."
          } >> "$GITHUB_STEP_SUMMARY"
