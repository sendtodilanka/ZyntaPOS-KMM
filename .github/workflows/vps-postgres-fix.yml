name: "VPS Postgres Fix"

# One-time fix: add listen_addresses='*' to postgresql.conf and restart stack
# Delete this file after successful run.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "fix" to confirm'
        required: true
        default: ''

permissions:
  contents: read

jobs:
  fix:
    name: "Fix Postgres listen_addresses"
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'fix'

    steps:
      - name: Fix postgres config and restart stack
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 60s
          command_timeout: 5m
          script: |
            set -euo pipefail
            cd /opt/zyntapos

            echo "=== Step 1: Fix postgresql.conf ==="
            CONF="backend/postgres/postgresql.conf"
            if ! grep -q "listen_addresses" "$CONF"; then
              echo "listen_addresses = '*'" >> "$CONF"
              echo "Added listen_addresses to $CONF"
            else
              # Make sure it's set to '*' not localhost
              sed -i "s/^listen_addresses.*/listen_addresses = '*'/" "$CONF"
              echo "Updated listen_addresses in $CONF"
            fi
            grep "listen_addresses" "$CONF"

            echo "=== Step 2: Restart postgres ==="
            docker compose restart postgres
            sleep 20
            docker logs zyntapos_postgres --tail 3 2>&1 | grep "listening on" || true

            echo "=== Step 3: Restart api + license ==="
            docker compose restart api license
            sleep 30

            echo "=== Step 4: Final status ==="
            docker compose ps
