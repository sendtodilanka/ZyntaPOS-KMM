name: Step[2]: Auto PR & Enable Merge

# ─────────────────────────────────────────────────────────────────────────────
# PIPELINE POSITION: Step 2 of 7
#
# Fires only when Step[1] (Branch Validate) completes successfully.
# Creates a PR targeting main (or reuses an open one) and enables GitHub's
# native auto-merge (squash + delete branch).
#
# PAT_TOKEN is required so GitHub fires Step[3+4]: CI Gate on the new PR.
# GITHUB_TOKEN cannot trigger subsequent workflow runs — that is a GitHub
# security restriction. If PAT_TOKEN is absent, a warning is emitted and
# ci.yml will not auto-trigger on the PR.
#
# PREREQUISITES (one-time setup in GitHub repo settings):
#   Settings → General → Pull Requests:  ✅ Allow auto-merge
#   Settings → Branches → main:          ✅ Require status check "Step[3+4]: Build & Test"
#   Settings → Secrets → PAT_TOKEN:      Personal Access Token with "repo" scope
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_run:
    workflows: ["Step[1]: Branch Validate"]
    types: [completed]

permissions:
  contents: read

# Cancel a queued step2 run if a newer step1 completed on the same branch.
concurrency:
  group: step2-auto-pr-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  auto-pr:
    name: Step[2]: Auto PR & Enable Merge
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    # Only proceed if Step[1] was green.
    if: github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: write
      pull-requests: write

    steps:
      # ── Derive a human-readable PR title from the branch name ───────────────
      # e.g.  feature/add-hold-order   →  "add hold order"
      #        fix/M12-cart-rounding    →  "M12 cart rounding"
      #        claude/fix-workflows-abc →  "fix workflows abc"
      - name: Derive PR title
        id: title
        run: |
          # In workflow_run context, head_branch is the triggering branch.
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          TITLE="${BRANCH#*/}"
          TITLE="${TITLE//-/ }"
          TITLE="${TITLE//_/ }"
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"

      # ── Create PR (or reuse an open one) ────────────────────────────────────
      - name: Create PR (skip if already open)
        id: pr
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          HAS_PAT_TOKEN: ${{ secrets.PAT_TOKEN != '' }}
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          if [ "$HAS_PAT_TOKEN" != "true" ]; then
            echo "::warning::PAT_TOKEN secret is not set. Using GITHUB_TOKEN fallback."
            echo "::warning::Step[3+4]: CI Gate will NOT be triggered automatically on the PR."
            echo "::warning::Set PAT_TOKEN (repo scope) to enable fully autonomous merging."
          fi

          # Reuse existing open PR for this branch if one exists
          EXISTING=$(gh pr list \
            --head "$BRANCH" \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number // empty' 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already open for branch $BRANCH — skipping create"
            echo "pr_number=$EXISTING" >> "$GITHUB_OUTPUT"
          else
            {
              echo "## Automated PR"
              echo ""
              echo "Step[1]: Branch Validate passed before this PR was created."
              echo ""
              echo "**Pre-merge checks (Step[1]):**"
              echo "- Build — shared modules (core, domain, data, hal, security)"
              echo "- Build — Android debug APK"
              echo "- Build — Desktop JVM JAR"
              echo "- Android Lint"
              echo "- Detekt static analysis"
              echo "- All JVM tests"
              echo ""
              echo "**What happens next:**"
              echo "Step[3+4]: CI Gate runs on this PR (final safety gate). When all required"
              echo "status checks pass and the branch is up to date with \`main\`, GitHub will"
              echo "automatically squash-merge and delete the source branch."
              echo ""
              printf "> Triggered by \`%s\` — @%s\n" \
                "${{ github.event.workflow_run.head_sha }}" \
                "${{ github.event.workflow_run.actor.login }}"
            } > /tmp/pr_body.md

            PR_URL=$(gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "${{ steps.title.outputs.title }}" \
              --body-file /tmp/pr_body.md)

            PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
            echo "Created PR #$PR_NUMBER → $PR_URL"
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          fi

      # ── Enable auto-merge ───────────────────────────────────────────────────
      # continue-on-error: true prevents a deadlock where a failed enable-auto-merge
      # marks the PR as unstable, causing the next run to fail again.
      - name: Enable auto-merge (squash + delete branch)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr view "${{ steps.pr.outputs.pr_number }}" \
            --json autoMergeRequest --jq '.autoMergeRequest // empty' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "Auto-merge already enabled on PR #${{ steps.pr.outputs.pr_number }} — skipping"
            exit 0
          fi
          gh pr merge "${{ steps.pr.outputs.pr_number }}" \
            --auto \
            --squash \
            --delete-branch
          echo "Auto-merge enabled on PR #${{ steps.pr.outputs.pr_number }}"

      # ── Step Summary ────────────────────────────────────────────────────────
      - name: Write pipeline summary
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr view "${{ steps.pr.outputs.pr_number }}" \
            --json url --jq '.url' 2>/dev/null || \
            echo "https://github.com/${{ github.repository }}/pull/${{ steps.pr.outputs.pr_number }}")

          {
            echo "## Step[1-2] Complete: Branch Validate → Auto PR"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Branch** | \`${{ github.event.workflow_run.head_branch }}\` |"
            echo "| **Commit** | \`${{ github.event.workflow_run.head_sha }}\` |"
            echo "| **Actor** | @${{ github.event.workflow_run.actor.login }} |"
            echo "| **PR** | [#${{ steps.pr.outputs.pr_number }}]($PR_URL) |"
            echo "| **Step[1] (branch validate)** | ✅ Passed |"
            echo "| **Step[2] (auto-merge)** | ✅ Enabled — squash into \`main\` |"
            echo "| **Branch after merge** | Deleted automatically |"
            echo ""
            echo "### Next"
            echo "Step[3+4]: CI Gate is running on the PR."
            echo "The PR will be squash-merged into \`main\` automatically once"
            echo "all required status checks pass."
          } >> "$GITHUB_STEP_SUMMARY"
