name: "Step[6]: Verify Endpoints"
run-name: "${{ github.event.client_payload.title || 'Verify Endpoints' }} (${{ github.event.client_payload.sha || github.event_name }})"

# ─────────────────────────────────────────────────────────────────────────────
# PIPELINE POSITION: Step 6 of 6
#
# Autonomous health monitoring — runs automatically every 30 min AND after
# every deploy (via repository_dispatch from Step[5b]).
#
# SCHEDULE RATIONALE: 30-minute intervals balance detection speed vs.
# Actions-minutes budget (48 runs/day × 10 min = max 480 min/day).
#
# EDGE CASES HANDLED:
#   - Scheduled/manual: always run unconditionally
#   - Rate limiting: 20s curl timeout prevents accumulation
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'
  repository_dispatch:
    types: [ verify-trigger ]

permissions:
  contents: read

jobs:
  verify:
    name: "Step[6]: Verify All Endpoints"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ── Verify endpoints via SSH to bypass Cloudflare ──────────────
      # External curl from GitHub Actions gets 403 from Cloudflare WAF.
      # SSH into VPS and test endpoints locally via Caddy (Host header).
      - name: "Step[6]: Test All Subdomains (via SSH)"
        id: health
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_USER_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 60s
          command_timeout: 3m
          script: |
            set -euo pipefail
            echo "=================================================="
            echo " ZyntaPOS Endpoint Verification"
            echo " Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "=================================================="

            PASS=true

            # Write markdown table for the summary step to fetch
            RESULTS_FILE="/tmp/zyntapos-verify-results.md"
            echo "| Subdomain | /ping | Body | / | Status |" > "$RESULTS_FILE"
            echo "|-----------|-------|------|---|--------|" >> "$RESULTS_FILE"

            # See cd-smoke-rollback.yml for the rationale: we hit HTTPS on port
            # 443 via --resolve <host>:443:127.0.0.1 -k because newer Caddy
            # versions auto-redirect HTTP→HTTPS (308) for any host with a named
            # HTTPS block.
            #
            # docs (Cloudflare Pages) and status (uptime-kuma) do NOT implement
            # the "/ping → 200 ok" liveness contract; their /ping check only
            # requires a 2xx response.
            for sub in api license panel docs status sync; do
              PING_BODY_REQUIRED="ok"
              case "$sub" in
                docs|status) PING_BODY_REQUIRED="" ;;
              esac

              PING_HTTP=$(curl -sk --max-time 10 -o /dev/null \
                -w "%{http_code}" --resolve "${sub}.zyntapos.com:443:127.0.0.1" \
                "https://${sub}.zyntapos.com/ping" 2>/dev/null) || PING_HTTP="000"
              PING_BODY=$(curl -sk --max-time 10 \
                --resolve "${sub}.zyntapos.com:443:127.0.0.1" \
                "https://${sub}.zyntapos.com/ping" 2>/dev/null) || PING_BODY=""
              HOME_HTTP=$(curl -sk --max-time 10 -o /dev/null \
                -w "%{http_code}" --resolve "${sub}.zyntapos.com:443:127.0.0.1" \
                "https://${sub}.zyntapos.com/" 2>/dev/null) || HOME_HTTP="000"

              PING_OK=false
              if [ "$PING_HTTP" = "200" ]; then
                if [ -z "$PING_BODY_REQUIRED" ] || [ "$PING_BODY" = "$PING_BODY_REQUIRED" ]; then
                  PING_OK=true
                fi
              fi

              if $PING_OK; then
                BODY_DISPLAY="${PING_BODY_REQUIRED:-2xx}"
                echo "  ✅  ${sub}.zyntapos.com  /ping → ${PING_HTTP} (${BODY_DISPLAY})  / → ${HOME_HTTP} (informational)"
                echo "| \`${sub}.zyntapos.com\` | \`${PING_HTTP}\` | \`${BODY_DISPLAY}\` | \`${HOME_HTTP}\` | ✅ Healthy |" >> "$RESULTS_FILE"
              else
                echo "  ❌  ${sub}.zyntapos.com  /ping → ${PING_HTTP}  / → ${HOME_HTTP}"
                echo "| \`${sub}.zyntapos.com\` | \`${PING_HTTP}\` | \`${PING_BODY:-—}\` | \`${HOME_HTTP}\` | ❌ Degraded |" >> "$RESULTS_FILE"
                PASS=false
              fi
            done

            echo "=================================================="
            if $PASS; then
              echo "Result: ALL ENDPOINTS HEALTHY ✅"
            else
              echo "Result: ONE OR MORE ENDPOINTS DEGRADED ❌"
              exit 1
            fi
            echo "=================================================="

      # ── Setup SSH for fetching results table from VPS ───────────────
      - name: Setup SSH key
        if: always()
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_USER_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Write verification summary
        if: always()
        run: |
          # Fetch the results table from VPS
          RESULTS=$(ssh -i ~/.ssh/id_deploy -p ${{ secrets.VPS_PORT }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'cat /tmp/zyntapos-verify-results.md 2>/dev/null') || RESULTS=""
          {
            echo "## Step[6]: Endpoint Verification"
            echo ""
            if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
              echo "**Trigger:** post-deploy (Step[5b] completed)  "
            elif [ "${{ github.event_name }}" = "schedule" ]; then
              echo "**Trigger:** scheduled every 30 min  "
            else
              echo "**Trigger:** manual  "
            fi
            echo "**Time:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo ""
            if [ -n "$RESULTS" ]; then
              echo "$RESULTS"
              echo ""
            fi
            if [ "${{ steps.health.outcome }}" = "success" ]; then
              echo "### Result: All 6 endpoints verified healthy ✅"
            else
              echo "### Result: One or more endpoints degraded — check VPS \`docker compose ps\` ❌"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
