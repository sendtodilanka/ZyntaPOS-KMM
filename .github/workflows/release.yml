name: Release

# All platform build jobs (Android APK, Linux DEB, macOS DMG, Windows MSI) have
# been removed to stay within the 2,000 private-repo Actions-minute budget.
#
# macOS runners bill at 10× and Windows at 2× — a single 4-platform release run
# consumed ~200–300 billed minutes. Running on every push drained the monthly
# quota within hours.
#
# To restore cross-platform releases:
#   Option A — Upgrade to GitHub Team plan (3,000 min/month + better multipliers)
#   Option B — Make the repository public (unlimited free minutes)
#   Option C — Set up self-hosted runners (no billed minutes)
#
# VPS deployments continue automatically via deploy.yml on every push to main.

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual release'

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  notice:
    name: Release Builds Disabled
    runs-on: ubuntu-latest
    steps:
      - name: Print notice
        run: |
          echo "Release platform builds are currently disabled."
          echo "Reason: ${{ github.event.inputs.reason }}"
          echo ""
          echo "VPS deployment (deploy.yml) runs automatically on every push to main."
          echo "Re-enable build jobs in this file when ready (see comments above)."
