name: Release

on:
  # TEMPORARILY DISABLED: push trigger removed while cross-platform release
  # packaging is being stabilised. VPS deployments continue unaffected via
  # deploy.yml. Re-enable by adding:
  #   push:
  #     branches: [ main ]
  workflow_dispatch:   # Manual release builds only — trigger from the Actions tab

# Default: restrict all jobs to read-only; individual jobs below
# elevate only the scopes they actually need.
permissions:
  contents: read

# Prevent two release runs from racing on the same push.
# Never cancel in-progress releases — completing a deploy is safer than
# leaving it half-done.
concurrency:
  group: release
  cancel-in-progress: false

env:
  JAVA_VERSION: '21'
  # Use JetBrains JDK — matches ci.yml and auto-merge.yml to ensure the
  # same toolchain is used for all build types and avoids foojay.io downloads.
  JAVA_DISTRIBUTION: 'jetbrains'

jobs:
  # ═════════════════════════════════════════════════════════════════════
  # Android APK (unsigned — JKS keystore not yet created)
  # ═════════════════════════════════════════════════════════════════════
  build-android:
    name: Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Override gradle.properties for CI
        run: echo "org.gradle.java.home=$JAVA_HOME" >> gradle.properties

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Create local.properties
        run: |
          cp local.properties.template local.properties
          sed -i "s|^sdk.dir=.*|sdk.dir=$ANDROID_HOME|" local.properties
          echo "API_BASE_URL=${API_BASE_URL:-https://localhost/api}" >> local.properties
          echo "DB_ENCRYPTION_PASSWORD=${DB_ENCRYPTION_PASSWORD:-ci-placeholder-not-for-production}" >> local.properties
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          DB_ENCRYPTION_PASSWORD: ${{ secrets.DB_ENCRYPTION_PASSWORD }}

      - name: Generate debug keystore for CI signing
        # The release signingConfig falls back to ~/.android/debug.keystore when no
        # RELEASE_KEYSTORE_PATH env var is set.  GitHub Actions runners don't ship with
        # a pre-generated debug keystore, so we create one here to pass validateSigningRelease.
        run: |
          mkdir -p "$HOME/.android"
          keytool -genkeypair -v \
            -keystore "$HOME/.android/debug.keystore" \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build release APK
        # No keystore env vars — Gradle falls back to debug keystore (generated above).
        # Replace with signed config once release.jks is created.
        run: ./gradlew :androidApp:assembleRelease --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: androidApp/build/outputs/apk/release/*.apk
          retention-days: 1

  # ═════════════════════════════════════════════════════════════════════
  # macOS DMG
  # ═════════════════════════════════════════════════════════════════════
  build-macos:
    name: macOS DMG
    runs-on: macos-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Override gradle.properties for CI
        run: echo "org.gradle.java.home=$JAVA_HOME" >> gradle.properties

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Create local.properties
        run: |
          cp local.properties.template local.properties
          # macOS uses BSD sed (requires empty-string backup extension)
          sed -i "" "s|^sdk.dir=.*|sdk.dir=${ANDROID_HOME}|" local.properties
          echo "API_BASE_URL=${API_BASE_URL:-https://localhost/api}" >> local.properties
          echo "DB_ENCRYPTION_PASSWORD=${DB_ENCRYPTION_PASSWORD:-ci-placeholder-not-for-production}" >> local.properties
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          DB_ENCRYPTION_PASSWORD: ${{ secrets.DB_ENCRYPTION_PASSWORD }}

      - name: Package DMG
        run: ./gradlew :composeApp:packageDmg --stacktrace

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: composeApp/build/compose/binaries/main/dmg/*.dmg
          retention-days: 1

  # ═════════════════════════════════════════════════════════════════════
  # Windows MSI
  # ═════════════════════════════════════════════════════════════════════
  build-windows:
    name: Windows MSI
    runs-on: windows-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Override gradle.properties for CI
        shell: bash
        # On Windows, JAVA_HOME contains backslashes which Java's Properties parser drops.
        # cygpath -m converts to forward-slash Windows paths (e.g. C:/foo/bar) that are
        # safe for both Windows FS and Java properties files.
        run: echo "org.gradle.java.home=$(cygpath -m "$JAVA_HOME")" >> gradle.properties

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Create local.properties
        shell: bash
        run: |
          cp local.properties.template local.properties
          SDK_DIR=$(cygpath -m "$ANDROID_HOME")
          sed -i "s|^sdk.dir=.*|sdk.dir=${SDK_DIR}|" local.properties
          echo "API_BASE_URL=${API_BASE_URL:-https://localhost/api}" >> local.properties
          echo "DB_ENCRYPTION_PASSWORD=${DB_ENCRYPTION_PASSWORD:-ci-placeholder-not-for-production}" >> local.properties
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          DB_ENCRYPTION_PASSWORD: ${{ secrets.DB_ENCRYPTION_PASSWORD }}

      - name: Package MSI
        shell: bash
        run: ./gradlew :composeApp:packageMsi --stacktrace

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: composeApp/build/compose/binaries/main/msi/*.msi
          retention-days: 1

  # ═════════════════════════════════════════════════════════════════════
  # Linux DEB
  # ═════════════════════════════════════════════════════════════════════
  build-linux:
    name: Linux DEB
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Override gradle.properties for CI
        run: echo "org.gradle.java.home=$JAVA_HOME" >> gradle.properties

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Create local.properties
        run: |
          cp local.properties.template local.properties
          sed -i "s|^sdk.dir=.*|sdk.dir=$ANDROID_HOME|" local.properties
          echo "API_BASE_URL=${API_BASE_URL:-https://localhost/api}" >> local.properties
          echo "DB_ENCRYPTION_PASSWORD=${DB_ENCRYPTION_PASSWORD:-ci-placeholder-not-for-production}" >> local.properties
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          DB_ENCRYPTION_PASSWORD: ${{ secrets.DB_ENCRYPTION_PASSWORD }}

      - name: Install packaging dependencies
        run: sudo apt-get update && sudo apt-get install -y fakeroot

      - name: Package DEB
        run: ./gradlew :composeApp:packageDeb --stacktrace

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: composeApp/build/compose/binaries/main/deb/*.deb
          retention-days: 1

  # ═════════════════════════════════════════════════════════════════════
  # Create GitHub Release
  # ═════════════════════════════════════════════════════════════════════
  release:
    name: Publish Release
    needs: [ build-android, build-macos, build-windows, build-linux ]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Generate release tag
        id: tag
        run: |
          TAG="v1.0.0-build.${{ github.run_number }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Generated tag: $TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ZyntaPOS ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            release-assets/android-apk/*.apk
            release-assets/macos-dmg/*.dmg
            release-assets/windows-msi/*.msi
            release-assets/linux-deb/*.deb
