name: Release

on:
  push:
    branches: [ main ]

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  # ═════════════════════════════════════════════════════════════════════
  # Android APK
  # ═════════════════════════════════════════════════════════════════════
  build-android:
    name: Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Override gradle.properties for CI
        run: sed -i 's|^org.gradle.java.home=.*|org.gradle.java.home='"$JAVA_HOME"'|' gradle.properties

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Create local.properties
        run: |
          cp local.properties.template local.properties
          sed -i "s|^sdk.dir=.*|sdk.dir=$ANDROID_HOME|" local.properties
          echo "API_BASE_URL=${{ secrets.API_BASE_URL }}" >> local.properties
          echo "DB_ENCRYPTION_PASSWORD=${{ secrets.DB_ENCRYPTION_PASSWORD }}" >> local.properties

      # TODO: Switch to assembleRelease once signing config is added
      - name: Build debug APK
        run: ./gradlew :androidApp:assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: androidApp/build/outputs/apk/debug/*.apk
          retention-days: 1

  # ═════════════════════════════════════════════════════════════════════
  # macOS DMG
  # ═════════════════════════════════════════════════════════════════════
  build-macos:
    name: macOS DMG
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Override gradle.properties for CI
        run: sed -i '' "s|^org.gradle.java.home=.*|org.gradle.java.home=$JAVA_HOME|" gradle.properties

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Package DMG
        run: ./gradlew :composeApp:packageDmg --stacktrace

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: composeApp/build/compose/binaries/main/dmg/*.dmg
          retention-days: 1

  # ═════════════════════════════════════════════════════════════════════
  # Windows EXE
  # ═════════════════════════════════════════════════════════════════════
  build-windows:
    name: Windows EXE
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Override gradle.properties for CI
        shell: bash
        run: sed -i 's|^org.gradle.java.home=.*|org.gradle.java.home='"$JAVA_HOME"'|' gradle.properties

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Package EXE
        run: ./gradlew :composeApp:packageExe --stacktrace

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: composeApp/build/compose/binaries/main/exe/*.exe
          retention-days: 1

  # ═════════════════════════════════════════════════════════════════════
  # Create GitHub Release
  # ═════════════════════════════════════════════════════════════════════
  release:
    name: Publish Release
    needs: [ build-android, build-macos, build-windows ]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Generate release tag
        id: tag
        run: |
          TAG="v1.0.0-build.${{ github.run_number }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Generated tag: $TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ZyntaPOS ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            release-assets/android-apk/*.apk
            release-assets/macos-dmg/*.dmg
            release-assets/windows-exe/*.exe
