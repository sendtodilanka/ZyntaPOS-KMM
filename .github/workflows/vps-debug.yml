name: "VPS Debug Logs"

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  debug:
    name: "Check VPS container logs"
    runs-on: ubuntu-latest

    steps:
      - name: Get container logs and postgres status
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 60s
          command_timeout: 3m
          script: |
            set -euo pipefail
            cd /opt/zyntapos

            echo "=== 1: db_password.txt content (length) ==="
            wc -c secrets/db_password.txt
            od -c secrets/db_password.txt | tail -2

            echo "=== 2: Test TCP auth using password from file ==="
            DB_PASS=$(cat secrets/db_password.txt | tr -d '\n\r')
            echo "Password length used for test: ${#DB_PASS}"
            docker run --rm \
              --network zyntapos_zyntapos_net \
              -e PGPASSWORD="$DB_PASS" \
              postgres:16-alpine \
              psql -h postgres -p 5432 -U zyntapos -d zyntapos -c "SELECT 'TCP_AUTH_OK' as result;" \
              && echo "TCP AUTH SUCCESS" || echo "TCP AUTH FAILED"

            echo "=== 3: What password does postgres have stored? (hash prefix) ==="
            docker exec zyntapos_postgres psql -U zyntapos -d zyntapos \
              -c "SELECT rolname, LEFT(rolpassword, 20) || '...' as pass_hash FROM pg_authid WHERE rolname = 'zyntapos';"

            echo "=== 4: docker compose ps ==="
            docker compose ps

            echo "=== 4b: git log + docker-compose.yml api section ==="
            git log --oneline -3
            grep -A5 "bind mount" docker-compose.yml || true
            # Check if api has volumes or secrets
            python3 -c "
import yaml, sys
with open('docker-compose.yml') as f:
    c = yaml.safe_load(f)
api = c['services']['api']
print('api volumes:', api.get('volumes', 'NONE'))
print('api secrets:', api.get('secrets', 'NONE'))
license = c['services']['license']
print('license volumes:', license.get('volumes', 'NONE'))
print('license secrets:', license.get('secrets', 'NONE'))
"

            echo "=== 4c: What the api container sees at /run/secrets/db_password ==="
            # Get the container id even if restarting
            API_CID=$(docker ps -aqf name=zyntapos_api)
            if [ -n "$API_CID" ]; then
              docker exec "$API_CID" cat /run/secrets/db_password 2>/dev/null \
                && echo "" || echo "exec failed (container not running)"
              docker exec "$API_CID" wc -c /run/secrets/db_password 2>/dev/null \
                || echo "exec wc failed"
            else
              echo "api container not found"
            fi

            echo "=== 4d: Host file vs container file comparison ==="
            HOST_PASS=$(cat secrets/db_password.txt | tr -d '\n\r')
            echo "Host file hex: $(echo -n "$HOST_PASS" | od -A x -t x1z | head -2)"

            echo "=== 5: API logs (last 40) ==="
            docker logs zyntapos_api --tail 40 2>&1 | tail -40

            echo "=== 6: License logs (last 20) ==="
            docker logs zyntapos_license --tail 20 2>&1 | tail -20
