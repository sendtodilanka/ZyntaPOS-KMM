name: "Step[7]: Verify Endpoints"

# Runs automatically every 30 min AND after every deploy — no human trigger needed.
#
# SCHEDULE RATIONALE: 15-minute intervals (*/15) generate 96 runs/day.
# For a private repo on a standard GitHub plan this can exhaust the included
# Actions-minutes budget rapidly (96 × 10 min timeout = up to 960 min/day).
# 30-minute intervals halve that cost while still detecting outages quickly.
# Adjust back to */15 only if SLA requirements demand sub-30-min detection.
on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'   # Every 30 minutes — autonomous health monitoring
  workflow_run:
    workflows: ["Step[6]: Smoke Test & Rollback"]
    types: [completed]        # Auto-verify after smoke test confirms deployment is stable

# Read-only: this workflow only makes outbound HTTP requests and writes
# to the step summary. No repo write access is needed.
permissions:
  contents: read

jobs:
  verify:
    name: "Step[7]: Smoke Test All Endpoints"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Skip post-deploy verification when the deploy itself failed or was rolled back.
    # Running health checks mid-rollback produces misleading noise.
    # Scheduled and manual triggers always run unconditionally.
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    # Production endpoints (api/license/panel/docs/status/sync.zyntapos.com) do not
    # exist yet (Phase 1 MVP — backend VPS not provisioned). Remove continue-on-error
    # once VPS is live so real outages fail this job and are visible.
    continue-on-error: true

    steps:
      - name: "Step[7]: Test All Subdomains"
        run: |
          PASS=true
          SUBS="api license panel docs status sync"

          # ── Step Summary header ────────────────────────────────────────────
          {
            echo "## 🌐 ZyntaPOS Endpoint Verification"
            echo ""
            if [ "${{ github.event_name }}" = "workflow_run" ]; then
              echo "**Trigger:** post-deploy (deploy: \`${{ github.event.workflow_run.conclusion }}\`)  "
            elif [ "${{ github.event_name }}" = "schedule" ]; then
              echo "**Trigger:** scheduled every 30 min  "
            else
              echo "**Trigger:** manual  "
            fi
            echo "**Time:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo ""
            echo "| Endpoint | /ping | Homepage | Status |"
            echo "|----------|-------|----------|--------|"
          } >> "$GITHUB_STEP_SUMMARY"

          # ── Console header ─────────────────────────────────────────────────
          echo "=================================================="
          echo " ZyntaPOS Endpoint Verification"
          echo " Trigger: ${{ github.event_name }}"
          echo "=================================================="
          echo ""

          for sub in $SUBS; do
            URL_PING="https://${sub}.zyntapos.com/ping"
            URL_HOME="https://${sub}.zyntapos.com/"

            # /ping check
            PING_HTTP=$(curl -sf --max-time 20 -o /dev/null -w "%{http_code}" "$URL_PING" 2>/dev/null || echo "000")
            PING_BODY=$(curl -sf --max-time 20 "$URL_PING" 2>/dev/null || echo "")

            # Homepage check
            HOME_HTTP=$(curl -sf --max-time 20 -o /dev/null -w "%{http_code}" "$URL_HOME" 2>/dev/null || echo "000")

            # Evaluate /ping
            if [ "$PING_HTTP" = "200" ] && [ "$PING_BODY" = "ok" ]; then
              PING_ICON="✅ $PING_HTTP"
              PING_OK=true
            else
              PING_ICON="❌ $PING_HTTP"
              PING_OK=false
            fi

            # Evaluate homepage (2xx or 3xx = healthy)
            HOME_FIRST="${HOME_HTTP:0:1}"
            if [ "$HOME_FIRST" = "2" ] || [ "$HOME_FIRST" = "3" ]; then
              HOME_ICON="✅ $HOME_HTTP"
              HOME_OK=true
            else
              HOME_ICON="❌ $HOME_HTTP"
              HOME_OK=false
            fi

            if $PING_OK && $HOME_OK; then
              ROW="✅ HEALTHY"
              echo "  ✅  ${sub}.zyntapos.com  /ping → $PING_HTTP (ok)  / → $HOME_HTTP"
            else
              ROW="❌ DEGRADED"
              echo "  ❌  ${sub}.zyntapos.com  /ping → $PING_HTTP  / → $HOME_HTTP"
              PASS=false
            fi

            echo "| \`${sub}.zyntapos.com\` | $PING_ICON | $HOME_ICON | $ROW |" >> "$GITHUB_STEP_SUMMARY"
          done

          echo ""
          echo "=================================================="

          echo "" >> "$GITHUB_STEP_SUMMARY"
          if $PASS; then
            echo " Result: ALL ENDPOINTS VERIFIED ✅"
            echo "### ✅ All 6 endpoints verified healthy" >> "$GITHUB_STEP_SUMMARY"
          else
            echo " Result: VERIFICATION FAILED ❌"
            echo " Check the deploy logs and VPS docker compose ps"
            echo "### ❌ One or more endpoints degraded — check VPS \`docker compose ps\`" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "=================================================="
          $PASS || exit 1
