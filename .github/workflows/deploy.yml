name: Deploy to VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deploy'
        required: false
        default: 'Manual trigger'

env:
  DEPLOY_PATH: /opt/zyntapos

jobs:
  deploy:
    name: Deploy to Contabo VPS
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false   # Never cancel an in-progress deploy

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history required for sentry-cli set-commits --auto

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 120s
          command_timeout: 10m
          script: |
            set -euo pipefail
            echo "=== Deploy started: $(date) ==="
            echo "=== Commit: ${{ github.sha }} ==="

            cd ${{ env.DEPLOY_PATH }}

            # Pull latest code
            git fetch origin main
            git reset --hard origin/main

            # Rebuild and restart only changed services (zero downtime for unchanged)
            docker compose pull --quiet
            docker compose up -d --build --remove-orphans

            # Clean up dangling images (free disk space)
            docker image prune -f

            echo "=== Deploy complete: $(date) ==="

            # Print running containers for confirmation
            docker compose ps

      - name: Smoke test all endpoints (with homepage scan + retry)
        if: success()
        id: smoke
        run: |
          echo "=== Waiting 30s for containers to initialise ==="
          sleep 30
          echo "=== Smoke Testing Endpoints ==="

          # ── Step Summary header ──────────────────────────────────────────
          {
            echo "## 🚀 Deploy Smoke Test — \`${{ github.sha }}\`"
            echo ""
            echo "**Deployed at:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo ""
            echo "| Endpoint | /ping | Homepage | Status |"
            echo "|----------|-------|----------|--------|"
          } >> "$GITHUB_STEP_SUMMARY"

          PASS=true

          for sub in api license panel docs status sync; do
            PING_HTTP="000"
            PING_BODY=""

            # /ping — up to 3 attempts (30s apart) while containers are still starting
            for attempt in 1 2 3; do
              PING_HTTP=$(curl -sf --max-time 20 -o /dev/null -w "%{http_code}" \
                "https://${sub}.zyntapos.com/ping" 2>/dev/null || echo "000")
              PING_BODY=$(curl -sf --max-time 20 \
                "https://${sub}.zyntapos.com/ping" 2>/dev/null || echo "")
              [ "$PING_HTTP" = "200" ] && break
              echo "  ⏳ ${sub} /ping attempt $attempt — HTTP $PING_HTTP, retrying in 30s..."
              [ "$attempt" -lt 3 ] && sleep 30
            done

            # Homepage check (2xx or 3xx = healthy)
            HOME_HTTP=$(curl -sf --max-time 20 -o /dev/null -w "%{http_code}" \
              "https://${sub}.zyntapos.com/" 2>/dev/null || echo "000")

            # Evaluate /ping
            if [ "$PING_HTTP" = "200" ] && [ "$PING_BODY" = "ok" ]; then
              PING_ICON="✅ $PING_HTTP"
              PING_OK=true
            else
              PING_ICON="❌ $PING_HTTP"
              PING_OK=false
            fi

            # Evaluate homepage (2xx or 3xx = healthy)
            HOME_FIRST="${HOME_HTTP:0:1}"
            if [ "$HOME_FIRST" = "2" ] || [ "$HOME_FIRST" = "3" ]; then
              HOME_ICON="✅ $HOME_HTTP"
              HOME_OK=true
            else
              HOME_ICON="❌ $HOME_HTTP"
              HOME_OK=false
            fi

            if $PING_OK && $HOME_OK; then
              ROW="✅ HEALTHY"
            else
              ROW="❌ DEGRADED"
              PASS=false
            fi

            echo "  ${sub}.zyntapos.com  /ping → $PING_HTTP  / → $HOME_HTTP"
            echo "| \`${sub}.zyntapos.com\` | $PING_ICON | $HOME_ICON | $ROW |" >> "$GITHUB_STEP_SUMMARY"
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"
          if $PASS; then
            echo "### ✅ All 6 endpoints healthy — deploy verified" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### ❌ Smoke test FAILED — automatic rollback initiated" >> "$GITHUB_STEP_SUMMARY"
          fi

          $PASS || { echo "Smoke test failed — initiating rollback"; exit 1; }

      - name: Rollback to previous commit on smoke test failure
        if: steps.smoke.outcome == 'failure'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 60s
          command_timeout: 5m
          script: |
            set -euo pipefail
            cd ${{ env.DEPLOY_PATH }}
            echo "=== ROLLBACK: smoke test failed for ${{ github.sha }} ==="
            git reset --hard HEAD~1
            PREV_SHA=$(git rev-parse HEAD)
            echo "=== Rolled back to $PREV_SHA ==="
            docker compose up -d --build --remove-orphans
            docker image prune -f
            echo "=== Rollback complete: $(date) ==="
            docker compose ps

      - name: Notify Sentry of deploy
        if: success()
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: zyntapos
        run: |
          curl -sSfL https://sentry.io/get-cli/ | sh -s -- --install-dir /usr/local/bin
          VERSION="${{ github.sha }}"
          sentry-cli releases new "$VERSION" \
            --project zyntapos-api \
            --project zyntapos-license \
            --project zyntapos-sync \
            --project zyntapos-android
          sentry-cli releases set-commits "$VERSION" --auto
          sentry-cli releases finalize "$VERSION"
          sentry-cli releases deploys "$VERSION" new -e production

      - name: Post deploy summary
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Deploy succeeded — ${{ github.sha }}"
          else
            echo "❌ Deploy failed — check logs above"
          fi
          {
            echo ""
            echo "---"
            echo "_Pipeline finished at $(date -u '+%Y-%m-%d %H:%M:%S UTC') — status: **${{ job.status }}**_"
          } >> "$GITHUB_STEP_SUMMARY"
