name: Deploy to VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deploy'
        required: false
        default: 'Manual trigger'

env:
  DEPLOY_PATH: /opt/zyntapos

jobs:
  deploy:
    name: Deploy to Contabo VPS
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false   # Never cancel an in-progress deploy

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 120s
          command_timeout: 10m
          script: |
            set -euo pipefail
            echo "=== Deploy started: $(date) ==="
            echo "=== Commit: ${{ github.sha }} ==="

            cd ${{ env.DEPLOY_PATH }}

            # Pull latest code
            git fetch origin main
            git reset --hard origin/main

            # Rebuild and restart only changed services (zero downtime for unchanged)
            docker compose pull --quiet
            docker compose up -d --build --remove-orphans

            # Clean up dangling images (free disk space)
            docker image prune -f

            echo "=== Deploy complete: $(date) ==="

            # Print running containers for confirmation
            docker compose ps

      - name: Smoke test all endpoints
        if: success()
        run: |
          echo "=== Smoke Testing Endpoints ==="
          PASS=true
          for sub in api license panel docs status sync; do
            STATUS=$(curl -sf --max-time 20 -o /dev/null -w "%{http_code}" \
              "https://${sub}.zyntapos.com/ping" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "  ✅  ${sub}.zyntapos.com — $STATUS"
            else
              echo "  ❌  ${sub}.zyntapos.com — $STATUS (expected 200)"
              PASS=false
            fi
          done
          $PASS || { echo "Smoke test failed — check VPS docker compose ps"; exit 1; }

      - name: Notify Sentry of deploy
        if: success()
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: zyntapos
        run: |
          curl -sSfL https://sentry.io/get-cli/ | sh -s -- --install-dir /usr/local/bin
          VERSION="${{ github.sha }}"
          sentry-cli releases new "$VERSION" \
            --project zyntapos-api \
            --project zyntapos-license \
            --project zyntapos-sync \
            --project zyntapos-android
          sentry-cli releases set-commits "$VERSION" --auto
          sentry-cli releases finalize "$VERSION"
          sentry-cli releases deploys "$VERSION" new -e production

      - name: Post deploy summary
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Deploy succeeded — ${{ github.sha }}"
          else
            echo "❌ Deploy failed — check logs above"
          fi
