name: "Reusable: Build & Test"

# ─────────────────────────────────────────────────────────────────────────────
# SHARED CI LOGIC — Single source of truth for build, lint, and test steps.
#
# Called by:
#   - step1-branch-validate.yml (build-only mode on feature branches)
#   - ci.yml                    (full mode on PRs and main pushes)
#
# This eliminates the copy-paste duplication that caused action-version drift
# between step1 (checkout@v4, setup-gradle@v3) and ci.yml (checkout@v6,
# setup-gradle@v5). Both callers now use identical logic.
#
# EDGE CASES HANDLED:
#   - Gradle daemon reuse: single invocation for all shared module builds
#   - Cache poisoning: cache key includes gradle-wrapper hash + OS
#   - local.properties: created from dev template (no real secrets in CI)
#   - Artifact name collisions: caller provides unique run-id-based suffix
#   - Test flakiness: --continue flag ensures all tests run even if some fail
#   - Timeout: 45-min default (configurable) prevents hung builds from
#     consuming the entire 60-min runner limit
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_call:
    inputs:
      # ── Behaviour toggles ─────────────────────────────────────────────────
      run-tests:
        description: 'Run allTests after build (false = build-only validation)'
        type: boolean
        default: true
      run-lint:
        description: 'Run Android Lint + Detekt (false = skip static analysis)'
        type: boolean
        default: true
      upload-apk:
        description: 'Upload Android debug APK as artifact'
        type: boolean
        default: false
      artifact-retention-days:
        description: 'Days to retain uploaded artifacts'
        type: number
        default: 7
      timeout-minutes:
        description: 'Job timeout in minutes'
        type: number
        default: 45
      # ── Artifact naming ────────────────────────────────────────────────────
      artifact-suffix:
        description: 'Suffix for artifact names to avoid collisions between callers'
        type: string
        default: ''

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-22.04
    timeout-minutes: ${{ inputs.timeout-minutes }}

    # Expose outcome so callers can gate downstream jobs
    outputs:
      build-outcome: ${{ steps.build.outcome }}
      lint-outcome: ${{ steps.lint.outcome }}
      test-outcome: ${{ steps.test.outcome }}

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── Java ──────────────────────────────────────────────────────────────
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      # ── Override daemon JVM to use the CI JDK ─────────────────────────────
      # Prevents Gradle from downloading a JDK via foojay.io on first run.
      # This is a CI-only override — local builds use whatever JDK is configured.
      - name: Point org.gradle.java.home to CI JDK
        run: echo "org.gradle.java.home=$JAVA_HOME" >> gradle.properties

      # ── Gradle ────────────────────────────────────────────────────────────
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # Write cache from all branches so feature branches warm the cache
          # for subsequent runs. The setup-gradle action handles cache key
          # isolation per-branch automatically.
          cache-read-only: false

      # ── Secrets / local.properties ────────────────────────────────────────
      # Uses local.properties.dev (tracked, no real secrets). Debug builds use
      # DevApiService (no-op stub) so backend secrets are never consumed.
      - name: Create local.properties from dev template
        run: ./scripts/setup-local-properties.sh

      # ── Build (single Gradle invocation) ──────────────────────────────────
      # Previous pipeline invoked ./gradlew 7 times (once per module + APK + JAR),
      # each cold-starting the daemon. Single invocation reuses the daemon and
      # lets Gradle parallelise independent module builds.
      - name: Build all modules
        id: build
        run: |
          echo "::group::Build all shared modules + Android APK + Desktop JAR"
          BUILD_START=$(date +%s)

          ./gradlew \
            :shared:core:jvmJar \
            :shared:domain:jvmJar \
            :shared:data:jvmJar \
            :shared:hal:jvmJar \
            :shared:security:jvmJar \
            :androidApp:assembleDebug \
            :composeApp:jvmJar \
            --parallel \
            --stacktrace

          BUILD_END=$(date +%s)
          BUILD_DURATION=$((BUILD_END - BUILD_START))
          echo "build_duration=${BUILD_DURATION}" >> "$GITHUB_OUTPUT"
          echo "::endgroup::"
          echo "Build completed in ${BUILD_DURATION}s"

      # ── Lint + Detekt ─────────────────────────────────────────────────────
      - name: Run Lint & Detekt
        id: lint
        if: inputs.run-lint
        run: |
          echo "::group::Android Lint + Detekt"
          LINT_START=$(date +%s)

          ./gradlew \
            :androidApp:lintDebug \
            detekt \
            --stacktrace

          LINT_END=$(date +%s)
          LINT_DURATION=$((LINT_END - LINT_START))
          echo "lint_duration=${LINT_DURATION}" >> "$GITHUB_OUTPUT"
          echo "::endgroup::"
          echo "Lint + Detekt completed in ${LINT_DURATION}s"

      # ── Upload Detekt SARIF to GitHub Security tab ────────────────────────
      # Uploads static analysis findings so they appear in Security → Code scanning.
      # continue-on-error: true so a missing SARIF file doesn't break the gate.
      - name: Upload Detekt SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always() && inputs.run-lint
        with:
          sarif_file: build/reports/detekt/detekt.sarif
          category: detekt-kotlin
        continue-on-error: true

      # ── Tests ─────────────────────────────────────────────────────────────
      - name: Run all tests
        id: test
        if: inputs.run-tests
        run: |
          echo "::group::All JVM tests"
          TEST_START=$(date +%s)

          ./gradlew allTests \
            --stacktrace \
            --continue

          TEST_END=$(date +%s)
          TEST_DURATION=$((TEST_END - TEST_START))
          echo "test_duration=${TEST_DURATION}" >> "$GITHUB_OUTPUT"
          echo "::endgroup::"
          echo "Tests completed in ${TEST_DURATION}s"

      # ── Timing Summary ───────────────────────────────────────────────────
      - name: Write timing summary
        if: always()
        run: |
          {
            echo "## Build & Test Summary"
            echo ""
            echo "| Phase | Duration | Status |"
            echo "|-------|----------|--------|"
            echo "| Build | ${{ steps.build.outputs.build_duration || '—' }}s | ${{ steps.build.outcome == 'success' && '✅' || '❌' }} |"
            if [ "${{ inputs.run-lint }}" = "true" ]; then
              echo "| Lint + Detekt | ${{ steps.lint.outputs.lint_duration || '—' }}s | ${{ steps.lint.outcome == 'success' && '✅' || steps.lint.outcome == 'skipped' && '⏭️' || '❌' }} |"
            fi
            if [ "${{ inputs.run-tests }}" = "true" ]; then
              echo "| Tests | ${{ steps.test.outputs.test_duration || '—' }}s | ${{ steps.test.outcome == 'success' && '✅' || steps.test.outcome == 'skipped' && '⏭️' || '❌' }} |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      # ── Artifacts ─────────────────────────────────────────────────────────
      - name: Upload APK artifact
        if: inputs.upload-apk && steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: zyntapos-debug-apk${{ inputs.artifact-suffix }}
          path: androidApp/build/outputs/apk/debug/*.apk
          retention-days: ${{ inputs.artifact-retention-days }}

      - name: Upload test reports
        if: always() && inputs.run-tests
        uses: actions/upload-artifact@v4
        with:
          name: test-reports${{ inputs.artifact-suffix }}
          path: '**/build/reports/tests/'
          retention-days: ${{ inputs.artifact-retention-days }}
          # Edge case: if no test reports exist (all tests skipped), don't fail
          if-no-files-found: ignore

      - name: Upload lint & Detekt reports
        if: always() && inputs.run-lint
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports${{ inputs.artifact-suffix }}
          path: |
            **/build/reports/lint-results*.html
            **/build/reports/detekt/
          retention-days: ${{ inputs.artifact-retention-days }}
          if-no-files-found: ignore

      # ── Upload JUnit XML for test reporter ────────────────────────────────
      # dorny/test-reporter needs raw XML, not HTML reports.
      - name: Upload JUnit XML results
        if: always() && inputs.run-tests
        uses: actions/upload-artifact@v4
        with:
          name: junit-xml${{ inputs.artifact-suffix }}
          path: '**/build/test-results/**/TEST-*.xml'
          retention-days: ${{ inputs.artifact-retention-days }}
          if-no-files-found: ignore
