name: OWASP ZAP — API Scan

# ── TODO-010 Level 4: OWASP ZAP Dynamic API Scan ─────────────────────────────
#
# Runs:
#   • Weekly (Tuesday 02:00 UTC — offset from OWASP Dependency Check on Monday)
#   • On demand (workflow_dispatch) with optional target override
#
# Scope: api.zyntapos.com public REST surface (OpenAPI spec-guided scan)
# Results: uploaded as SARIF → GitHub Security → Code Scanning alerts
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: "0 2 * * 2"   # Tuesday 02:00 UTC
  workflow_dispatch:
    inputs:
      target:
        description: "Target URL to scan (default: https://api.zyntapos.com)"
        required: false
        default: "https://api.zyntapos.com"

permissions:
  contents: read
  security-events: write   # Required to upload SARIF results

jobs:
  zap-api-scan:
    name: OWASP ZAP — REST API Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      # ── Check API availability before scanning ──────────────────────────────
      # ZAP fails hard when the target is unreachable (VPS not deployed / down).
      # This step probes the /health endpoint; if unavailable the scan is skipped
      # gracefully so the job still passes (green) rather than blocking the pipeline.
      - name: Check API availability
        id: api-check
        run: |
          TARGET="${{ github.event.inputs.target || 'https://api.zyntapos.com' }}"
          echo "Probing $TARGET/health ..."
          if curl --fail --silent --max-time 15 --retry 2 --retry-delay 5 \
               "$TARGET/health" > /dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "API is available — proceeding with ZAP scan."
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::API is unreachable at $TARGET — ZAP scan will be skipped gracefully."
          fi

      # ── Run ZAP API scan ────────────────────────────────────────────────────
      # Uses the official ZAP GitHub Action which runs the ZAP Docker image
      # in API scan mode (passive + active rules against an OpenAPI target).
      # Skipped when API availability check reports unavailable.
      - name: OWASP ZAP API Scan
        if: steps.api-check.outputs.available == 'true'
        uses: zaproxy/action-api-scan@v0.9.0
        with:
          target: ${{ github.event.inputs.target || 'https://api.zyntapos.com' }}
          format: openapi
          fail_action: false       # Report-only — don't fail the build
          allow_issue_writing: false
          cmd_options: >-
            -z "-config api.disablekey=true"
            -c zap_rules.tsv

      # ── Ensure SARIF exists even if ZAP finds nothing ───────────────────────
      - name: Verify SARIF file exists
        if: always()
        run: |
          if [ ! -f "zap-sarif.json" ]; then
            echo "::warning::ZAP SARIF not generated. Creating empty SARIF."
            cat > zap-sarif.json <<'SARIF'
          {
            "version": "2.1.0",
            "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json",
            "runs": [{
              "tool": { "driver": { "name": "OWASP ZAP", "version": "2.15.0", "rules": [] } },
              "results": []
            }]
          }
          SARIF
          fi

      # ── Upload SARIF to GitHub Security tab ─────────────────────────────────
      - name: Upload ZAP SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: zap-sarif.json
          category: zap-api
        continue-on-error: true

      # ── Upload HTML report as artifact ──────────────────────────────────────
      - name: Upload ZAP HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: |
            zap-sarif.json
            report_html.html
          retention-days: 30
          if-no-files-found: warn

      # ── Write summary ────────────────────────────────────────────────────────
      - name: Write scan summary
        if: always()
        run: |
          TARGET="${{ github.event.inputs.target || 'https://api.zyntapos.com' }}"
          AVAILABLE="${{ steps.api-check.outputs.available }}"
          {
            echo "## OWASP ZAP API Scan"
            echo ""
            echo "**Target:** \`$TARGET\`"
            echo "**Time:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "**Trigger:** ${{ github.event_name }}"
            echo "**API Available:** $AVAILABLE"
            echo ""
            if [ "$AVAILABLE" = "true" ]; then
              echo "SARIF results uploaded to **Security → Code scanning alerts** (category: \`zap-api\`)."
              echo ""
              echo "> ZAP runs in report-only mode — alerts do not fail the build."
              echo "> Review findings in the Security tab and triage accordingly."
            else
              echo "> **Scan skipped** — API endpoint is unreachable (VPS not deployed or down)."
              echo "> An empty SARIF was uploaded to keep the Security tab entry active."
              echo "> Re-run this workflow manually once the VPS is deployed."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
