name: "Step[5]: Deploy + Smoke"
run-name: "${{ github.event.client_payload.title || 'Deploy + Smoke' }} (${{ github.event.client_payload.sha || github.sha }})"

# ─────────────────────────────────────────────────────────────────────────────
# PIPELINE POSITION: Step 5 of 6
#
# Fires when CI Gate dispatches "deploy-trigger" via repository_dispatch,
# or manually via workflow_dispatch. Connects to the Contabo VPS via SSH
# and deploys the exact SHA that CI verified.
#
# CHAINING (Option 4 — workflow_call):
# Step[5b] (Smoke Test) is called directly via workflow_call from the `smoke`
# job below — NOT via repository_dispatch. This keeps the "production-deploy"
# concurrency lock held for the ENTIRE deploy + smoke duration, preventing the
# parallel-deploy race condition where Deploy N+1 overwrites the VPS while
# Smoke N is still testing those containers.
#
# EDGE CASES HANDLED:
#   - Race condition: "production-deploy" lock covers deploy + smoke atomically
#   - Concurrent deploys: concurrency group ensures only one deploy at a time
#   - Manual trigger: operator can deploy any time (bypasses CI gate)
#   - SSH timeout: 120s connect, 25m command (covers 3×300s pull + up + Caddy)
#   - Docker compose validation: config check before deploy
#   - Disk space: prunes dangling images after deploy
# ─────────────────────────────────────────────────────────────────────────────

on:
  repository_dispatch:
    types: [ deploy-trigger ]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deploy'
        required: false
        default: 'Manual trigger'

permissions:
  contents: read
  deployments: write

# ── Workflow-level concurrency ───────────────────────────────────────────────
# MUST be at workflow level (not job level) so the "production-deploy" lock is
# held for the ENTIRE workflow run — covering both the deploy job AND the smoke
# job. A job-level concurrency lock is released when that job completes, which
# would free the lock before smoke starts and allow Deploy N+1 to overwrite the
# VPS while Smoke N is still testing those containers.
concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  DEPLOY_PATH: /opt/zyntapos

jobs:
  deploy:
    name: "Step[5]: Deploy to Contabo VPS"
    runs-on: ubuntu-latest
    environment: production
    outputs:
      deploy_sha: ${{ steps.sha.outputs.deploy_sha }}

    steps:
      - name: Resolve deploy SHA
        id: sha
        run: |
          # repository_dispatch carries SHA in client_payload; workflow_dispatch uses github.sha
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            DEPLOY_SHA="${{ github.event.client_payload.sha }}"
          else
            DEPLOY_SHA="${{ github.sha }}"
          fi
          echo "deploy_sha=$DEPLOY_SHA" >> "$GITHUB_OUTPUT"
          echo "Deploying SHA: $DEPLOY_SHA"
          echo "deploy_start=$(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_OUTPUT"

      - name: Wait for VPS SSH readiness
        run: |
          echo "Checking VPS SSH availability..."
          for i in 1 2 3 4; do
            if nc -z -w 10 "${{ secrets.VPS_HOST }}" "${{ secrets.VPS_PORT }}" 2>/dev/null; then
              echo "SSH port ${{ secrets.VPS_PORT }} is open"
              exit 0
            fi
            echo "SSH not ready (attempt $i/4) — waiting 15s..."
            sleep 15
          done
          echo "::error::VPS SSH port ${{ secrets.VPS_PORT }} unreachable after 4 attempts"
          exit 1

      - name: Record pre-deploy state
        id: pre_deploy
        uses: appleboy/ssh-action@v1.2.5
        continue-on-error: true
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_USER_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 30s
          command_timeout: 1m
          script: |
            set -euo pipefail
            cd ${{ env.DEPLOY_PATH }}
            PREV_SHA=$(git rev-parse HEAD 2>/dev/null || echo "none")
            echo "Previous SHA: $PREV_SHA"

      - name: Pre-deploy DB backup
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_USER_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 30s
          command_timeout: 5m
          script: |
            set -euo pipefail
            BACKUP_DIR="/opt/zyntapos/backups"
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            mkdir -p "$BACKUP_DIR"

            echo "=== Pre-deploy DB backup: $TIMESTAMP ==="

            # Backup API database
            docker compose -f /opt/zyntapos/docker-compose.yml exec -T postgres \
              pg_dump -U zyntapos -d zyntapos_api --format=custom \
              > "$BACKUP_DIR/zyntapos_api_${TIMESTAMP}.dump" 2>/dev/null && \
              echo "OK: zyntapos_api backed up" || \
              echo "WARN: zyntapos_api backup skipped (DB may not exist yet)"

            # Backup License database
            docker compose -f /opt/zyntapos/docker-compose.yml exec -T postgres \
              pg_dump -U zyntapos -d zyntapos_license --format=custom \
              > "$BACKUP_DIR/zyntapos_license_${TIMESTAMP}.dump" 2>/dev/null && \
              echo "OK: zyntapos_license backed up" || \
              echo "WARN: zyntapos_license backup skipped (DB may not exist yet)"

            # Prune old backups — keep last 10
            ls -t "$BACKUP_DIR"/zyntapos_api_*.dump 2>/dev/null | tail -n +11 | xargs rm -f 2>/dev/null || true
            ls -t "$BACKUP_DIR"/zyntapos_license_*.dump 2>/dev/null | tail -n +11 | xargs rm -f 2>/dev/null || true

            echo "=== Backups in $BACKUP_DIR ==="
            ls -lh "$BACKUP_DIR"/*.dump 2>/dev/null | tail -5 || echo "(no backups)"

      - name: Pre-deploy Flyway migration dry-run
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_USER_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 30s
          command_timeout: 3m
          script: |
            set -euo pipefail
            cd /opt/zyntapos
            DEPLOY_SHA="${{ steps.sha.outputs.deploy_sha }}"

            echo "=== Flyway migration dry-run for SHA: $DEPLOY_SHA ==="

            # Fetch new code to check migrations without deploying yet
            git fetch origin
            git -c advice.detachedHead=false checkout "$DEPLOY_SHA" -- \
              backend/api/src/main/resources/db/migration/ \
              backend/license/src/main/resources/db/migration/ 2>/dev/null || true

            # Validate API migrations (info shows pending without applying)
            if docker compose exec -T zyntapos-api java -cp '/app/*' \
              org.flywaydb.commandline.Main info 2>/dev/null; then
              echo "OK: API Flyway info passed"
            else
              echo "WARN: API Flyway info check skipped (service may not support CLI)"
            fi

            # Restore working tree to current state
            git checkout HEAD -- \
              backend/api/src/main/resources/db/migration/ \
              backend/license/src/main/resources/db/migration/ 2>/dev/null || true

            echo "=== Migration dry-run complete ==="

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_USER_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 120s
          command_timeout: 25m
          script: |
            set -euo pipefail
            DEPLOY_SHA="${{ steps.sha.outputs.deploy_sha }}"
            echo "=== Deploy started: $(date) ==="
            echo "=== Target SHA: $DEPLOY_SHA ==="

            cd ${{ env.DEPLOY_PATH }}

            PREV_SHA=$(git rev-parse HEAD 2>/dev/null || echo "none")
            echo "=== Pre-deploy SHA: $PREV_SHA ==="

            # Save pre-deploy SHA so smoke test rollback can restore exactly this
            # commit (not HEAD~1, which is fragile when rapid deploys occur).
            echo "$PREV_SHA" > /tmp/zyntapos-prev-sha-${DEPLOY_SHA}

            git fetch origin
            git reset --hard "$DEPLOY_SHA"

            echo "=== Authenticating with GHCR ==="
            echo "${{ secrets.PAT_TOKEN }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin

            echo "=== Validating Docker Compose config ==="
            docker compose config --quiet

            # Ensure secret files are world-readable so container non-root users can read them.
            # rs256_private_key.pem is created with 600 by default (ssh-keygen / openssl),
            # but the zyntapos container user (Alpine system UID) is not the file owner.
            for secret_file in secrets/rs256_private_key.pem secrets/rs256_public_key.pem; do
              if [ -f "$secret_file" ]; then
                chmod 644 "$secret_file"
                echo "OK: chmod 644 $secret_file"
              else
                echo "::warning::Secret file not found: $secret_file — containers may fail to start"
              fi
            done

            # Ensure mail.zyntapos.com cert files exist so Caddy can start.
            # The real LE cert is issued by cert-renew-mail.yml (DNS-01);
            # this creates a temporary self-signed placeholder if missing.
            CERTS_DIR=backend/caddy/certs
            if [ ! -f "$CERTS_DIR/mail.zyntapos.com.pem" ]; then
              echo "=== Creating placeholder cert for mail.zyntapos.com ==="
              openssl req -x509 -nodes -days 7 -newkey rsa:2048 \
                -keyout "$CERTS_DIR/mail.zyntapos.com.key" \
                -out "$CERTS_DIR/mail.zyntapos.com.pem" \
                -subj '/CN=mail.zyntapos.com' 2>/dev/null
              chmod 644 "$CERTS_DIR/mail.zyntapos.com.pem" "$CERTS_DIR/mail.zyntapos.com.key"
              echo "=== Placeholder created — run cert-renew-mail workflow for real LE cert ==="
            fi

            PULL_SUCCESS=false
            for pull_attempt in 1 2 3; do
              echo "=== docker compose pull (attempt ${pull_attempt}/3) ==="
              if timeout 300 docker compose pull --quiet; then
                PULL_SUCCESS=true
                break
              fi
              echo "::warning::docker compose pull attempt ${pull_attempt} failed — retrying in 10s..."
              sleep 10
            done
            if [ "$PULL_SUCCESS" = "false" ]; then
              echo "::error::docker compose pull failed after 3 attempts — aborting deploy"
              exit 1
            fi
            docker compose up -d --remove-orphans
            docker image prune -f

            # Reload Caddy config — the Caddyfile is bind-mounted and updated
            # by git reset, but Caddy only reads config at startup unless
            # explicitly reloaded. Without this, new routes (e.g. /health)
            # won't take effect until the Caddy container is recreated.
            if ! docker compose exec -T caddy caddy reload --config /etc/caddy/Caddyfile 2>&1; then
              echo "::warning::Caddy reload failed — Caddy is running but serving previous config. Check Caddyfile syntax."
            fi

            echo "=== Deploy complete: $(date) ==="
            docker compose ps

      - name: Post deploy summary
        if: always()
        run: |
          DEPLOY_END=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          STATUS="${{ job.status }}"

          if [ "$STATUS" = "success" ]; then
            echo "Deploy succeeded — ${{ steps.sha.outputs.deploy_sha }}"
          else
            echo "Deploy failed — check logs above"
          fi

          {
            echo "## Step[5]: Deploy to VPS"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **SHA** | \`${{ steps.sha.outputs.deploy_sha }}\` |"
            echo "| **Status** | **${STATUS}** |"
            echo "| **Started** | ${{ steps.sha.outputs.deploy_start }} |"
            echo "| **Finished** | ${DEPLOY_END} |"
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "| **Trigger** | Manual — ${{ github.event.inputs.reason }} |"
            else
              echo "| **Trigger** | Auto — CI Gate passed on main |"
            fi
            echo ""
            if [ "$STATUS" = "success" ]; then
              echo "> Step[5b]: Smoke Test running (workflow_call — production-deploy lock held)."
            else
              echo "> Deploy failed. Step[5b] will NOT run."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Step[5b]: Smoke Test & Rollback (workflow_call) ─────────────────────────
  # Called directly so the "production-deploy" concurrency lock stays held for
  # the full deploy + smoke window. A second deploy cannot start until smoke
  # completes (or rolls back), preventing the race condition where Deploy N+1
  # overwrites the VPS while Smoke N is still testing those containers.
  smoke:
    name: "Step[5b]: Smoke Test & Rollback"
    needs: deploy
    if: needs.deploy.result == 'success'
    uses: ./.github/workflows/cd-smoke-rollback.yml
    with:
      sha: ${{ needs.deploy.outputs.deploy_sha }}
      title: ${{ github.event.client_payload.title || github.event.inputs.reason || '' }}
    secrets: inherit
