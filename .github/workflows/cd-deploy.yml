name: "Step[5]: Deploy to VPS"
run-name: "Step[5]: Deploy to VPS — ${{ github.event.client_payload.sha || github.sha }}"

# ─────────────────────────────────────────────────────────────────────────────
# PIPELINE POSITION: Step 5 of 7
#
# Fires when CI Gate dispatches "deploy-trigger" via repository_dispatch,
# or manually via workflow_dispatch. Connects to the Contabo VPS via SSH
# and deploys the exact SHA that CI verified.
#
# CHAINING: On success, dispatches "smoke-trigger" to start Step[6].
# Uses repository_dispatch instead of workflow_run to avoid ghost workflow
# interference.
#
# EDGE CASES HANDLED:
#   - Race condition: deploys exact SHA from dispatch payload, not current HEAD
#   - Concurrent deploys: concurrency group ensures only one deploy at a time
#   - Manual trigger: operator can deploy any time (bypasses CI gate)
#   - SSH timeout: 120s connect, 10m command (covers slow Docker pulls)
#   - Docker compose validation: config check before deploy
#   - Disk space: prunes dangling images after deploy
# ─────────────────────────────────────────────────────────────────────────────

on:
  repository_dispatch:
    types: [ deploy-trigger ]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deploy'
        required: false
        default: 'Manual trigger'

permissions:
  contents: read
  deployments: write

env:
  DEPLOY_PATH: /opt/zyntapos

jobs:
  deploy:
    name: "Step[5]: Deploy to Contabo VPS"
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false

    steps:
      - name: Resolve deploy SHA
        id: sha
        run: |
          # repository_dispatch carries SHA in client_payload; workflow_dispatch uses github.sha
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            DEPLOY_SHA="${{ github.event.client_payload.sha }}"
          else
            DEPLOY_SHA="${{ github.sha }}"
          fi
          echo "deploy_sha=$DEPLOY_SHA" >> "$GITHUB_OUTPUT"
          echo "Deploying SHA: $DEPLOY_SHA"
          echo "deploy_start=$(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_OUTPUT"

      - name: Record pre-deploy state
        id: pre_deploy
        uses: appleboy/ssh-action@v1.2.5
        continue-on-error: true
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_USER_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 30s
          command_timeout: 1m
          script: |
            set -euo pipefail
            cd ${{ env.DEPLOY_PATH }}
            PREV_SHA=$(git rev-parse HEAD 2>/dev/null || echo "none")
            echo "Previous SHA: $PREV_SHA"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_USER_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 120s
          command_timeout: 10m
          script: |
            set -euo pipefail
            DEPLOY_SHA="${{ steps.sha.outputs.deploy_sha }}"
            echo "=== Deploy started: $(date) ==="
            echo "=== Target SHA: $DEPLOY_SHA ==="

            cd ${{ env.DEPLOY_PATH }}

            PREV_SHA=$(git rev-parse HEAD 2>/dev/null || echo "none")
            echo "=== Pre-deploy SHA: $PREV_SHA ==="

            git fetch origin
            git reset --hard "$DEPLOY_SHA"

            echo "=== Authenticating with GHCR ==="
            echo "${{ secrets.PAT_TOKEN }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin

            echo "=== Validating Docker Compose config ==="
            docker compose config --quiet

            docker compose pull --quiet
            docker compose up -d --remove-orphans
            docker image prune -f

            echo "=== Deploy complete: $(date) ==="
            docker compose ps

      # ── Chain to Step[6]: Smoke Test ─────────────────────────────────────
      - name: Dispatch smoke test
        if: success()
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}
          event-type: smoke-trigger
          client-payload: '{"sha": "${{ steps.sha.outputs.deploy_sha }}", "deploy_run_id": "${{ github.run_id }}"}'

      - name: Post deploy summary
        if: always()
        run: |
          DEPLOY_END=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          STATUS="${{ job.status }}"

          if [ "$STATUS" = "success" ]; then
            echo "Deploy succeeded — ${{ steps.sha.outputs.deploy_sha }}"
          else
            echo "Deploy failed — check logs above"
          fi

          {
            echo "## Step[5]: Deploy to VPS"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **SHA** | \`${{ steps.sha.outputs.deploy_sha }}\` |"
            echo "| **Status** | **${STATUS}** |"
            echo "| **Started** | ${{ steps.sha.outputs.deploy_start }} |"
            echo "| **Finished** | ${DEPLOY_END} |"
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "| **Trigger** | Manual — ${{ github.event.inputs.reason }} |"
            else
              echo "| **Trigger** | Auto — CI Gate passed on main |"
            fi
            echo ""
            if [ "$STATUS" = "success" ]; then
              echo "> Step[6]: Smoke Test dispatched."
            else
              echo "> Deploy failed. Step[6] will NOT run."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
