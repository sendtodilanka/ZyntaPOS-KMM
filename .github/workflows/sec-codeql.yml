name: CodeQL — Kotlin/JVM Source Scanning

# ── TODO-009 Level 4 Extension: SAST via GitHub CodeQL ───────────────────────
#
# Scans all Kotlin/JVM source code for security vulnerabilities including:
#   • Injection attacks (SQL, command, LDAP)
#   • Insecure cryptography usage
#   • Hardcoded credentials / sensitive data exposure
#   • Path traversal and unsafe deserialization
#   • Android-specific security issues (exported components, WebView, etc.)
#
# Results: uploaded as SARIF → GitHub Security → Code Scanning alerts
#   Categories: codeql-kotlin-kmp, codeql-kotlin-backend-api,
#               codeql-kotlin-backend-license, codeql-kotlin-backend-sync
#
# Triggers:
#   • Push to main / develop (catches merged code immediately)
#   • Weekly schedule — Wednesday 02:00 UTC (offset from OWASP Monday)
#   • Manual dispatch
#
# NOTE: PR trigger intentionally removed — CodeQL takes 60 min per run and is
# report-only (SARIF → Security tab). Push-to-main coverage is sufficient;
# removing the PR trigger saves ~60 min × every PR opened.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main, develop]
  schedule:
    - cron: "0 2 * * 3"   # Wednesday 02:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # Required to upload SARIF results
  actions: read            # Required for private repositories

jobs:
  # ── CodeQL — KMP shared + composeApp modules ────────────────────────────────
  codeql-kmp:
    name: CodeQL — KMP Modules
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Create local.properties from dev template
        run: ./scripts/setup-local-properties.sh

      # CodeQL init — Java language covers Kotlin source files
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          config: |
            name: "ZyntaPOS KMP CodeQL Config"
            paths:
              - shared
              - composeApp
            paths-ignore:
              - "**/*.md"
              - "**/build/**"
              - "**/generated/**"
              - "shared/seed/**"
              - "tools/debug/**"
            queries:
              - uses: security-and-quality
          build-mode: manual

      # Build KMP shared + compose modules so CodeQL can extract bytecode.
      # --no-build-cache is REQUIRED: if Gradle uses cached outputs, kotlinc
      # never runs and CodeQL's tracer captures nothing, causing exit code 32.
      - name: Build KMP modules for CodeQL extraction
        run: |
          ./gradlew \
            :shared:core:compileKotlinJvm \
            :shared:domain:compileKotlinJvm \
            :shared:data:compileKotlinJvm \
            :shared:hal:compileKotlinJvm \
            :shared:security:compileKotlinJvm \
            :composeApp:compileKotlinJvm \
            --no-build-cache \
            --parallel \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4g -Xms512m"

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "codeql-kotlin-kmp"
          output: codeql-results-kmp
          upload: failure-only   # We upload manually below for control

      - name: Upload CodeQL SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: codeql-results-kmp
          category: "codeql-kotlin-kmp"
        continue-on-error: true

  # ── CodeQL — backend/api ─────────────────────────────────────────────────────
  codeql-backend-api:
    name: CodeQL — Backend API
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend/api

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          config: |
            name: "ZyntaPOS Backend API CodeQL Config"
            paths:
              - backend/api/src
            paths-ignore:
              - "**/build/**"
              - "**/generated/**"
            queries:
              - uses: security-and-quality
          build-mode: manual

      - name: Build backend/api for CodeQL extraction
        run: |
          chmod +x ./gradlew
          ./gradlew compileKotlin --no-build-cache --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx2g -Xms512m"

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "codeql-kotlin-backend-api"
          output: codeql-results-api
          upload: failure-only

      - name: Upload CodeQL SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: codeql-results-api
          category: "codeql-kotlin-backend-api"
        continue-on-error: true

  # ── CodeQL — backend/license ─────────────────────────────────────────────────
  codeql-backend-license:
    name: CodeQL — Backend License
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend/license

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          config: |
            name: "ZyntaPOS Backend License CodeQL Config"
            paths:
              - backend/license/src
            paths-ignore:
              - "**/build/**"
              - "**/generated/**"
            queries:
              - uses: security-and-quality
          build-mode: manual

      - name: Build backend/license for CodeQL extraction
        run: |
          chmod +x ./gradlew
          ./gradlew compileKotlin --no-build-cache --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx2g -Xms512m"

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "codeql-kotlin-backend-license"
          output: codeql-results-license
          upload: failure-only

      - name: Upload CodeQL SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: codeql-results-license
          category: "codeql-kotlin-backend-license"
        continue-on-error: true

  # ── CodeQL — backend/sync ────────────────────────────────────────────────────
  codeql-backend-sync:
    name: CodeQL — Backend Sync
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend/sync

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          config: |
            name: "ZyntaPOS Backend Sync CodeQL Config"
            paths:
              - backend/sync/src
            paths-ignore:
              - "**/build/**"
              - "**/generated/**"
            queries:
              - uses: security-and-quality
          build-mode: manual

      - name: Build backend/sync for CodeQL extraction
        run: |
          chmod +x ./gradlew
          ./gradlew compileKotlin --no-build-cache --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx2g -Xms512m"

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "codeql-kotlin-backend-sync"
          output: codeql-results-sync
          upload: failure-only

      - name: Upload CodeQL SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: codeql-results-sync
          category: "codeql-kotlin-backend-sync"
        continue-on-error: true

  # ── Summary gate ─────────────────────────────────────────────────────────────
  codeql-summary:
    name: CodeQL Summary
    runs-on: ubuntu-latest
    needs: [codeql-kmp, codeql-backend-api, codeql-backend-license, codeql-backend-sync]
    if: always()
    steps:
      - name: Check CodeQL results
        run: |
          echo "═══════════════════════════════════════════════════"
          echo "  CodeQL SAST Scan — Summary"
          echo "═══════════════════════════════════════════════════"
          echo ""
          echo "| Job | Result |"
          echo "|-----|--------|"
          echo "| KMP Modules | ${{ needs.codeql-kmp.result }} |"
          echo "| Backend API | ${{ needs.codeql-backend-api.result }} |"
          echo "| Backend License | ${{ needs.codeql-backend-license.result }} |"
          echo "| Backend Sync | ${{ needs.codeql-backend-sync.result }} |"
          echo ""
          echo "Review findings: GitHub → Security tab → Code scanning alerts"
          echo "Filter by: codeql-kotlin-kmp / codeql-kotlin-backend-*"
