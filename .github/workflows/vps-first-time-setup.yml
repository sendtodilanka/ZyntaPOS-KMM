name: "VPS First-Time Setup"

# ─────────────────────────────────────────────────────────────────────────────
# ONE-TIME SETUP — run this once to initialise /opt/zyntapos on the Contabo VPS.
# After this workflow succeeds, delete this file (or it will sit harmlessly).
#
# Uses ROOT credentials (VPS_ROOT / VPS_ROOT_KEY) because first-time setup
# needs system-level access: installing Docker, creating the deploy user,
# configuring firewall, etc.
#
# What it does:
#   1. Installs Docker + Docker Compose plugin (if missing)
#   2. Creates "deploy" user with Docker group membership
#   3. Sets up deploy user's SSH authorized_keys from VPS_DEPLOY_PUBKEY
#   4. Creates /opt/zyntapos owned by deploy user, clones the repo
#   5. Creates secrets/ (DB password, RS256 JWT keys) and .env
#   6. Creates self-signed TLS cert if missing
#   7. Pulls GHCR images and starts the stack
#
# After setup, all other workflows use deploy user (VPS_USER / VPS_USER_KEY).
#
# Required secrets:
#   VPS_HOST, VPS_PORT          — VPS connection
#   VPS_ROOT, VPS_ROOT_KEY      — root SSH credentials (this workflow only)
#   VPS_USER                    — deploy username (default: "deploy")
#   VPS_USER_KEY      — deploy user's SSH private key
#   PAT_TOKEN                   — GitHub PAT for GHCR image pull
#
# Trigger: Actions → "VPS First-Time Setup" → Run workflow
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "setup" to confirm first-time setup'
        required: true
        default: ''

permissions:
  contents: read

jobs:
  setup:
    name: "First-Time VPS Setup"
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'setup'

    steps:
      # ── Phase 1: Root — system-level setup ──────────────────────────
      - name: "Phase 1: System setup (as root)"
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_ROOT }}
          key: ${{ secrets.VPS_ROOT_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 120s
          command_timeout: 10m
          script: |
            set -euo pipefail
            echo "=== ZyntaPOS VPS First-Time Setup — Phase 1 (root) ==="
            echo "=== Started: $(date) ==="

            # ── 1. Install Docker (skip if already present) ───────────────
            if ! command -v docker &>/dev/null; then
              echo "--- Installing Docker ---"
              curl -fsSL https://get.docker.com | sh
              echo "--- Docker installed: $(docker --version) ---"
            else
              echo "--- Docker already installed: $(docker --version) ---"
            fi

            # Ensure Docker Compose plugin is available
            docker compose version || (echo "ERROR: docker compose not found" && exit 1)

            # ── 2. Create deploy user (skip if exists) ────────────────────
            DEPLOY_USER="${{ secrets.VPS_USER }}"
            if id "$DEPLOY_USER" &>/dev/null; then
              echo "--- Deploy user '$DEPLOY_USER' already exists ---"
            else
              echo "--- Creating deploy user '$DEPLOY_USER' ---"
              adduser --disabled-password --gecos "ZyntaPOS Deploy" "$DEPLOY_USER"
              echo "--- Deploy user created ---"
            fi

            # Ensure deploy user is in docker group
            usermod -aG docker "$DEPLOY_USER"
            echo "--- Deploy user added to docker group ---"

            # ── 3. Setup SSH for deploy user ──────────────────────────────
            DEPLOY_HOME=$(eval echo "~$DEPLOY_USER")
            mkdir -p "$DEPLOY_HOME/.ssh"

            # Extract public key from deploy private key (passed as secret)
            # We generate the public key from the private key and add it
            DEPLOY_SSH_DIR="$DEPLOY_HOME/.ssh"
            DEPLOY_AUTH_KEYS="$DEPLOY_SSH_DIR/authorized_keys"

            # Write the deploy private key temporarily to extract public key
            TEMP_KEY=$(mktemp)
            echo "${{ secrets.VPS_USER_KEY }}" > "$TEMP_KEY"
            chmod 600 "$TEMP_KEY"
            PUBKEY=$(ssh-keygen -y -f "$TEMP_KEY" 2>/dev/null || true)
            rm -f "$TEMP_KEY"

            if [ -n "$PUBKEY" ]; then
              # Add public key if not already present
              if [ -f "$DEPLOY_AUTH_KEYS" ] && grep -qF "$PUBKEY" "$DEPLOY_AUTH_KEYS" 2>/dev/null; then
                echo "--- Deploy SSH key already authorized ---"
              else
                echo "$PUBKEY" >> "$DEPLOY_AUTH_KEYS"
                echo "--- Deploy SSH key added to authorized_keys ---"
              fi
            else
              echo "::warning::Could not extract public key from VPS_USER_KEY"
            fi

            chown -R "$DEPLOY_USER:$DEPLOY_USER" "$DEPLOY_SSH_DIR"
            chmod 700 "$DEPLOY_SSH_DIR"
            chmod 600 "$DEPLOY_AUTH_KEYS" 2>/dev/null || true

            # ── 4. Create /opt/zyntapos owned by deploy user ──────────────
            DEPLOY_PATH="/opt/zyntapos"
            mkdir -p "$DEPLOY_PATH"
            chown "$DEPLOY_USER:$DEPLOY_USER" "$DEPLOY_PATH"
            echo "--- $DEPLOY_PATH owned by $DEPLOY_USER ---"

            echo "=== Phase 1 complete: system ready for deploy user ==="

      # ── Phase 2: Deploy user — app-level setup ─────────────────────
      - name: "Phase 2: App setup (as deploy user)"
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_USER_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 120s
          command_timeout: 15m
          script: |
            set -euo pipefail
            echo "=== ZyntaPOS VPS First-Time Setup — Phase 2 (deploy) ==="
            echo "=== Running as: $(whoami) ==="

            DEPLOY_PATH="/opt/zyntapos"

            # ── 1. Clone repo ─────────────────────────────────────────────
            if [ -d "$DEPLOY_PATH/.git" ]; then
              echo "--- Repo already cloned at $DEPLOY_PATH, fetching latest ---"
              cd "$DEPLOY_PATH"
              git fetch origin
              git reset --hard origin/main
            else
              echo "--- Cloning repo to $DEPLOY_PATH ---"
              git clone https://github.com/sendtodilanka/ZyntaPOS-KMM.git "$DEPLOY_PATH"
              cd "$DEPLOY_PATH"
            fi

            echo "--- Repo HEAD: $(git rev-parse HEAD) ---"

            # ── 2. Create secrets directory and DB password ─────────────
            mkdir -p "$DEPLOY_PATH/secrets"

            DB_PASS_FILE="$DEPLOY_PATH/secrets/db_password.txt"
            if [ -f "$DB_PASS_FILE" ] && [ -s "$DB_PASS_FILE" ]; then
              echo "--- DB password file already exists, skipping ---"
            else
              echo "--- Generating DB password ---"
              DB_PASS=$(openssl rand -hex 32)
              printf '%s' "$DB_PASS" > "$DB_PASS_FILE"
              chmod 644 "$DB_PASS_FILE"
              echo "--- Written to $DB_PASS_FILE ($(wc -c < "$DB_PASS_FILE") bytes) ---"
            fi

            # Read DB password for .env
            DB_PASS=$(cat "$DB_PASS_FILE")

            # ── 3. Create .env with all required variables ───────────────
            ENV_FILE="$DEPLOY_PATH/.env"
            if [ -f "$ENV_FILE" ] && grep -q "REDIS_PASSWORD" "$ENV_FILE"; then
              echo "--- .env already has REDIS_PASSWORD, skipping ---"
            else
              echo "--- Generating REDIS_PASSWORD ---"
              REDIS_PASS=$(openssl rand -hex 24)
              echo "REDIS_PASSWORD=$REDIS_PASS" >> "$ENV_FILE"
              echo "--- Written REDIS_PASSWORD to $ENV_FILE ---"
            fi

            # Ensure ZYNTAPOS_DB_PASSWORD is in .env
            if grep -q "ZYNTAPOS_DB_PASSWORD" "$ENV_FILE" 2>/dev/null; then
              echo "--- .env already has ZYNTAPOS_DB_PASSWORD, skipping ---"
            else
              echo "ZYNTAPOS_DB_PASSWORD=${DB_PASS}" >> "$ENV_FILE"
              echo "--- Written ZYNTAPOS_DB_PASSWORD to $ENV_FILE ---"
            fi

            # ── 4. Generate RS256 JWT key pair (if missing) ─────────────
            RS256_PRIV="$DEPLOY_PATH/secrets/rs256_private_key.pem"
            RS256_PUB="$DEPLOY_PATH/secrets/rs256_public_key.pem"
            if [ -f "$RS256_PRIV" ] && [ -f "$RS256_PUB" ]; then
              echo "--- RS256 key pair already exists, skipping ---"
            else
              echo "--- Generating RS256 key pair ---"
              openssl genpkey -algorithm RSA -out "$RS256_PRIV" -pkeyopt rsa_keygen_bits:2048
              openssl rsa -pubout -in "$RS256_PRIV" -out "$RS256_PUB"
              # 644 so Docker container's non-root user (zyntapos) can read bind-mounted files.
              chmod 644 "$RS256_PRIV"
              chmod 644 "$RS256_PUB"
              echo "--- RS256 keys generated ---"
            fi

            # ── 5. Generate self-signed TLS cert (if missing) ───────────
            CERT_DIR="$DEPLOY_PATH/backend/caddy/certs"
            mkdir -p "$CERT_DIR"
            if [ -f "$CERT_DIR/zyntapos_origin.pem" ]; then
              echo "--- TLS cert already exists, skipping ---"
            else
              echo "--- Generating self-signed TLS cert ---"
              openssl req -x509 -newkey rsa:4096 \
                -keyout "$CERT_DIR/zyntapos_origin.key" \
                -out "$CERT_DIR/zyntapos_origin.pem" \
                -days 365 -nodes \
                -subj "/CN=zyntapos.com/O=Zynta Solutions/C=LK" \
                -addext "subjectAltName=DNS:zyntapos.com,DNS:*.zyntapos.com"
              echo "--- TLS cert generated ---"
            fi

            # ── 6. Authenticate with GHCR and pull images ─────────────────
            echo "--- Logging in to GHCR ---"
            echo "${{ secrets.PAT_TOKEN }}" | docker login ghcr.io -u sendtodilanka --password-stdin

            cd "$DEPLOY_PATH"
            echo "--- Validating docker-compose.yml ---"
            docker compose config --quiet

            echo "--- Pulling images from GHCR ---"
            docker compose pull

            echo "--- Starting stack ---"
            docker compose up -d --remove-orphans

            echo "--- Stack status ---"
            docker compose ps

            echo "=== Setup complete: $(date) ==="
            echo "=== VPS is ready. Future deploys will run via cd-deploy.yml ==="
