name: "Security: Snyk Monitor Import"

# Imports ZyntaPOS-KMM into Snyk for continuous vulnerability monitoring.
# Uses the Snyk CLI to import the project and configure monitoring.
# Requires SNYK_TOKEN secret (API token from snyk.io → Account Settings).

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - test
          - monitor
          - both
        default: both

jobs:
  snyk-import:
    name: Snyk Monitor Setup
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Install Snyk CLI
        run: |
          echo "=== Installing Snyk CLI ==="
          npm install -g snyk
          snyk --version

      - name: Authenticate Snyk
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "$SNYK_TOKEN" ]; then
            echo "::error::SNYK_TOKEN secret not configured. Set it in GitHub Secrets (get from snyk.io → Account Settings → API Token)"
            exit 1
          fi
          snyk auth "$SNYK_TOKEN"
          echo "✅ Snyk authenticated"

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-snyk-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-snyk-

      - name: Snyk test — KMM root project
        if: contains(github.event.inputs.action, 'test') || contains(github.event.inputs.action, 'both')
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          echo "=== Running Snyk test on KMM root ==="
          snyk test --gradle --all-sub-projects --severity-threshold=high \
            --org=zyntasolutions 2>&1 || true
        continue-on-error: true

      - name: Snyk test — Backend API
        if: contains(github.event.inputs.action, 'test') || contains(github.event.inputs.action, 'both')
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        working-directory: backend/api
        run: |
          echo "=== Running Snyk test on backend/api ==="
          snyk test --gradle --severity-threshold=high \
            --org=zyntasolutions 2>&1 || true
        continue-on-error: true

      - name: Snyk test — Backend License
        if: contains(github.event.inputs.action, 'test') || contains(github.event.inputs.action, 'both')
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        working-directory: backend/license
        run: |
          echo "=== Running Snyk test on backend/license ==="
          snyk test --gradle --severity-threshold=high \
            --org=zyntasolutions 2>&1 || true
        continue-on-error: true

      - name: Snyk test — Backend Sync
        if: contains(github.event.inputs.action, 'test') || contains(github.event.inputs.action, 'both')
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        working-directory: backend/sync
        run: |
          echo "=== Running Snyk test on backend/sync ==="
          snyk test --gradle --severity-threshold=high \
            --org=zyntasolutions 2>&1 || true
        continue-on-error: true

      - name: Snyk monitor — KMM root (imports into Snyk dashboard)
        if: contains(github.event.inputs.action, 'monitor') || contains(github.event.inputs.action, 'both')
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          echo "=== Importing KMM root into Snyk Monitor ==="
          snyk monitor --gradle --all-sub-projects \
            --org=zyntasolutions \
            --project-name="ZyntaPOS-KMM" 2>&1 || true

      - name: Snyk monitor — Backend API
        if: contains(github.event.inputs.action, 'monitor') || contains(github.event.inputs.action, 'both')
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        working-directory: backend/api
        run: |
          echo "=== Importing backend/api into Snyk Monitor ==="
          snyk monitor --gradle \
            --org=zyntasolutions \
            --project-name="ZyntaPOS-KMM/backend-api" 2>&1 || true

      - name: Snyk monitor — Backend License
        if: contains(github.event.inputs.action, 'monitor') || contains(github.event.inputs.action, 'both')
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        working-directory: backend/license
        run: |
          echo "=== Importing backend/license into Snyk Monitor ==="
          snyk monitor --gradle \
            --org=zyntasolutions \
            --project-name="ZyntaPOS-KMM/backend-license" 2>&1 || true

      - name: Snyk monitor — Backend Sync
        if: contains(github.event.inputs.action, 'monitor') || contains(github.event.inputs.action, 'both')
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        working-directory: backend/sync
        run: |
          echo "=== Importing backend/sync into Snyk Monitor ==="
          snyk monitor --gradle \
            --org=zyntasolutions \
            --project-name="ZyntaPOS-KMM/backend-sync" 2>&1 || true

      - name: Summary
        run: |
          echo "═══════════════════════════════════════"
          echo "  Snyk Monitor Import — Summary"
          echo "═══════════════════════════════════════"
          echo ""
          echo "Action: ${{ github.event.inputs.action }}"
          echo ""
          echo "Projects imported:"
          echo "  • ZyntaPOS-KMM (root — all KMP subprojects)"
          echo "  • ZyntaPOS-KMM/backend-api"
          echo "  • ZyntaPOS-KMM/backend-license"
          echo "  • ZyntaPOS-KMM/backend-sync"
          echo ""
          echo "View results at: https://app.snyk.io/org/zyntasolutions"
          echo ""
          echo "✅ Snyk monitoring configured — daily scans will run automatically"
