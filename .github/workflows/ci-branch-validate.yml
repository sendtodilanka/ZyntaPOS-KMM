name: "Step[1]: Branch Validate"

# ─────────────────────────────────────────────────────────────────────────────
# PIPELINE POSITION: Step 1 of 7
#
# Runs a FAST BUILD-ONLY validation on every push to a development branch.
# If the build succeeds, dispatches "auto-pr-trigger" to start Step[2].
# If anything fails the pipeline stops here — main is never touched.
#
# WHY BUILD-ONLY (no tests):
# The full test suite runs in Step[3+4] (CI Gate) on the PR. Running tests
# twice per branch wastes ~15-20 min of Actions minutes. Build-only catches
# compilation errors, missing imports, and resource issues — the most common
# failure mode on feature branches — in ~10 min instead of ~30 min.
#
# CHAINING: Uses repository_dispatch to trigger Step[2] instead of
# workflow_run to avoid ghost workflow interference.
#
# EDGE CASES HANDLED:
#   - Rapid-fire pushes: concurrency group cancels older runs on same branch
#   - Branch naming: supports all conventional-commit and claude/* prefixes
#   - Cache warming: writes Gradle cache so subsequent CI Gate run is faster
#   - Artifact retention: 3 days (short-lived — full reports come from ci.yml)
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - 'feature/**'
      - 'fix/**'
      - 'hotfix/**'
      - 'chore/**'
      - 'refactor/**'
      - 'docs/**'
      - 'claude/**'
      - 'test/**'
      - 'build/**'
      - 'ci/**'
      - 'perf/**'
      - 'style/**'

permissions:
  contents: read

concurrency:
  group: step1-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: "Step[1]: Branch Validate"
    uses: ./.github/workflows/_reusable-build-test.yml
    with:
      run-tests: false
      run-lint: false
      upload-apk: false
      artifact-retention-days: 3
      timeout-minutes: 30
      artifact-suffix: '-step1-${{ github.run_id }}'

  # ── Chain to Step[2]: Auto PR ────────────────────────────────────────────
  trigger-auto-pr:
    name: "Trigger Auto PR"
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Dispatch auto-pr event
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}
          event-type: auto-pr-trigger
          client-payload: '{"branch": "${{ github.ref_name }}", "sha": "${{ github.sha }}", "actor": "${{ github.actor }}"}'
