name: "Step[4]: Build Images & Deploy"

# ─────────────────────────────────────────────────────────────────────────────
# PIPELINE POSITION: Step 4 of 7
#
# Runs ONLY on push to main (after PR is squash-merged). Verifies the
# merged code builds, then builds and pushes Docker images to GHCR, and
# dispatches the deploy trigger to start Step[5].
#
# OWASP security scanning is NOT included here — it already ran in
# Step[3] (PR Gate) during PR review. No need to re-scan identical deps.
#
# CHAINING: On success, dispatches "deploy-trigger" event to start
# Step[5]: Deploy to VPS. Uses repository_dispatch instead of workflow_run
# to avoid ghost workflow interference.
#
# EDGE CASES HANDLED:
#   - Only push-to-main: no PR triggers (those are Step[3])
#   - Concurrency: keyed by SHA so only the latest merge runs
#   - Build failure: stops the chain before Docker images are pushed
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  actions: read
  packages: write
  security-events: write   # Required for Detekt SARIF upload to Security tab

concurrency:
  group: ci-push-main-${{ github.sha }}
  cancel-in-progress: false   # Push-to-main must complete to trigger deploy

jobs:
  # ── Verify merged code builds ──────────────────────────────────────────────
  build-and-test:
    name: "Step[4]: Build & Test"
    uses: ./.github/workflows/_reusable-build-test.yml
    secrets:
      GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
    with:
      run-tests: true
      run-lint: true
      upload-apk: true
      artifact-retention-days: 7
      timeout-minutes: 45
      artifact-suffix: '-ci-${{ github.run_id }}'

  # ── Test Result Reporting ────────────────────────────────────────────────
  test-report:
    name: "Publish Test Results"
    needs: build-and-test
    if: always() && needs.build-and-test.result != 'cancelled'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download JUnit XML
        uses: actions/download-artifact@v4
        with:
          name: junit-xml-ci-${{ github.run_id }}
          path: test-results
        continue-on-error: true

      - name: Publish test results
        if: hashFiles('test-results/**/TEST-*.xml') != ''
        uses: dorny/test-reporter@v1
        with:
          name: 'JUnit Test Results'
          path: 'test-results/**/TEST-*.xml'
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

  # ── Build & Push Backend Docker Images to GHCR ───────────────────────────
  build-backend-images:
    name: "Build & Push Backend Docker Images"
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: [api, license, sync]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image — ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/zyntapos-${{ matrix.service }}:latest
            ghcr.io/${{ github.repository_owner }}/zyntapos-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Build & Push Website Docker Image to GHCR ───────────────────────────
  build-website-image:
    name: "Build & Push Website Docker Image"
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image — website
        uses: docker/build-push-action@v6
        with:
          context: website
          file: website/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/zyntapos-website:latest
            ghcr.io/${{ github.repository_owner }}/zyntapos-website:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Build & Push Admin Panel Docker Image to GHCR ───────────────────────
  build-admin-panel-image:
    name: "Build & Push Admin Panel Docker Image"
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image name
        id: image
        run: echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push image — admin-panel
        uses: docker/build-push-action@v6
        with:
          context: admin-panel
          file: admin-panel/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.image.outputs.repo }}/admin-panel:latest
            ghcr.io/${{ steps.image.outputs.repo }}/admin-panel:${{ github.sha }}
          build-args: |
            VITE_API_URL=https://api.zyntapos.com
            VITE_LICENSE_URL=https://license.zyntapos.com
            VITE_SYNC_URL=https://sync.zyntapos.com
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Trigger Deploy ──────────────────────────────────────────────────────
  # Dispatches "deploy-trigger" to start Step[5]: Deploy to VPS.
  # Depends on build-and-test + all Docker image builds succeeding.
  trigger-deploy:
    name: "Trigger Deploy"
    needs: [build-and-test, build-backend-images, build-website-image, build-admin-panel-image]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: write
    steps:
      - name: Extract commit title
        id: commit
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          # Use env var to safely handle special characters in commit messages
          TITLE=$(echo "$COMMIT_MSG" | head -1 | tr -d '"' | cut -c1-80)
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"

      - name: Dispatch deploy event
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}
          event-type: deploy-trigger
          client-payload: '{"sha": "${{ github.sha }}", "run_id": "${{ github.run_id }}", "title": "${{ steps.commit.outputs.title }}"}'
