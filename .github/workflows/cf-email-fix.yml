name: CF Email Routing Fix
on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action: setup-rules, deploy-worker, full-fix, debug, fix-dns, setup-mail-mx'
        required: true
        default: 'full-fix'

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Step 1: Configure Cloudflare Email Routing rules ──────────────────
      - name: Configure CF Email Routing
        if: contains(github.event.inputs.action, 'rules') || github.event.inputs.action == 'full-fix' || github.event.inputs.action == 'debug'
        env:
          CF_AUTH_EMAIL: ${{ secrets.CF_AUTH_EMAIL }}
          CF_GLOBAL_API_KEY: ${{ secrets.CF_GLOBAL_API_KEY }}
        run: |
          set -e
          AUTH=(-H "X-Auth-Email: $CF_AUTH_EMAIL" -H "X-Auth-Key: $CF_GLOBAL_API_KEY")

          # Get zone ID
          ZONE_ID=$(curl -s "${AUTH[@]}" \
            "https://api.cloudflare.com/client/v4/zones?name=zyntapos.com" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['result'][0]['id'])")
          echo "Zone ID: $ZONE_ID"

          # List current rules
          echo "=== Current Rules ==="
          curl -s "${AUTH[@]}" \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/email/routing/rules" \
            | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          for r in d.get('result',[]):
            matchers = ', '.join([m.get('value','*') for m in r.get('matchers',[])])
            actions = ', '.join([a.get('type','?') for a in r.get('actions',[])])
            print(f'  [{\"ON\" if r[\"enabled\"] else \"OFF\"}] {matchers} -> {actions} (id={r[\"id\"][:8]}...)')
          "

          echo ""
          echo "=== Current Catch-All ==="
          curl -s "${AUTH[@]}" \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/email/routing/rules/catch_all" \
            | python3 -c "
          import sys,json
          r=json.load(sys.stdin).get('result',{})
          actions = ', '.join([a.get('type','?') for a in r.get('actions',[])])
          print(f'  [{\"ON\" if r.get(\"enabled\") else \"OFF\"}] catch-all -> {actions}')
          "

          if [[ "${{ github.event.inputs.action }}" == "debug" ]]; then
            echo "Debug mode — not making changes"
            exit 0
          fi

          # Create individual rules for support inboxes → Worker
          echo ""
          echo "=== Creating Support Inbox Rules → Worker ==="
          for addr in support billing bugs alerts; do
            echo "  Adding ${addr}@zyntapos.com → Worker..."
            RESP=$(curl -s -X POST "${AUTH[@]}" \
              -H "Content-Type: application/json" \
              "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/email/routing/rules" \
              -d "{
                \"name\": \"${addr} inbox\",
                \"enabled\": true,
                \"matchers\": [{\"type\": \"literal\", \"field\": \"to\", \"value\": \"${addr}@zyntapos.com\"}],
                \"actions\": [{\"type\": \"worker\", \"value\": [\"email-inbound-handler\"]}]
              }")
            SUCCESS=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('success',False))")
            if [[ "$SUCCESS" == "True" ]]; then
              echo "    ✓ Created"
            else
              # Might already exist
              echo "    $(echo "$RESP" | python3 -c "import sys,json; errs=json.load(sys.stdin).get('errors',[]); print(errs[0].get('message','unknown') if errs else 'unknown error')")"
            fi
          done

          # Enable catch-all → Worker (handles staff mailboxes like dilanka@)
          echo ""
          echo "=== Enabling Catch-All → Worker ==="
          RESP=$(curl -s -X PUT "${AUTH[@]}" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/email/routing/rules/catch_all" \
            -d "{
              \"name\": \"catch-all to worker\",
              \"enabled\": true,
              \"matchers\": [{\"type\": \"all\"}],
              \"actions\": [{\"type\": \"worker\", \"value\": [\"email-inbound-handler\"]}]
            }")
          SUCCESS=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('success',False))")
          echo "  Catch-all enabled: $SUCCESS"

          # Verify final state
          echo ""
          echo "=== Final Rules ==="
          curl -s "${AUTH[@]}" \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/email/routing/rules" \
            | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          for r in d.get('result',[]):
            matchers = ', '.join([m.get('value','*') for m in r.get('matchers',[])])
            actions = ', '.join([f'{a.get(\"type\",\"?\")}: {a.get(\"value\",[\"\"])}' for a in r.get('actions',[])])
            print(f'  [{\"ON\" if r[\"enabled\"] else \"OFF\"}] {matchers} -> {actions}')
          "
          echo ""
          echo "=== Final Catch-All ==="
          curl -s "${AUTH[@]}" \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/email/routing/rules/catch_all" \
            | python3 -c "
          import sys,json
          r=json.load(sys.stdin).get('result',{})
          actions = ', '.join([f'{a.get(\"type\",\"?\")}: {a.get(\"value\",[\"\"])}' for a in r.get('actions',[])])
          print(f'  [{\"ON\" if r.get(\"enabled\") else \"OFF\"}] catch-all -> {actions}')
          "

      # ── Step 2: Deploy CF Worker with updated code + secrets ──────────────
      - name: Deploy CF Email Worker
        if: contains(github.event.inputs.action, 'worker') || github.event.inputs.action == 'full-fix'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_AUTH_EMAIL: ${{ secrets.CF_AUTH_EMAIL }}
          CF_GLOBAL_API_KEY: ${{ secrets.CF_GLOBAL_API_KEY }}
        working-directory: cf-workers/email-inbound-handler
        run: |
          npm install
          npx wrangler deploy --name email-inbound-handler 2>&1 || {
            echo "wrangler deploy failed — trying with global API key"
            CLOUDFLARE_API_TOKEN="" \
            CLOUDFLARE_API_KEY="$CF_GLOBAL_API_KEY" \
            CLOUDFLARE_EMAIL="$CF_AUTH_EMAIL" \
            npx wrangler deploy --name email-inbound-handler
          }

      # ── Step 3: Set Worker secrets (EMAIL_RELAY_SECRET + legacy) ─────────
      - name: Set Worker Secrets
        if: contains(github.event.inputs.action, 'worker') || github.event.inputs.action == 'full-fix'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_USER_KEY }}
          envs: CF_AUTH_EMAIL,CF_GLOBAL_API_KEY,CF_ACCOUNT_ID
          script: |
            # Read EMAIL_RELAY_SECRET from VPS .env file
            RELAY_SECRET=$(grep -oP 'EMAIL_RELAY_SECRET=\K.*' /opt/zyntapos/.env 2>/dev/null || echo "")
            if [ -z "$RELAY_SECRET" ]; then
              # Generate and persist a new relay secret
              RELAY_SECRET=$(openssl rand -hex 32)
              echo "EMAIL_RELAY_SECRET=$RELAY_SECRET" >> /opt/zyntapos/.env
              echo "Generated new EMAIL_RELAY_SECRET"
            else
              echo "Using existing EMAIL_RELAY_SECRET (length: ${#RELAY_SECRET})"
            fi

            # Set EMAIL_RELAY_SECRET as CF Worker secret
            curl -s -X PUT \
              -H "X-Auth-Email: $CF_AUTH_EMAIL" \
              -H "X-Auth-Key: $CF_GLOBAL_API_KEY" \
              -H "Content-Type: application/json" \
              "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/workers/scripts/email-inbound-handler/secrets" \
              -d "{\"name\": \"EMAIL_RELAY_SECRET\", \"text\": \"$RELAY_SECRET\", \"type\": \"secret_text\"}" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'EMAIL_RELAY_SECRET set: {d.get(\"success\",False)}')"

            # Restart email-relay container to pick up the secret
            cd /opt/zyntapos
            docker compose up -d email-relay 2>/dev/null || echo "email-relay not yet deployed"
        env:
          CF_AUTH_EMAIL: ${{ secrets.CF_AUTH_EMAIL }}
          CF_GLOBAL_API_KEY: ${{ secrets.CF_GLOBAL_API_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # ── Step 5: Fix DNS records (DKIM + SPF) for email deliverability ────
      - name: Fix DNS Records (DKIM + SPF)
        if: github.event.inputs.action == 'fix-dns' || github.event.inputs.action == 'full-fix'
        env:
          CF_AUTH_EMAIL: ${{ secrets.CF_AUTH_EMAIL }}
          CF_GLOBAL_API_KEY: ${{ secrets.CF_GLOBAL_API_KEY }}
        run: |
          set -e
          AUTH=(-H "X-Auth-Email: $CF_AUTH_EMAIL" -H "X-Auth-Key: $CF_GLOBAL_API_KEY")

          # Get zone ID
          ZONE_ID=$(curl -s "${AUTH[@]}" \
            "https://api.cloudflare.com/client/v4/zones?name=zyntapos.com" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['result'][0]['id'])")
          echo "Zone ID: $ZONE_ID"

          # ── DKIM RSA record (selector: 202603r) ──
          RSA_NAME="202603r._domainkey"
          RSA_VALUE="v=DKIM1; k=rsa; "

          echo "=== Creating RSA DKIM record ==="
          EXISTING=$(curl -s "${AUTH[@]}" \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?name=202603r._domainkey.zyntapos.com&type=TXT" \
            | python3 -c "import sys,json; r=json.load(sys.stdin)['result']; print(r[0]['id'] if r else 'none')")

          if [[ "$EXISTING" != "none" ]]; then
            echo "  Updating existing record $EXISTING"
            curl -s -X PUT "${AUTH[@]}" \
              -H "Content-Type: application/json" \
              "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$EXISTING" \
              -d "{\"type\":\"TXT\",\"name\":\"$RSA_NAME\",\"content\":\"$RSA_VALUE\",\"ttl\":3600}" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'  RSA DKIM updated: {d.get(\"success\",False)}')"
          else
            echo "  Creating new record"
            curl -s -X POST "${AUTH[@]}" \
              -H "Content-Type: application/json" \
              "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
              -d "{\"type\":\"TXT\",\"name\":\"$RSA_NAME\",\"content\":\"$RSA_VALUE\",\"ttl\":3600}" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'  RSA DKIM created: {d.get(\"success\",False)}')"
          fi

          # ── DKIM Ed25519 record (selector: 202603e) ──
          ED_NAME="202603e._domainkey"
          ED_VALUE="v=DKIM1; k=ed25519; p=v+M7rsYAoLrHSubDxYZINNtVjfJaWolwfUOkonP8Vq4="

          echo "=== Creating Ed25519 DKIM record ==="
          EXISTING=$(curl -s "${AUTH[@]}" \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?name=202603e._domainkey.zyntapos.com&type=TXT" \
            | python3 -c "import sys,json; r=json.load(sys.stdin)['result']; print(r[0]['id'] if r else 'none')")

          if [[ "$EXISTING" != "none" ]]; then
            echo "  Updating existing record $EXISTING"
            curl -s -X PUT "${AUTH[@]}" \
              -H "Content-Type: application/json" \
              "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$EXISTING" \
              -d "{\"type\":\"TXT\",\"name\":\"$ED_NAME\",\"content\":\"$ED_VALUE\",\"ttl\":3600}" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'  Ed25519 DKIM updated: {d.get(\"success\",False)}')"
          else
            echo "  Creating new record"
            curl -s -X POST "${AUTH[@]}" \
              -H "Content-Type: application/json" \
              "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
              -d "{\"type\":\"TXT\",\"name\":\"$ED_NAME\",\"content\":\"$ED_VALUE\",\"ttl\":3600}" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'  Ed25519 DKIM created: {d.get(\"success\",False)}')"
          fi

          # ── Tighten SPF from ~all to -all ──
          echo ""
          echo "=== Updating SPF record ==="
          # Use python3 to handle the update in one shot to avoid shell quoting issues
          python3 << 'PYEOF'
          import json, subprocess, os
          AUTH_EMAIL = os.environ["CF_AUTH_EMAIL"]
          AUTH_KEY = os.environ["CF_GLOBAL_API_KEY"]
          headers = {"X-Auth-Email": AUTH_EMAIL, "X-Auth-Key": AUTH_KEY, "Content-Type": "application/json"}

          import urllib.request
          def cf_api(method, path, data=None):
              url = f"https://api.cloudflare.com/client/v4/{path}"
              body = json.dumps(data).encode() if data else None
              req = urllib.request.Request(url, data=body, headers=headers, method=method)
              with urllib.request.urlopen(req) as resp:
                  return json.load(resp)

          ZONE_ID = os.environ.get("ZONE_ID_CACHE", "")
          if not ZONE_ID:
              zones = cf_api("GET", "zones?name=zyntapos.com")
              ZONE_ID = zones["result"][0]["id"]

          # Find SPF record
          records = cf_api("GET", f"zones/{ZONE_ID}/dns_records?name=zyntapos.com&type=TXT")
          spf_rec = None
          for r in records["result"]:
              if "v=spf1" in r.get("content", ""):
                  spf_rec = r
                  break

          if spf_rec:
              old_content = spf_rec["content"]
              print(f"  Current SPF: {old_content}")
              new_content = old_content.replace("~all", "-all")
              print(f"  New SPF: {new_content}")
              result = cf_api("PUT", f"zones/{ZONE_ID}/dns_records/{spf_rec['id']}", {
                  "type": "TXT",
                  "name": "zyntapos.com",
                  "content": new_content,
                  "ttl": 3600
              })
              print(f"  SPF updated: {result.get('success', False)}")
          else:
              print("  No SPF record found")
          PYEOF

          # ── Verify all DNS records ──
          echo ""
          echo "=== All TXT records for zyntapos.com ==="
          curl -s "${AUTH[@]}" \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?type=TXT" \
            | python3 -c "
          import sys,json
          records=json.load(sys.stdin)['result']
          for r in sorted(records, key=lambda x: x['name']):
            print(f'  {r[\"name\"]:50s} -> {r[\"content\"][:100]}')
          "

      # ── Step 6: Add MX record for mail.zyntapos.com (SMTP delivery target) ──
      - name: Setup mail.zyntapos.com MX record
        if: github.event.inputs.action == 'setup-mail-mx' || github.event.inputs.action == 'full-fix'
        env:
          CF_AUTH_EMAIL: ${{ secrets.CF_AUTH_EMAIL }}
          CF_GLOBAL_API_KEY: ${{ secrets.CF_GLOBAL_API_KEY }}
        run: |
          set -e
          AUTH=(-H "X-Auth-Email: $CF_AUTH_EMAIL" -H "X-Auth-Key: $CF_GLOBAL_API_KEY")

          ZONE_ID=$(curl -s "${AUTH[@]}" \
            "https://api.cloudflare.com/client/v4/zones?name=zyntapos.com" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['result'][0]['id'])")
          echo "Zone ID: $ZONE_ID"

          # Check if MX record already exists for mail.zyntapos.com
          echo "=== Checking MX records for mail.zyntapos.com ==="
          EXISTING_MX=$(curl -s "${AUTH[@]}" \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?name=mail.zyntapos.com&type=MX" \
            | python3 -c "import sys,json; r=json.load(sys.stdin)['result']; print(r[0]['id'] if r else 'none')")

          if [[ "$EXISTING_MX" != "none" ]]; then
            echo "  MX record already exists ($EXISTING_MX) — updating"
            curl -s -X PUT "${AUTH[@]}" \
              -H "Content-Type: application/json" \
              "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$EXISTING_MX" \
              -d '{"type":"MX","name":"mail","content":"mail.zyntapos.com","priority":10,"ttl":3600}' \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'  MX updated: {d.get(\"success\",False)}')"
          else
            echo "  Creating new MX record: mail.zyntapos.com → mail.zyntapos.com (priority 10)"
            curl -s -X POST "${AUTH[@]}" \
              -H "Content-Type: application/json" \
              "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
              -d '{"type":"MX","name":"mail","content":"mail.zyntapos.com","priority":10,"ttl":3600}' \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'  MX created: {d.get(\"success\",False)}')"
          fi

          # Verify the A record for mail.zyntapos.com exists (should point to VPS)
          echo ""
          echo "=== Verifying mail.zyntapos.com DNS records ==="
          curl -s "${AUTH[@]}" \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?name=mail.zyntapos.com" \
            | python3 -c "
          import sys,json
          records=json.load(sys.stdin)['result']
          for r in sorted(records, key=lambda x: x['type']):
            proxied = ' (proxied)' if r.get('proxied') else ' (DNS-only)'
            print(f'  {r[\"type\"]:5s} {r[\"name\"]:30s} -> {r[\"content\"]}{proxied}')
          if not records:
            print('  WARNING: No records found for mail.zyntapos.com!')
          "

      # ── Step 7: Configure Stalwart to accept mail.zyntapos.com domain ────
      # Stalwart v0.15.x API reference:
      #   - Create domain:  POST /api/principal  {"type":"domain","name":"mail.zyntapos.com"}
      #   - Add email alias: PATCH /api/principal/{name}  [{"action":"addItem","field":"emails","value":"user@domain"}]
      #   - List domains:   GET /api/principal?types=domain&limit=100
      - name: Configure Stalwart Domain
        if: github.event.inputs.action == 'setup-mail-mx' || github.event.inputs.action == 'full-fix'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_USER_KEY }}
          script: |
            set -e
            STALWART_PASS=$(docker exec zyntapos_stalwart printenv STALWART_ADMIN_PASSWORD)
            AUTH="admin:$STALWART_PASS"
            STALWART_URL="http://172.18.0.2:8080"

            echo "=== Current Stalwart domains ==="
            curl -s -u "$AUTH" "$STALWART_URL/api/principal?types=domain&limit=100" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); [print(f'  {i[\"name\"]}') for i in d.get('data',{}).get('items',[])]"

            # Create mail.zyntapos.com domain principal (idempotent — returns 409 if exists)
            echo ""
            echo "=== Creating mail.zyntapos.com domain ==="
            RESP=$(curl -s -o /dev/null -w "%{http_code}" -u "$AUTH" -X POST \
              -H "Content-Type: application/json" \
              "$STALWART_URL/api/principal" \
              -d '{"type":"domain","name":"mail.zyntapos.com"}')
            if [ "$RESP" = "200" ] || [ "$RESP" = "201" ]; then
              echo "  Domain created successfully"
            elif [ "$RESP" = "409" ]; then
              echo "  Domain already exists"
            else
              echo "  Domain creation returned HTTP $RESP"
            fi

            # Add mail.zyntapos.com email alias to all staff accounts
            # Currently only dilanka, but this pattern works for any user
            echo ""
            echo "=== Configuring staff email aliases ==="
            for USER in dilanka; do
              EMAILS=$(curl -s -u "$AUTH" "$STALWART_URL/api/principal/$USER" \
                | python3 -c "import sys,json; print(' '.join(json.load(sys.stdin).get('data',{}).get('emails',[])))")
              echo "  $USER current: $EMAILS"

              ALIAS="${USER}@mail.zyntapos.com"
              if echo "$EMAILS" | grep -q "$ALIAS"; then
                echo "  $USER already has $ALIAS"
              else
                echo "  Adding $ALIAS to $USER..."
                RESP=$(curl -s -u "$AUTH" -X PATCH \
                  -H "Content-Type: application/json" \
                  "$STALWART_URL/api/principal/$USER" \
                  -d "[{\"action\":\"addItem\",\"field\":\"emails\",\"value\":\"$ALIAS\"}]")
                echo "  Response: $RESP"
              fi
            done

            # Verify final state
            echo ""
            echo "=== Final domain list ==="
            curl -s -u "$AUTH" "$STALWART_URL/api/principal?types=domain&limit=100" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); [print(f'  {i[\"name\"]} ({i.get(\"members\",0)} members)') for i in d.get('data',{}).get('items',[])]"

            echo ""
            echo "=== Final dilanka config ==="
            curl -s -u "$AUTH" "$STALWART_URL/api/principal/dilanka" \
              | python3 -c "import sys,json; d=json.load(sys.stdin).get('data',{}); print(f'  emails: {d.get(\"emails\",[])}'); print(f'  permissions: {d.get(\"enabledPermissions\",[])}'); print(f'  quota used: {d.get(\"usedQuota\",0)}')"
