name: "VPS Full Fix"

# Definitive fix:
# 1. Pull latest code
# 2. Generate fresh DB password
# 3. Full docker compose down + volume reset (pgdata)
# 4. Fresh start — init-databases.sh creates per-service DBs
# 5. Verify all services healthy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "fullfix" to confirm'
        required: true
        default: ''
      reset_db:
        description: 'Also reset database volume? (yes/no)'
        required: false
        default: 'no'

permissions:
  contents: read

jobs:
  fix:
    name: "Full VPS Fix"
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'fullfix'

    steps:
      - name: Full reset — down, optional volume reset, up
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_USER_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 60s
          command_timeout: 10m
          script: |
            set -euo pipefail
            cd /opt/zyntapos

            echo "=== Step 0: git pull latest ==="
            git pull origin main

            echo "=== Step 1: Generate fresh DB password ==="
            NEW_PASS=$(openssl rand -hex 32)
            mkdir -p secrets
            printf '%s' "$NEW_PASS" > secrets/db_password.txt
            echo "File size: $(wc -c < secrets/db_password.txt) bytes (expect 64)"
            if [ -f .env ]; then
              sed -i '/^ZYNTAPOS_DB_PASSWORD=/d' .env
            fi
            echo "ZYNTAPOS_DB_PASSWORD=${NEW_PASS}" >> .env
            echo ".env updated with new DB password"

            echo "=== Step 2: Ensure certs + keys exist ==="
            if [ ! -f backend/caddy/certs/zyntapos_origin.pem ]; then
              mkdir -p backend/caddy/certs
              openssl req -x509 -newkey rsa:4096 \
                -keyout backend/caddy/certs/zyntapos_origin.key \
                -out backend/caddy/certs/zyntapos_origin.pem \
                -days 365 -nodes \
                -subj "/CN=zyntapos.com/O=Zynta Solutions/C=LK" \
                -addext "subjectAltName=DNS:zyntapos.com,DNS:*.zyntapos.com"
              echo "TLS cert generated"
            else
              echo "TLS cert exists"
            fi

            if [ ! -f secrets/rs256_private_key.pem ]; then
              openssl genpkey -algorithm RSA -out secrets/rs256_private_key.pem -pkeyopt rsa_keygen_bits:2048
              openssl rsa -pubout -in secrets/rs256_private_key.pem -out secrets/rs256_public_key.pem
              chmod 600 secrets/rs256_private_key.pem
              echo "RS256 keys generated"
            else
              echo "RS256 keys exist"
            fi
            # Ensure container's non-root user can read bind-mounted keys
            # Private key: 640 (owner rw, group read for container user)
            chmod 640 secrets/rs256_private_key.pem
            chmod 644 secrets/rs256_public_key.pem
            chmod 640 secrets/db_password.txt

            echo "=== Step 3: Docker compose down ==="
            docker compose down --remove-orphans
            docker ps -aq --filter "name=zyntapos_" | xargs -r docker rm -f 2>/dev/null || true

            RESET_DB="${{ github.event.inputs.reset_db }}"
            if [ "$RESET_DB" = "yes" ]; then
              echo "=== Step 3b: Removing pgdata volume for fresh init ==="
              docker volume rm zyntapos_pgdata 2>/dev/null || true
              echo "pgdata volume removed — init-databases.sh will create per-service DBs"
            fi

            echo "=== Step 4: GHCR login + pull ==="
            echo "${{ secrets.PAT_TOKEN }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin
            docker compose pull --quiet

            echo "=== Step 5: Start stack ==="
            docker compose up -d
            echo "Waiting 60s for services to initialize..."
            sleep 60

            echo "=== Step 6: Final status ==="
            docker compose ps

            echo ""
            echo "--- Health checks ---"
            docker exec zyntapos_api wget -qO- http://localhost:8080/health 2>/dev/null && echo " API OK" || echo " API not healthy yet"
            docker exec zyntapos_license wget -qO- http://localhost:8083/health 2>/dev/null && echo " License OK" || echo " License not healthy yet"
            docker exec zyntapos_sync wget -qO- http://localhost:8082/health 2>/dev/null && echo " Sync OK" || echo " Sync not healthy yet"

            echo ""
            echo "--- API logs (last 10 lines) ---"
            docker logs zyntapos_api --tail 10 2>&1 || true
            echo ""
            echo "--- License logs (last 5 lines) ---"
            docker logs zyntapos_license --tail 5 2>&1 || true
