name: "VPS Full Fix"

# Fixes:
# 1. git pull to get updated docker-compose.yml (./backend/caddy/certs mount)
# 2. Strip trailing newline from db_password.txt + reset postgres password
# 3. Recreate caddy/api/license containers with updated compose config

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "fullfix" to confirm'
        required: true
        default: ''

permissions:
  contents: read

jobs:
  fix:
    name: "Full VPS Fix"
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'fullfix'

    steps:
      - name: Fix password + certs + recreate containers
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 60s
          command_timeout: 10m
          script: |
            set -euo pipefail
            cd /opt/zyntapos

            echo "=== Step 1: git pull (get updated docker-compose.yml) ==="
            git pull origin main
            grep "caddy/certs" docker-compose.yml

            echo "=== Step 2: Strip trailing newline from db_password.txt ==="
            perl -pi -e 'chomp if eof' secrets/db_password.txt
            DB_PASS=$(cat secrets/db_password.txt)
            echo "Password length: ${#DB_PASS} chars (no trailing newline)"

            echo "=== Step 3: Reset postgres password to match ==="
            docker exec zyntapos_postgres psql -U zyntapos -d zyntapos \
              -c "ALTER USER zyntapos WITH PASSWORD '${DB_PASS}';"
            echo "Password reset done"

            echo "=== Step 4: Verify cert exists at correct path ==="
            ls -la backend/caddy/certs/ || echo "WARN: certs dir missing"
            if [ ! -f backend/caddy/certs/zyntapos_origin.pem ]; then
              echo "Generating self-signed cert..."
              mkdir -p backend/caddy/certs
              openssl req -x509 -newkey rsa:4096 \
                -keyout backend/caddy/certs/zyntapos_origin.key \
                -out backend/caddy/certs/zyntapos_origin.pem \
                -days 365 -nodes \
                -subj "/CN=zyntapos.com/O=Zynta Solutions/C=LK" \
                -addext "subjectAltName=DNS:zyntapos.com,DNS:*.zyntapos.com"
              echo "Cert generated"
            else
              echo "Cert already present"
            fi

            echo "=== Step 5: Recreate caddy, api, license ==="
            docker compose up -d --force-recreate caddy api license
            sleep 50

            echo "=== Step 6: Final status ==="
            docker compose ps
            echo ""
            echo "=== Health checks ==="
            curl -sf http://localhost:8080/health && echo " <- API OK" || echo "API not healthy"
            curl -sf http://localhost:8083/health && echo " <- License OK" || echo "License not healthy"
