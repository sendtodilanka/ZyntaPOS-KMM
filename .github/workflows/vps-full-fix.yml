name: "VPS Full Fix"

# Definitive fix:
# 1. Generate known password, write to file, ALTER ROLE in postgres
# 2. Full docker compose down + up (forces secret recreation)
# 3. Verify all services healthy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "fullfix" to confirm'
        required: true
        default: ''

permissions:
  contents: read

jobs:
  fix:
    name: "Full VPS Fix"
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'fullfix'

    steps:
      - name: Full reset — password sync + down/up
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 60s
          command_timeout: 10m
          script: |
            set -euo pipefail
            cd /opt/zyntapos

            echo "=== Step 0: git pull latest compose changes ==="
            git pull origin main

            echo "=== Step 1: Generate fresh password ==="
            NEW_PASS=$(openssl rand -hex 32)
            printf '%s' "$NEW_PASS" > secrets/db_password.txt
            echo "File size: $(wc -c < secrets/db_password.txt) bytes (expect 64)"

            echo "=== Step 2: ALTER ROLE in running postgres ==="
            docker exec zyntapos_postgres psql -U zyntapos -d zyntapos \
              -c "ALTER USER zyntapos WITH PASSWORD '${NEW_PASS}';"

            echo "=== Step 3: Test TCP auth with new password ==="
            docker run --rm \
              --network zyntapos_zyntapos_net \
              -e PGPASSWORD="$NEW_PASS" \
              postgres:16-alpine \
              psql -h postgres -p 5432 -U zyntapos -d zyntapos \
              -c "SELECT 'TCP_AUTH_OK' as result;" \
              && echo "TCP AUTH SUCCESS" || echo "TCP AUTH FAILED - password still wrong!"

            echo "=== Step 4: Ensure cert exists ==="
            if [ ! -f backend/caddy/certs/zyntapos_origin.pem ]; then
              mkdir -p backend/caddy/certs
              openssl req -x509 -newkey rsa:4096 \
                -keyout backend/caddy/certs/zyntapos_origin.key \
                -out backend/caddy/certs/zyntapos_origin.pem \
                -days 365 -nodes \
                -subj "/CN=zyntapos.com/O=Zynta Solutions/C=LK" \
                -addext "subjectAltName=DNS:zyntapos.com,DNS:*.zyntapos.com"
            else
              echo "Cert exists"
            fi

            echo "=== Step 5: Full docker compose down + up ==="
            # 'down' removes containers + networks (volumes kept)
            docker compose down --remove-orphans
            # Force-remove any stale containers that 'down' may have missed
            docker ps -aq --filter "name=zyntapos_" | xargs -r docker rm -f 2>/dev/null || true
            sleep 3
            docker compose up -d
            sleep 90

            echo "=== Step 6: Final status ==="
            docker compose ps
            curl -sf http://localhost:8080/health && echo "API OK" || echo "API not healthy yet"
            curl -sf http://localhost:8083/health && echo "License OK" || echo "License not healthy yet"
