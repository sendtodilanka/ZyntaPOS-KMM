name: "VPS Full Fix"

# Fixes:
# 1. Reset postgres password to match db_password.txt
# 2. Generate self-signed TLS cert for Caddy
# 3. Restart all services cleanly

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "fullfix" to confirm'
        required: true
        default: ''

permissions:
  contents: read

jobs:
  fix:
    name: "Full VPS Fix"
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'fullfix'

    steps:
      - name: Fix password + certs + restart
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 60s
          command_timeout: 10m
          script: |
            set -euo pipefail
            cd /opt/zyntapos

            echo "=== Step 1: Read current db_password.txt ==="
            DB_PASS=$(cat secrets/db_password.txt | tr -d '[:space:]')
            echo "Password length: ${#DB_PASS} chars"

            echo "=== Step 2: Reset postgres user password ==="
            docker exec zyntapos_postgres psql -U zyntapos -d zyntapos \
              -c "ALTER USER zyntapos WITH PASSWORD '${DB_PASS}';"
            echo "Password reset done"

            echo "=== Step 3: Generate self-signed TLS cert for Caddy ==="
            mkdir -p backend/caddy/certs
            if [ ! -f backend/caddy/certs/zyntapos_origin.pem ]; then
              openssl req -x509 -newkey rsa:4096 -keyout backend/caddy/certs/zyntapos_origin.key \
                -out backend/caddy/certs/zyntapos_origin.pem \
                -days 365 -nodes \
                -subj "/CN=api.zyntapos.com/O=Zynta Solutions/C=LK" \
                -addext "subjectAltName=DNS:api.zyntapos.com,DNS:localhost,IP:127.0.0.1"
              echo "Self-signed cert generated"
            else
              echo "Cert already exists, skipping"
            fi
            ls -la backend/caddy/certs/

            echo "=== Step 4: Restart all services ==="
            docker compose restart api license caddy
            sleep 40

            echo "=== Step 5: Final status ==="
            docker compose ps
            echo ""
            echo "=== API health ==="
            curl -sf http://localhost:8080/health || echo "API not healthy yet"
