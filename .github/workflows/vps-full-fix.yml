name: "VPS Full Fix"

# Definitive fix:
# 1. Generate a fresh known password, write to db_password.txt (no newline)
# 2. ALTER ROLE to that exact password in postgres
# 3. Verify cert at backend/caddy/certs/
# 4. Force-recreate api and license containers

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "fullfix" to confirm'
        required: true
        default: ''

permissions:
  contents: read

jobs:
  fix:
    name: "Full VPS Fix"
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'fullfix'

    steps:
      - name: Sync password + recreate containers
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 60s
          command_timeout: 10m
          script: |
            set -euo pipefail
            cd /opt/zyntapos

            echo "=== Step 1: Generate fresh known password ==="
            # printf (not echo) avoids trailing newline
            NEW_PASS=$(openssl rand -hex 32)
            printf '%s' "$NEW_PASS" > secrets/db_password.txt
            echo "New password length: ${#NEW_PASS} chars, file size: $(wc -c < secrets/db_password.txt) bytes"

            echo "=== Step 2: ALTER ROLE to match new password ==="
            docker exec zyntapos_postgres psql -U zyntapos -d zyntapos \
              -c "ALTER USER zyntapos WITH PASSWORD '${NEW_PASS}';"
            echo "Password synced in postgres"

            echo "=== Step 3: Verify cert at correct path ==="
            if [ ! -f backend/caddy/certs/zyntapos_origin.pem ]; then
              mkdir -p backend/caddy/certs
              openssl req -x509 -newkey rsa:4096 \
                -keyout backend/caddy/certs/zyntapos_origin.key \
                -out backend/caddy/certs/zyntapos_origin.pem \
                -days 365 -nodes \
                -subj "/CN=zyntapos.com/O=Zynta Solutions/C=LK" \
                -addext "subjectAltName=DNS:zyntapos.com,DNS:*.zyntapos.com"
              echo "Cert generated"
            else
              echo "Cert present: $(ls -la backend/caddy/certs/)"
            fi

            echo "=== Step 4: Force-recreate api + license ==="
            docker compose up -d --force-recreate api license
            sleep 55

            echo "=== Step 5: Final status ==="
            docker compose ps
            echo ""
            curl -sf http://localhost:8080/health && echo "API OK" || echo "API not healthy"
            curl -sf http://localhost:8083/health && echo "License OK" || echo "License not healthy"
