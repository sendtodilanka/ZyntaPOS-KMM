name: "Step[6]: Smoke Test & Rollback"

# ─────────────────────────────────────────────────────────────────────────────
# PIPELINE POSITION: Step 6 of 7
#
# Fires when Step[5] dispatches "smoke-trigger" via repository_dispatch.
# Tests all 6 production endpoints. If any endpoint is unhealthy, the VPS
# is rolled back to the previous commit and the workflow fails visibly.
# If all endpoints are healthy, Sentry is notified and Step[7] is dispatched.
#
# CHAINING: Uses repository_dispatch instead of workflow_run to avoid
# ghost workflow interference.
#
# EDGE CASES HANDLED:
#   - Container startup delay: 30s initial wait + 3 retries with 30s gaps
#   - Rollback safety: uses HEAD~1 (the previously deployed commit)
#   - Rollback failure: if rollback SSH also fails, workflow fails loudly
#   - Sentry auth missing: step skipped gracefully if SENTRY_AUTH_TOKEN not set
#   - Partial outage: all 6 subdomains tested; any failure triggers full rollback
# ─────────────────────────────────────────────────────────────────────────────

on:
  repository_dispatch:
    types: [ smoke-trigger ]

permissions:
  contents: read
  deployments: write

env:
  DEPLOY_PATH: /opt/zyntapos

jobs:
  smoke-rollback:
    name: "Step[6]: Smoke Test & Rollback"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── Smoke test via SSH to bypass Cloudflare ──────────────────────
      # External curl from GitHub Actions gets 403 from Cloudflare WAF.
      # Instead, SSH into the VPS and test endpoints locally via Caddy
      # on localhost (Host header routing). This is more reliable and
      # tests the actual container health without CDN interference.
      - name: "Step[6]: Smoke Test Endpoints (via SSH)"
        id: smoke
        uses: appleboy/ssh-action@v1.2.5
        env:
          DEPLOY_SHA: ${{ github.event.client_payload.sha }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_USER_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 60s
          command_timeout: 5m
          envs: DEPLOY_SHA
          script: |
            set -euo pipefail

            echo "=================================================="
            echo " ZyntaPOS Smoke Test (local via Caddy)"
            echo " SHA: ${DEPLOY_SHA}"
            echo " Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "=================================================="
            echo ""
            echo "Waiting 30s for containers to initialise..."
            sleep 30

            PASS=true
            MAX_RETRIES=3
            RETRY_DELAY=10
            CURL_TIMEOUT=10

            for sub in api license panel docs status sync; do
              PING_HTTP="000"
              PING_BODY=""

              for attempt in $(seq 1 "$MAX_RETRIES"); do
                PING_HTTP=$(curl -s --max-time "$CURL_TIMEOUT" -o /dev/null \
                  -w "%{http_code}" -H "Host: ${sub}.zyntapos.com" \
                  "http://localhost/ping" 2>/dev/null) || PING_HTTP="000"
                PING_BODY=$(curl -s --max-time "$CURL_TIMEOUT" \
                  -H "Host: ${sub}.zyntapos.com" \
                  "http://localhost/ping" 2>/dev/null) || PING_BODY=""

                if [ "$PING_HTTP" = "200" ] && [ "$PING_BODY" = "ok" ]; then
                  break
                fi

                if [ "$attempt" -lt "$MAX_RETRIES" ]; then
                  echo "  ⏳ ${sub} /ping attempt ${attempt}/${MAX_RETRIES} — HTTP ${PING_HTTP}, retrying in ${RETRY_DELAY}s..."
                  sleep "$RETRY_DELAY"
                fi
              done

              HOME_HTTP=$(curl -s --max-time "$CURL_TIMEOUT" -o /dev/null \
                -w "%{http_code}" -H "Host: ${sub}.zyntapos.com" \
                "http://localhost/" 2>/dev/null) || HOME_HTTP="000"

              HOME_FIRST="${HOME_HTTP:0:1}"

              if [ "$PING_HTTP" = "200" ] && [ "$PING_BODY" = "ok" ] && { [ "$HOME_FIRST" = "2" ] || [ "$HOME_FIRST" = "3" ]; }; then
                echo "  ✅  ${sub}.zyntapos.com  /ping → ${PING_HTTP} (ok)  / → ${HOME_HTTP}"
              else
                echo "  ❌  ${sub}.zyntapos.com  /ping → ${PING_HTTP}  / → ${HOME_HTTP}"
                PASS=false
              fi
            done

            echo "=================================================="
            if $PASS; then
              echo "Result: ALL ENDPOINTS HEALTHY ✅"
            else
              echo "Result: ONE OR MORE ENDPOINTS DEGRADED ❌"
              exit 1
            fi
            echo "=================================================="

      - name: Write smoke test summary
        if: always()
        run: |
          DEPLOY_SHA="${{ github.event.client_payload.sha }}"
          {
            echo "## Step[6]: Smoke Test — \`${DEPLOY_SHA:0:8}\`"
            echo ""
            echo "**Tested at:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo ""
            if [ "${{ steps.smoke.outcome }}" = "success" ]; then
              echo "### All 6 endpoints healthy — deploy verified ✅"
            else
              echo "### Smoke test FAILED — automatic rollback initiated ❌"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Check smoke test result
        id: smoke_gate
        if: steps.smoke.outcome != 'success'
        run: |
          echo "::error::Smoke test failed — one or more endpoints are degraded"
          echo "Initiating automatic rollback..."
          exit 1

      - name: "Step[6]: Rollback on Smoke Failure"
        if: failure() && steps.smoke_gate.outcome == 'failure'
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_USER_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 60s
          command_timeout: 5m
          script: |
            set -euo pipefail
            cd ${{ env.DEPLOY_PATH }}
            CURRENT_SHA=$(git rev-parse HEAD)
            echo "=== ROLLBACK: smoke test failed for ${CURRENT_SHA} ==="

            if git rev-parse HEAD~1 >/dev/null 2>&1; then
              git reset --hard HEAD~1
              PREV_SHA=$(git rev-parse HEAD)
              echo "=== Rolled back to ${PREV_SHA} ==="
            else
              echo "=== Cannot rollback — this appears to be the first deploy ==="
              echo "=== Manual intervention required ==="
              exit 1
            fi

            docker compose pull --quiet
            docker compose up -d --remove-orphans
            docker image prune -f
            echo "=== Rollback complete: $(date) ==="
            docker compose ps

      - name: Notify Sentry of deploy
        if: steps.smoke.outcome == 'success'
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: zyntapos
        run: |
          if [ -z "$SENTRY_AUTH_TOKEN" ]; then
            echo "::warning::SENTRY_AUTH_TOKEN not configured — skipping Sentry notification"
            exit 0
          fi

          SENTRY_CLI_VERSION="2.42.2"
          echo "Downloading sentry-cli v${SENTRY_CLI_VERSION}..."
          curl -sSfL \
            "https://github.com/getsentry/sentry-cli/releases/download/${SENTRY_CLI_VERSION}/sentry-cli-Linux-x86_64" \
            -o /usr/local/bin/sentry-cli
          chmod +x /usr/local/bin/sentry-cli

          VERSION="${{ github.event.client_payload.sha }}"
          sentry-cli releases new "$VERSION" \
            --project zyntapos-api \
            --project zyntapos-license \
            --project zyntapos-sync \
            --project zyntapos-android
          sentry-cli releases set-commits "$VERSION" --auto
          sentry-cli releases finalize "$VERSION"
          sentry-cli releases deploys "$VERSION" new -e production
          echo "Sentry release $VERSION created and deployed"

      # ── Chain to Step[7]: Verify Endpoints ───────────────────────────────
      - name: Dispatch endpoint verification
        if: success()
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}
          event-type: verify-trigger
          client-payload: '{"sha": "${{ github.event.client_payload.sha }}"}'

      - name: Post smoke test final status
        if: always()
        run: |
          {
            echo ""
            echo "---"
            echo "_Step[6] finished at $(date -u '+%Y-%m-%d %H:%M:%S UTC') — status: **${{ job.status }}**_"
          } >> "$GITHUB_STEP_SUMMARY"
