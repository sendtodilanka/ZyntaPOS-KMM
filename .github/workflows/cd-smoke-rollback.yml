name: "Step[6]: Smoke Test & Rollback"
run-name: "${{ github.event.client_payload.title || 'Smoke Test' }} (${{ github.event.client_payload.sha || github.sha }})"

# ─────────────────────────────────────────────────────────────────────────────
# PIPELINE POSITION: Step 6 of 7
#
# Fires when Step[5] dispatches "smoke-trigger" via repository_dispatch.
# Tests all 6 production endpoints. If any endpoint is unhealthy, the VPS
# is rolled back to the previous commit and the workflow fails visibly.
# If all endpoints are healthy, Sentry is notified and Step[7] is dispatched.
#
# CHAINING: Uses repository_dispatch instead of workflow_run to avoid
# ghost workflow interference.
#
# EDGE CASES HANDLED:
#   - Container startup delay: 30s initial wait + 3 retries with 30s gaps
#   - Rollback safety: uses HEAD~1 (the previously deployed commit)
#   - Rollback failure: if rollback SSH also fails, workflow fails loudly
#   - Sentry auth missing: step skipped gracefully if SENTRY_AUTH_TOKEN not set
#   - Partial outage: all 6 subdomains tested; any failure triggers full rollback
# ─────────────────────────────────────────────────────────────────────────────

on:
  repository_dispatch:
    types: [ smoke-trigger ]

permissions:
  contents: read
  deployments: write

env:
  DEPLOY_PATH: /opt/zyntapos

jobs:
  smoke-rollback:
    name: "Step[6]: Smoke Test & Rollback"
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      # ── Smoke test via SSH to bypass Cloudflare ──────────────────────
      # External curl from GitHub Actions gets 403 from Cloudflare WAF.
      # Instead, SSH into the VPS and test endpoints locally via Caddy
      # on localhost (Host header routing). This is more reliable and
      # tests the actual container health without CDN interference.
      - name: "Step[6]: Smoke Test Endpoints (via SSH)"
        id: smoke
        uses: appleboy/ssh-action@v1.2.5
        env:
          DEPLOY_SHA: ${{ github.event.client_payload.sha }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_USER_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 60s
          command_timeout: 5m
          envs: DEPLOY_SHA
          script: |
            set -euo pipefail

            echo "=================================================="
            echo " ZyntaPOS Smoke Test (local via Caddy)"
            echo " SHA: ${DEPLOY_SHA}"
            echo " Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "=================================================="
            echo ""
            echo "Waiting 30s for containers to initialise..."
            sleep 30

            PASS=true
            MAX_RETRIES=3
            RETRY_DELAY=10
            CURL_TIMEOUT=10

            # Write markdown table to a temp file for the summary step to fetch
            RESULTS_FILE="/tmp/zyntapos-smoke-results.md"
            echo "| Subdomain | /ping | Body | / | Status |" > "$RESULTS_FILE"
            echo "|-----------|-------|------|---|--------|" >> "$RESULTS_FILE"

            for sub in api license panel docs status sync; do
              PING_HTTP="000"
              PING_BODY=""

              for attempt in $(seq 1 "$MAX_RETRIES"); do
                PING_HTTP=$(curl -s --max-time "$CURL_TIMEOUT" -o /dev/null \
                  -w "%{http_code}" -H "Host: ${sub}.zyntapos.com" \
                  "http://localhost/ping" 2>/dev/null) || PING_HTTP="000"
                PING_BODY=$(curl -s --max-time "$CURL_TIMEOUT" \
                  -H "Host: ${sub}.zyntapos.com" \
                  "http://localhost/ping" 2>/dev/null) || PING_BODY=""

                if [ "$PING_HTTP" = "200" ] && [ "$PING_BODY" = "ok" ]; then
                  break
                fi

                if [ "$attempt" -lt "$MAX_RETRIES" ]; then
                  echo "  ⏳ ${sub} /ping attempt ${attempt}/${MAX_RETRIES} — HTTP ${PING_HTTP}, retrying in ${RETRY_DELAY}s..."
                  sleep "$RETRY_DELAY"
                fi
              done

              HOME_HTTP=$(curl -s --max-time "$CURL_TIMEOUT" -o /dev/null \
                -w "%{http_code}" -H "Host: ${sub}.zyntapos.com" \
                "http://localhost/" 2>/dev/null) || HOME_HTTP="000"

              # /ping → 200 "ok" is the canonical liveness signal.
              # For api and license services, also verify /health → db: "ok" to
              # confirm the database connection pool is healthy post-deploy.
              # DB pool takes longer than /ping to initialise — retry up to 5 times
              # with 15s gaps (total max wait: ~75s extra after /ping passes).
              #
              # Health checks call the backend container directly via docker compose exec
              # (not through Caddy). Caddy's adapted config drops host-matched routes
              # from the :80 block when named HTTPS blocks own those hostnames, so
              # curl -H "Host: api.zyntapos.com" http://localhost/health returns 404.
              # Direct container access is also a better test of actual service health.
              HEALTH_DB=""
              if [ "$sub" = "api" ] || [ "$sub" = "license" ]; then
                # Map subdomain to container name and port
                CONTAINER="$sub"
                if [ "$sub" = "api" ]; then CONTAINER_PORT=8080; else CONTAINER_PORT=8083; fi

                HEALTH_MAX_RETRIES=5
                HEALTH_RETRY_DELAY=15
                for health_attempt in $(seq 1 "$HEALTH_MAX_RETRIES"); do
                  # Use curl -s (not -sf) so the response body is always captured,
                  # even on HTTP 503. The -f flag discards the body on errors, making
                  # it impossible to extract the "db" field from the JSON response.
                  HEALTH_BODY=$(cd ${{ env.DEPLOY_PATH }} && \
                    docker compose exec -T "$CONTAINER" \
                    curl -s --max-time 15 "http://localhost:${CONTAINER_PORT}/health" 2>/dev/null) || HEALTH_BODY=""
                  if [ -z "$HEALTH_BODY" ]; then
                    HEALTH_DB="no-response"
                  else
                    HEALTH_DB=$(echo "$HEALTH_BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('db','?'))" 2>/dev/null) || HEALTH_DB="parse-error"
                  fi

                  if [ "$HEALTH_DB" = "ok" ]; then
                    break
                  fi

                  if [ "$health_attempt" -lt "$HEALTH_MAX_RETRIES" ]; then
                    echo "  ⏳ ${sub} /health db=${HEALTH_DB} attempt ${health_attempt}/${HEALTH_MAX_RETRIES} — retrying in ${HEALTH_RETRY_DELAY}s..."
                    sleep "$HEALTH_RETRY_DELAY"
                  fi
                done
              fi

              if [ "$PING_HTTP" = "200" ] && [ "$PING_BODY" = "ok" ]; then
                if [ -n "$HEALTH_DB" ] && [ "$HEALTH_DB" != "ok" ]; then
                  echo "  ❌  ${sub}.zyntapos.com  /ping ✅  /health db=${HEALTH_DB} ❌"
                  echo "| \`${sub}.zyntapos.com\` | \`${PING_HTTP}\` | \`ok\` | \`${HOME_HTTP}\` | ❌ DB Degraded (db=${HEALTH_DB}) |" >> "$RESULTS_FILE"
                  PASS=false
                else
                  DB_NOTE=""; [ -n "$HEALTH_DB" ] && DB_NOTE=" db=${HEALTH_DB}"
                  echo "  ✅  ${sub}.zyntapos.com  /ping → ${PING_HTTP} (ok)  / → ${HOME_HTTP}${DB_NOTE}"
                  echo "| \`${sub}.zyntapos.com\` | \`${PING_HTTP}\` | \`ok\` | \`${HOME_HTTP}\` | ✅ Healthy${DB_NOTE} |" >> "$RESULTS_FILE"
                fi
              else
                echo "  ❌  ${sub}.zyntapos.com  /ping → ${PING_HTTP}  / → ${HOME_HTTP}"
                echo "| \`${sub}.zyntapos.com\` | \`${PING_HTTP}\` | \`${PING_BODY:-—}\` | \`${HOME_HTTP}\` | ❌ Degraded |" >> "$RESULTS_FILE"
                PASS=false
              fi
            done

            echo "=================================================="
            if $PASS; then
              echo "Result: ALL ENDPOINTS HEALTHY ✅"
            else
              echo "Result: ONE OR MORE ENDPOINTS DEGRADED ❌"
              exit 1
            fi
            echo "=================================================="

      # ── Setup SSH for fetching results table from VPS ───────────────
      - name: Setup SSH key
        if: always()
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_USER_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Write smoke test summary
        if: always()
        run: |
          DEPLOY_SHA="${{ github.event.client_payload.sha }}"
          # Fetch the results table from VPS
          RESULTS=$(ssh -i ~/.ssh/id_deploy -p ${{ secrets.VPS_PORT }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'cat /tmp/zyntapos-smoke-results.md 2>/dev/null') || RESULTS=""
          {
            echo "## Step[6]: Smoke Test — \`${DEPLOY_SHA:0:8}\`"
            echo ""
            echo "**Tested at:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo ""
            if [ -n "$RESULTS" ]; then
              echo "$RESULTS"
              echo ""
            fi
            if [ "${{ steps.smoke.outcome }}" = "success" ]; then
              echo "### Result: All 6 endpoints healthy — deploy verified ✅"
            else
              echo "### Result: Smoke test FAILED — automatic rollback initiated ❌"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Check smoke test result
        id: smoke_gate
        if: steps.smoke.outcome != 'success'
        run: |
          echo "::error::Smoke test failed — one or more endpoints are degraded"
          echo "Initiating automatic rollback..."
          exit 1

      - name: "Step[6]: Rollback on Smoke Failure"
        if: failure() && steps.smoke_gate.outcome == 'failure'
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_USER_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 60s
          command_timeout: 20m
          script: |
            set -euo pipefail
            cd ${{ env.DEPLOY_PATH }}
            CURRENT_SHA=$(git rev-parse HEAD)
            echo "=== ROLLBACK: smoke test failed for ${CURRENT_SHA} ==="

            # Use the pre-deploy SHA saved by cd-deploy.yml (more reliable than HEAD~1
            # which is fragile when rapid successive deploys occur).
            SAVED_SHA=$(cat /tmp/zyntapos-prev-sha-${CURRENT_SHA} 2>/dev/null | tr -d '[:space:]') || SAVED_SHA=""

            if [ -n "$SAVED_SHA" ] && [ "$SAVED_SHA" != "none" ] && git rev-parse "$SAVED_SHA" >/dev/null 2>&1; then
              git reset --hard "$SAVED_SHA"
              echo "=== Rolled back to pre-deploy SHA: ${SAVED_SHA} ==="
            elif git rev-parse HEAD~1 >/dev/null 2>&1; then
              git reset --hard HEAD~1
              PREV_SHA=$(git rev-parse HEAD)
              echo "=== Rolled back to HEAD~1: ${PREV_SHA} (pre-deploy SHA file not available) ==="
            else
              echo "=== Cannot rollback — this appears to be the first deploy ==="
              echo "=== Manual intervention required ==="
              exit 1
            fi

            PULL_SUCCESS=false
            for pull_attempt in 1 2 3; do
              echo "=== Rollback docker compose pull (attempt ${pull_attempt}/3) ==="
              if timeout 300 docker compose pull --quiet; then
                PULL_SUCCESS=true
                break
              fi
              echo "::warning::Rollback pull attempt ${pull_attempt} failed — retrying in 10s..."
              sleep 10
            done
            if [ "$PULL_SUCCESS" = "false" ]; then
              echo "::error::Rollback pull failed after 3 attempts — manual intervention required"
              exit 1
            fi
            docker compose up -d --remove-orphans
            docker image prune -f
            if ! docker compose exec -T caddy caddy reload --config /etc/caddy/Caddyfile 2>&1; then
              echo "::warning::Caddy reload failed after rollback — Caddy may be serving stale config"
            fi
            echo "=== Rollback complete: $(date) ==="
            docker compose ps

      - name: Checkout repository (for Sentry commit tracking)
        if: steps.smoke.outcome == 'success'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Notify Sentry of deploy
        if: steps.smoke.outcome == 'success'
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: zyntapos
        run: |
          if [ -z "$SENTRY_AUTH_TOKEN" ]; then
            echo "::warning::SENTRY_AUTH_TOKEN not configured — skipping Sentry notification"
            exit 0
          fi

          SENTRY_CLI_VERSION="2.42.2"
          SENTRY_SHA256="7d5e69080cac84468547796a1123a2db05133dc4da5b4b042f5f1b5f32050cc5"
          echo "Downloading sentry-cli v${SENTRY_CLI_VERSION}..."
          curl -sSfL \
            "https://github.com/getsentry/sentry-cli/releases/download/${SENTRY_CLI_VERSION}/sentry-cli-Linux-x86_64" \
            -o /usr/local/bin/sentry-cli
          echo "${SENTRY_SHA256}  /usr/local/bin/sentry-cli" | sha256sum -c -
          chmod +x /usr/local/bin/sentry-cli

          VERSION="${{ github.event.client_payload.sha }}"
          sentry-cli releases new "$VERSION" \
            --project zyntapos-api \
            --project zyntapos-license \
            --project zyntapos-sync \
            --project zyntapos-android
          sentry-cli releases set-commits "$VERSION" --auto
          sentry-cli releases finalize "$VERSION"
          sentry-cli releases deploys "$VERSION" new -e production
          echo "Sentry release $VERSION created and deployed"

      # ── Chain to Step[7]: Verify Endpoints ───────────────────────────────
      - name: Dispatch endpoint verification
        if: success()
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}
          event-type: verify-trigger
          client-payload: '{"sha": "${{ github.event.client_payload.sha }}", "title": "${{ github.event.client_payload.title }}"}'

      - name: Post smoke test final status
        if: always()
        run: |
          {
            echo ""
            echo "---"
            echo "_Step[6] finished at $(date -u '+%Y-%m-%d %H:%M:%S UTC') — status: **${{ job.status }}**_"
          } >> "$GITHUB_STEP_SUMMARY"
