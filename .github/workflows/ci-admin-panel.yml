name: CI — Admin Panel

on:
  push:
    branches: ['claude/**', 'feature/**', 'main']
    paths:
      - 'admin-panel/**'
      - '.github/workflows/ci-admin-panel.yml'
  pull_request:
    branches: [main]
    paths:
      - 'admin-panel/**'

defaults:
  run:
    working-directory: admin-panel

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: admin-panel/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit (security)
        run: npm audit --audit-level=high
        continue-on-error: true   # Report-only until audit backlog is triaged

      - name: TypeScript type check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: admin-panel/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:ci

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: admin-panel-coverage
          path: admin-panel/coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint-typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: admin-panel/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://api.zyntapos.com
          VITE_LICENSE_URL: https://license.zyntapos.com
          VITE_SYNC_URL: https://sync.zyntapos.com

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-panel-dist
          path: admin-panel/dist/
          retention-days: 7

  # ── Docker Build (branch builds only — main push is handled by ci-push-main.yml) ──
  # ci-push-main.yml → build-admin-panel-image already builds and pushes to GHCR on
  # push-to-main. This job only validates the Docker build on feature branches
  # (build-only, no push) to catch Dockerfile issues before merge.
  docker-validate:
    name: Docker Build (validate)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build]
    # Only run on feature/claude branches — main push is handled by ci-push-main.yml
    # to avoid double image push and version drift (ci-push-main uses @v6, this was @v5).
    if: github.ref != 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (validate only — no push)
        uses: docker/build-push-action@v6
        with:
          context: admin-panel
          push: false
          tags: admin-panel:validate
          build-args: |
            VITE_API_URL=https://api.zyntapos.com
            VITE_LICENSE_URL=https://license.zyntapos.com
            VITE_SYNC_URL=https://sync.zyntapos.com
          cache-from: type=gha
          cache-to: type=gha,mode=max
