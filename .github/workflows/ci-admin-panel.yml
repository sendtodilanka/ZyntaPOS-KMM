name: CI — Admin Panel

on:
  push:
    branches: ['claude/**', 'feature/**', 'main']
    paths:
      - 'admin-panel/**'
      - '.github/workflows/ci-admin-panel.yml'
  pull_request:
    branches: [main]
    paths:
      - 'admin-panel/**'

defaults:
  run:
    working-directory: admin-panel

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: admin-panel/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: admin-panel/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:ci

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: admin-panel-coverage
          path: admin-panel/coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint-typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: admin-panel/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: /api
          VITE_LICENSE_BASE_URL: /license
          VITE_SYNC_BASE_URL: /sync

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-panel-dist
          path: admin-panel/dist/
          retention-days: 7

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/claude/')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image name
        id: image
        run: echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: admin-panel
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ steps.image.outputs.repo }}/admin-panel:latest
            ghcr.io/${{ steps.image.outputs.repo }}/admin-panel:${{ github.sha }}
          build-args: |
            VITE_API_BASE_URL=/api
            VITE_LICENSE_BASE_URL=/license
            VITE_SYNC_BASE_URL=/sync
          cache-from: type=gha
          cache-to: type=gha,mode=max
