name: Website CI

on:
  push:
    branches: [main, 'claude/**']
    paths: ['website/**']
  pull_request:
    branches: [main]
    paths: ['website/**']

jobs:
  build:
    name: Build Astro Site
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: website

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: website/.nvmrc

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npx astro build
        env:
          SITE_URL: https://www.zyntapos.com

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: website-dist
          path: website/dist/
          retention-days: 7

  lighthouse:
    name: Lighthouse CI
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: website-dist
          path: website/dist/

      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: website/lighthouserc.json
          uploadArtifacts: true

  playwright:
    name: Playwright Tests
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: website

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: website/.nvmrc

      - name: Install dependencies
        run: npm install

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: website-dist
          path: website/dist/

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run navigation & accessibility tests
        run: npx playwright test tests/navigation.spec.ts tests/accessibility.spec.ts
        env:
          CI: true

      - name: Run visual regression tests
        # On first run this generates baselines — subsequent runs diff against them.
        # Pass --update-snapshots once to establish the baseline, then remove the flag.
        run: npx playwright test tests/visual.spec.ts
        env:
          CI: true
        continue-on-error: true  # visual tests are non-blocking until baselines are committed

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: website/playwright-report/
          retention-days: 7

      - name: Upload visual snapshots (baseline or diff)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-snapshots
          path: website/tests/**/*.png
          retention-days: 7
