name: "FTS Step 2: Security Hardening"

# ─────────────────────────────────────────────────────────────────────────────
# FIRST-TIME SETUP — STEP 2 of 6
#
# Runs as: ROOT
# Requires: Step 1 completed (green)
#
# What it does:
#   1. UFW firewall — deny all incoming, allow SSH/80/443 only
#   2. Fail2Ban — brute force protection (SSH jail)
#   3. SSH hardening — MaxAuthTries 3, prohibit-password root, idle timeout
#   4. Unattended upgrades — automatic security patches
#   5. Disable IPv6 if not needed (reduce attack surface)
#   6. Restrict deploy user sudo to docker-only commands
#
# Verification:
#   ✅ UFW active with correct rules
#   ✅ Fail2Ban running with SSH jail enabled
#   ✅ SSH config hardened
#   ✅ Unattended upgrades enabled
#
# Next: Run "FTS Step 3" after this turns green.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "step2" to confirm'
        required: true
        default: ''
      ssh_port:
        description: 'SSH port (default: 22)'
        required: false
        default: '22'

permissions:
  contents: read

jobs:
  step2:
    name: "Step 2: Security Hardening"
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'step2'

    steps:
      - name: "Execute Step 2 (as root)"
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_ROOT }}
          key: ${{ secrets.VPS_ROOT_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 120s
          command_timeout: 10m
          script: |
            set -euo pipefail
            SSH_PORT="${{ github.event.inputs.ssh_port }}"
            [ -z "$SSH_PORT" ] && SSH_PORT="22"

            echo "╔══════════════════════════════════════════════════════╗"
            echo "║  FTS Step 2: Security Hardening                     ║"
            echo "╚══════════════════════════════════════════════════════╝"
            echo "Started: $(date)"
            echo "SSH Port: $SSH_PORT"
            echo ""

            export DEBIAN_FRONTEND=noninteractive

            # ── 1. UFW Firewall ───────────────────────────────────────
            echo "━━━ 1/5: UFW Firewall ━━━"
            apt-get install -y -qq ufw

            # Reset and configure from scratch
            ufw --force reset
            ufw default deny incoming
            ufw default allow outgoing

            # Allow SSH (current port)
            ufw allow "$SSH_PORT/tcp" comment 'SSH'

            # Allow HTTP/HTTPS (Caddy reverse proxy)
            ufw allow 80/tcp comment 'HTTP (Caddy)'
            ufw allow 443/tcp comment 'HTTPS (Caddy)'

            # Enable firewall
            ufw --force enable
            echo "  ✅ UFW configured and enabled"
            ufw status numbered

            # ── 2. Fail2Ban ───────────────────────────────────────────
            echo ""
            echo "━━━ 2/5: Fail2Ban ━━━"
            apt-get install -y -qq fail2ban

            cat > /etc/fail2ban/jail.local << JAILEOF
            [DEFAULT]
            bantime = 3600
            findtime = 600
            maxretry = 5
            banaction = ufw

            [sshd]
            enabled = true
            port = $SSH_PORT
            logpath = %(sshd_log)s
            backend = %(sshd_backend)s
            maxretry = 3
            bantime = 7200
            JAILEOF

            systemctl enable fail2ban
            systemctl restart fail2ban
            echo "  ✅ Fail2Ban configured (SSH jail: 3 retries, 2h ban)"

            # ── 3. SSH Hardening ──────────────────────────────────────
            echo ""
            echo "━━━ 3/5: SSH Hardening ━━━"

            # Create hardening config (idempotent — overwrites if exists)
            cat > /etc/ssh/sshd_config.d/99-zyntapos-hardening.conf << 'SSHEOF'
            # ZyntaPOS SSH Hardening
            # Max authentication attempts per connection
            MaxAuthTries 3

            # Root login: key-based only (no password)
            PermitRootLogin prohibit-password

            # Disable password authentication entirely (keys only)
            PasswordAuthentication no

            # Disable empty passwords
            PermitEmptyPasswords no

            # Disable X11 forwarding (not needed for server)
            X11Forwarding no

            # Idle timeout: disconnect after 5 minutes of inactivity
            ClientAliveInterval 300
            ClientAliveCountMax 2

            # Disable TCP forwarding (not needed)
            AllowTcpForwarding no

            # Disable agent forwarding
            AllowAgentForwarding no

            # Log level for audit trail
            LogLevel VERBOSE
            SSHEOF

            # Validate sshd config before restart
            sshd -t && echo "  ✅ SSH config syntax valid" || { echo "  ❌ SSH config syntax error"; exit 1; }

            systemctl restart sshd
            echo "  ✅ SSH hardened: key-only, MaxAuthTries 3, idle timeout 5m"

            # ── 4. Unattended Upgrades ────────────────────────────────
            echo ""
            echo "━━━ 4/5: Unattended Security Upgrades ━━━"
            apt-get install -y -qq unattended-upgrades apt-listchanges

            # Enable automatic security updates
            cat > /etc/apt/apt.conf.d/20auto-upgrades << 'AUTOEOF'
            APT::Periodic::Update-Package-Lists "1";
            APT::Periodic::Unattended-Upgrade "1";
            APT::Periodic::Download-Upgradeable-Packages "1";
            APT::Periodic::AutocleanInterval "7";
            AUTOEOF

            # Configure what gets auto-upgraded (security only)
            cat > /etc/apt/apt.conf.d/50unattended-upgrades << 'UUEOF'
            Unattended-Upgrade::Allowed-Origins {
                "${distro_id}:${distro_codename}-security";
                "${distro_id}ESMApps:${distro_codename}-apps-security";
                "${distro_id}ESM:${distro_codename}-infra-security";
            };
            Unattended-Upgrade::AutoFixInterruptedDpkg "true";
            Unattended-Upgrade::MinimalSteps "true";
            Unattended-Upgrade::Remove-Unused-Kernel-Packages "true";
            Unattended-Upgrade::Remove-Unused-Dependencies "true";
            UUEOF

            echo "  ✅ Unattended security upgrades enabled (daily)"

            # ── 5. Additional hardening ───────────────────────────────
            echo ""
            echo "━━━ 5/5: Additional Hardening ━━━"

            # Disable core dumps (prevent credential leaks)
            if ! grep -q "hard core 0" /etc/security/limits.conf 2>/dev/null; then
              echo "* hard core 0" >> /etc/security/limits.conf
              echo "  ✅ Core dumps disabled"
            else
              echo "  ✅ Core dumps already disabled"
            fi

            # Protect sysctl.conf
            if ! grep -q "fs.suid_dumpable" /etc/sysctl.d/99-zyntapos-security.conf 2>/dev/null; then
              cat >> /etc/sysctl.d/99-zyntapos-security.conf << 'SECEOF'
            # Security: prevent SUID core dumps
            fs.suid_dumpable = 0

            # Security: restrict dmesg access
            kernel.dmesg_restrict = 1

            # Security: restrict kernel pointer exposure
            kernel.kptr_restrict = 2

            # Security: enable ASLR (Address Space Layout Randomization)
            kernel.randomize_va_space = 2

            # Security: SYN flood protection
            net.ipv4.tcp_syncookies = 1

            # Security: ignore ICMP redirects
            net.ipv4.conf.all.accept_redirects = 0
            net.ipv4.conf.default.accept_redirects = 0

            # Security: ignore source-routed packets
            net.ipv4.conf.all.accept_source_route = 0
            net.ipv4.conf.default.accept_source_route = 0

            # Security: log martian packets
            net.ipv4.conf.all.log_martians = 1
            SECEOF
              sysctl --system > /dev/null 2>&1
              echo "  ✅ Kernel security parameters applied"
            else
              echo "  ✅ Kernel security parameters already set"
            fi

            # ══════════════════════════════════════════════════════════
            # VERIFICATION
            # ══════════════════════════════════════════════════════════
            echo ""
            echo "╔══════════════════════════════════════════════════════╗"
            echo "║               STEP 2 — VERIFICATION                 ║"
            echo "╠══════════════════════════════════════════════════════╣"

            PASS=0
            FAIL=0

            check_pass() { echo "║  ✅ $1"; PASS=$((PASS+1)); }
            check_fail() { echo "║  ❌ $1"; FAIL=$((FAIL+1)); }

            # V1: UFW active
            ufw status | grep -q "Status: active" && check_pass "UFW is active" || check_fail "UFW NOT active"

            # V2: UFW SSH rule
            ufw status | grep -q "$SSH_PORT/tcp" && check_pass "UFW allows SSH on port $SSH_PORT" || check_fail "UFW SSH rule MISSING"

            # V3: UFW HTTP rule
            ufw status | grep -q "80/tcp" && check_pass "UFW allows HTTP (80)" || check_fail "UFW HTTP rule MISSING"

            # V4: UFW HTTPS rule
            ufw status | grep -q "443/tcp" && check_pass "UFW allows HTTPS (443)" || check_fail "UFW HTTPS rule MISSING"

            # V5: UFW default deny
            ufw status verbose | grep -q "deny (incoming)" && check_pass "UFW default deny incoming" || check_fail "UFW default NOT deny incoming"

            # V6: Fail2Ban running
            systemctl is-active fail2ban &>/dev/null && check_pass "Fail2Ban running" || check_fail "Fail2Ban NOT running"

            # V7: Fail2Ban SSH jail
            fail2ban-client status sshd &>/dev/null && check_pass "Fail2Ban SSH jail active" || check_fail "Fail2Ban SSH jail NOT active"

            # V8: SSH hardening file
            [ -f /etc/ssh/sshd_config.d/99-zyntapos-hardening.conf ] && check_pass "SSH hardening config present" || check_fail "SSH hardening config MISSING"

            # V9: Password auth disabled
            grep -q "PasswordAuthentication no" /etc/ssh/sshd_config.d/99-zyntapos-hardening.conf && check_pass "Password auth disabled" || check_fail "Password auth NOT disabled"

            # V10: Unattended upgrades
            [ -f /etc/apt/apt.conf.d/20auto-upgrades ] && check_pass "Auto-upgrades configured" || check_fail "Auto-upgrades NOT configured"

            # V11: Core dumps disabled
            grep -q "hard core 0" /etc/security/limits.conf && check_pass "Core dumps disabled" || check_fail "Core dumps NOT disabled"

            # V12: Kernel security params
            [ -f /etc/sysctl.d/99-zyntapos-security.conf ] && check_pass "Kernel security params set" || check_fail "Kernel security params MISSING"

            echo "╠══════════════════════════════════════════════════════╣"
            printf "║  PASSED: %-42s║\n" "$PASS"
            printf "║  FAILED: %-42s║\n" "$FAIL"
            echo "╚══════════════════════════════════════════════════════╝"

            if [ "$FAIL" -gt 0 ]; then
              echo ""
              echo "⛔ STEP 2 FAILED — $FAIL check(s) did not pass."
              exit 1
            fi

            echo ""
            echo "🟢 STEP 2 COMPLETE — Security hardened. Run FTS Step 3 next."
