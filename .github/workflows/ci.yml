name: CI

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # Allow manual triggering from the Actions tab

# Minimal permissions — CI only reads repo content and uploads artifacts.
permissions:
  contents: read
  checks: write          # Required for status check reporting on PRs
  actions: read

# Cancel in-progress CI when a newer push arrives on the same PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v6

      # ── Java ──────────────────────────────────────────────────────────────
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      # ── Override daemon JVM to use the CI JDK (avoids foojay.io download) ─
      - name: Point org.gradle.java.home to CI JDK
        run: echo "org.gradle.java.home=$JAVA_HOME" >> gradle.properties

      # ── Gradle ────────────────────────────────────────────────────────────
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false   # always write cache — push trigger for main/develop was removed

      # ── Secrets / local.properties ────────────────────────────────────────
      # Uses local.properties.dev (tracked, no real secrets) via the helper
      # script. Debug builds use DevApiService (no-op stub) so backend secrets
      # are never consumed at runtime.
      - name: Create local.properties from dev template
        run: ./scripts/setup-local-properties.sh

      # ── Shared Modules ────────────────────────────────────────────────────
      - name: Build :shared:core (JVM)
        run: ./gradlew :shared:core:jvmJar --stacktrace

      - name: Build :shared:domain (JVM)
        run: ./gradlew :shared:domain:jvmJar --stacktrace

      - name: Build :shared:data (JVM)
        run: ./gradlew :shared:data:jvmJar --stacktrace

      - name: Build :shared:hal (JVM)
        run: ./gradlew :shared:hal:jvmJar --stacktrace

      - name: Build :shared:security (JVM)
        run: ./gradlew :shared:security:jvmJar --stacktrace

      # ── Android ───────────────────────────────────────────────────────────
      - name: Build Android debug APK
        run: ./gradlew :androidApp:assembleDebug --stacktrace

      # ── Desktop ───────────────────────────────────────────────────────────
      - name: Build Desktop JVM JAR
        run: ./gradlew :composeApp:jvmJar --stacktrace

      # ── Lint ──────────────────────────────────────────────────────────────
      - name: Run Android Lint (debug)
        run: ./gradlew :androidApp:lintDebug --stacktrace

      - name: Run Detekt (static analysis)
        run: ./gradlew detekt --stacktrace

      # ── Tests ─────────────────────────────────────────────────────────────
      - name: Run all tests (JVM targets)
        run: ./gradlew allTests --stacktrace --continue

      # ── Artifacts ─────────────────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: zyntapos-debug-apk
          path: androidApp/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/build/reports/tests/'
          retention-days: 7

      - name: Upload lint & Detekt reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: |
            **/build/reports/lint-results*.html
            **/build/reports/detekt/
          retention-days: 7
