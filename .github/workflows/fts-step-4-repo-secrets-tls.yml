name: "FTS Step 4: Repo + Secrets + TLS"

# ─────────────────────────────────────────────────────────────────────────────
# FIRST-TIME SETUP — STEP 4 of 6
#
# Runs as: DEPLOY USER
# Requires: Steps 1-3 completed (green)
#
# What it does:
#   1. Clones repository to /opt/zyntapos
#   2. Generates DB password (64-char hex, cryptographically random)
#   3. Generates RS256 JWT key pair (RSA 2048-bit)
#   4. Creates .env file (REDIS_PASSWORD, ZYNTAPOS_DB_PASSWORD)
#   5. Generates self-signed TLS certificate (for Caddy origin)
#   6. Sets correct file permissions on all secrets
#
# Verification:
#   ✅ Git repo cloned at /opt/zyntapos
#   ✅ docker-compose.yml, Caddyfile, nginx.conf present
#   ✅ secrets/db_password.txt exists (64+ bytes)
#   ✅ RS256 key pair exists and matches
#   ✅ .env has REDIS_PASSWORD and ZYNTAPOS_DB_PASSWORD
#   ✅ TLS cert + key present
#   ✅ File permissions correct
#
# Next: Run "FTS Step 5" after this turns green.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "step4" to confirm'
        required: true
        default: ''

permissions:
  contents: read

jobs:
  step4:
    name: "Step 4: Repo + Secrets + TLS"
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'step4'

    steps:
      - name: "Execute Step 4 (as deploy user)"
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_USER_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 120s
          command_timeout: 10m
          script: |
            set -euo pipefail
            DEPLOY_PATH="/opt/zyntapos"

            echo "╔══════════════════════════════════════════════════════╗"
            echo "║  FTS Step 4: Repo + Secrets + TLS                   ║"
            echo "╚══════════════════════════════════════════════════════╝"
            echo "Running as: $(whoami)"
            echo "Started: $(date)"
            echo ""

            # ── 1. Clone Repository ───────────────────────────────────
            echo "━━━ 1/6: Repository Clone ━━━"
            if [ -d "$DEPLOY_PATH/.git" ]; then
              echo "  Repo already exists, pulling latest..."
              cd "$DEPLOY_PATH"
              git fetch origin
              git reset --hard origin/main
              echo "  ✅ Repo updated to latest main"
            else
              echo "  Cloning repo..."
              git clone https://github.com/sendtodilanka/ZyntaPOS-KMM.git "$DEPLOY_PATH"
              cd "$DEPLOY_PATH"
              echo "  ✅ Repo cloned to $DEPLOY_PATH"
            fi
            echo "  HEAD: $(git rev-parse --short HEAD) — $(git log -1 --format='%s' | head -c 60)"

            # ── 2. Generate DB Password ───────────────────────────────
            echo ""
            echo "━━━ 2/6: Database Password ━━━"
            mkdir -p "$DEPLOY_PATH/secrets"

            DB_PASS_FILE="$DEPLOY_PATH/secrets/db_password.txt"
            if [ -f "$DB_PASS_FILE" ] && [ -s "$DB_PASS_FILE" ]; then
              DB_LEN=$(wc -c < "$DB_PASS_FILE")
              echo "  ✅ DB password already exists ($DB_LEN bytes), skipping"
            else
              DB_PASS=$(openssl rand -hex 32)
              printf '%s' "$DB_PASS" > "$DB_PASS_FILE"
              chmod 644 "$DB_PASS_FILE"
              echo "  ✅ DB password generated (64 hex chars)"
            fi

            # ── 3. Generate RS256 JWT Key Pair ────────────────────────
            echo ""
            echo "━━━ 3/6: RS256 JWT Key Pair ━━━"
            RS256_PRIV="$DEPLOY_PATH/secrets/rs256_private_key.pem"
            RS256_PUB="$DEPLOY_PATH/secrets/rs256_public_key.pem"

            if [ -f "$RS256_PRIV" ] && [ -f "$RS256_PUB" ]; then
              echo "  ✅ RS256 key pair already exists, skipping"
            else
              openssl genpkey -algorithm RSA -out "$RS256_PRIV" -pkeyopt rsa_keygen_bits:2048
              openssl rsa -pubout -in "$RS256_PRIV" -out "$RS256_PUB"
              # 644 so Docker container's non-root user can read bind-mounted files
              chmod 644 "$RS256_PRIV"
              chmod 644 "$RS256_PUB"
              echo "  ✅ RS256 key pair generated (RSA 2048-bit)"
            fi

            # ── 4. Create .env File ───────────────────────────────────
            echo ""
            echo "━━━ 4/6: Environment File (.env) ━━━"
            ENV_FILE="$DEPLOY_PATH/.env"
            DB_PASS=$(cat "$DB_PASS_FILE")

            # Build .env from scratch if missing, or update missing values
            if [ ! -f "$ENV_FILE" ]; then
              REDIS_PASS=$(openssl rand -hex 24)
              cat > "$ENV_FILE" << ENVEOF
            REDIS_PASSWORD=$REDIS_PASS
            ZYNTAPOS_DB_PASSWORD=$DB_PASS
            ENVEOF
              echo "  ✅ .env created with REDIS_PASSWORD and ZYNTAPOS_DB_PASSWORD"
            else
              # Ensure REDIS_PASSWORD exists
              if ! grep -q "REDIS_PASSWORD" "$ENV_FILE"; then
                REDIS_PASS=$(openssl rand -hex 24)
                echo "REDIS_PASSWORD=$REDIS_PASS" >> "$ENV_FILE"
                echo "  ✅ REDIS_PASSWORD added to .env"
              else
                echo "  ✅ REDIS_PASSWORD already in .env"
              fi

              # Ensure ZYNTAPOS_DB_PASSWORD exists
              if ! grep -q "ZYNTAPOS_DB_PASSWORD" "$ENV_FILE"; then
                echo "ZYNTAPOS_DB_PASSWORD=$DB_PASS" >> "$ENV_FILE"
                echo "  ✅ ZYNTAPOS_DB_PASSWORD added to .env"
              else
                echo "  ✅ ZYNTAPOS_DB_PASSWORD already in .env"
              fi
            fi

            # ── 5. Generate Self-Signed TLS Certificate ───────────────
            echo ""
            echo "━━━ 5/6: TLS Certificate ━━━"
            CERT_DIR="$DEPLOY_PATH/backend/caddy/certs"
            mkdir -p "$CERT_DIR"

            if [ -f "$CERT_DIR/zyntapos_origin.pem" ] && [ -f "$CERT_DIR/zyntapos_origin.key" ]; then
              EXPIRY=$(openssl x509 -enddate -noout -in "$CERT_DIR/zyntapos_origin.pem" 2>/dev/null | cut -d= -f2)
              echo "  ✅ TLS cert already exists (expires: $EXPIRY), skipping"
            else
              openssl req -x509 -newkey rsa:4096 \
                -keyout "$CERT_DIR/zyntapos_origin.key" \
                -out "$CERT_DIR/zyntapos_origin.pem" \
                -days 365 -nodes \
                -subj "/CN=zyntapos.com/O=Zynta Solutions/C=LK" \
                -addext "subjectAltName=DNS:zyntapos.com,DNS:*.zyntapos.com"
              echo "  ✅ Self-signed TLS cert generated (valid 365 days)"
            fi

            # ── 6. Fix Permissions ────────────────────────────────────
            echo ""
            echo "━━━ 6/6: File Permissions ━━━"
            chmod 644 "$DEPLOY_PATH/secrets/"*.pem 2>/dev/null || true
            chmod 644 "$DEPLOY_PATH/secrets/db_password.txt" 2>/dev/null || true
            chmod 600 "$ENV_FILE"
            echo "  ✅ Secret file permissions set"
            echo "     - PEM keys: 644 (container readable)"
            echo "     - DB password: 644 (container readable)"
            echo "     - .env: 600 (owner only)"

            # ══════════════════════════════════════════════════════════
            # VERIFICATION
            # ══════════════════════════════════════════════════════════
            echo ""
            echo "╔══════════════════════════════════════════════════════╗"
            echo "║               STEP 4 — VERIFICATION                 ║"
            echo "╠══════════════════════════════════════════════════════╣"

            PASS=0
            FAIL=0

            check_pass() { echo "║  ✅ $1"; PASS=$((PASS+1)); }
            check_fail() { echo "║  ❌ $1"; FAIL=$((FAIL+1)); }

            # V1: Git repo
            [ -d "$DEPLOY_PATH/.git" ] && check_pass "Git repo at $DEPLOY_PATH" || check_fail "Git repo MISSING"

            # V2: docker-compose.yml
            [ -f "$DEPLOY_PATH/docker-compose.yml" ] && check_pass "docker-compose.yml present" || check_fail "docker-compose.yml MISSING"

            # V3: Caddyfile
            [ -f "$DEPLOY_PATH/Caddyfile" ] && check_pass "Caddyfile present" || check_fail "Caddyfile MISSING"

            # V4: nginx.conf
            [ -f "$DEPLOY_PATH/nginx.conf" ] && check_pass "nginx.conf present" || check_fail "nginx.conf MISSING"

            # V5: DB password
            if [ -f "$DB_PASS_FILE" ] && [ -s "$DB_PASS_FILE" ]; then
              DB_LEN=$(wc -c < "$DB_PASS_FILE")
              [ "$DB_LEN" -ge 64 ] && check_pass "DB password: $DB_LEN bytes" || check_fail "DB password too short: $DB_LEN bytes"
            else
              check_fail "DB password MISSING"
            fi

            # V6: RS256 private key
            [ -f "$RS256_PRIV" ] && [ -s "$RS256_PRIV" ] && check_pass "RS256 private key present" || check_fail "RS256 private key MISSING"

            # V7: RS256 public key
            [ -f "$RS256_PUB" ] && [ -s "$RS256_PUB" ] && check_pass "RS256 public key present" || check_fail "RS256 public key MISSING"

            # V8: RS256 key pair match
            if [ -f "$RS256_PRIV" ] && [ -f "$RS256_PUB" ]; then
              PRIV_MD5=$(openssl rsa -in "$RS256_PRIV" -pubout 2>/dev/null | openssl md5 || echo "err1")
              PUB_MD5=$(openssl rsa -pubin -in "$RS256_PUB" -pubout 2>/dev/null | openssl md5 || echo "err2")
              [ "$PRIV_MD5" = "$PUB_MD5" ] && check_pass "RS256 key pair matches" || check_fail "RS256 key pair MISMATCH"
            fi

            # V9: .env exists
            [ -f "$ENV_FILE" ] && check_pass ".env file present" || check_fail ".env file MISSING"

            # V10: .env has REDIS_PASSWORD
            grep -q "REDIS_PASSWORD" "$ENV_FILE" 2>/dev/null && check_pass "REDIS_PASSWORD in .env" || check_fail "REDIS_PASSWORD missing from .env"

            # V11: .env has ZYNTAPOS_DB_PASSWORD
            grep -q "ZYNTAPOS_DB_PASSWORD" "$ENV_FILE" 2>/dev/null && check_pass "ZYNTAPOS_DB_PASSWORD in .env" || check_fail "ZYNTAPOS_DB_PASSWORD missing from .env"

            # V12: TLS cert
            [ -f "$CERT_DIR/zyntapos_origin.pem" ] && check_pass "TLS cert present" || check_fail "TLS cert MISSING"

            # V13: TLS key
            [ -f "$CERT_DIR/zyntapos_origin.key" ] && check_pass "TLS key present" || check_fail "TLS key MISSING"

            # V14: healthcheck directory
            [ -d "$DEPLOY_PATH/healthcheck" ] && check_pass "healthcheck/ directory present" || check_fail "healthcheck/ directory MISSING"

            # V15: init-databases.sh
            [ -f "$DEPLOY_PATH/backend/postgres/init-databases.sh" ] && check_pass "init-databases.sh present" || check_fail "init-databases.sh MISSING"

            echo "╠══════════════════════════════════════════════════════╣"
            printf "║  PASSED: %-42s║\n" "$PASS"
            printf "║  FAILED: %-42s║\n" "$FAIL"
            echo "╚══════════════════════════════════════════════════════╝"

            if [ "$FAIL" -gt 0 ]; then
              echo ""
              echo "⛔ STEP 4 FAILED — $FAIL check(s) did not pass."
              exit 1
            fi

            echo ""
            echo "🟢 STEP 4 COMPLETE — Repo, secrets, TLS ready. Run FTS Step 5 next."
