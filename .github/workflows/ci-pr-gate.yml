name: "Step[3]: PR Gate"

# ─────────────────────────────────────────────────────────────────────────────
# PIPELINE POSITION: Step 3 of 7
#
# THE MERGE GATE — Full build + lint + detekt + tests + security scan.
# Runs on pull_request to main and workflow_dispatch (manual re-run).
#
# This is the quality gate that blocks PR merge until ALL checks pass.
# Branch protection requires "CI Gate Status" to be green before merge.
#
# Includes OWASP security scanning — the NVD download can take 25-30 min
# on cache miss, but that's acceptable during PR review. Step[4] (push to
# main) skips OWASP since it was already validated here.
#
# EDGE CASES HANDLED:
#   - Stale PRs: newer push cancels in-progress CI on same PR
#   - Test flakiness: --continue flag runs all tests, reports all failures
#   - Test reporting: JUnit XML published as PR check annotations
#   - OWASP advisory: continue-on-error so known CVEs don't block merges
# ─────────────────────────────────────────────────────────────────────────────

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  actions: read
  packages: read
  security-events: write   # Required for Detekt SARIF upload to Security tab

concurrency:
  group: ci-pr-gate-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  # ── Full build + lint + test via reusable workflow ──────────────────────────
  build-and-test:
    name: "Step[3]: Build & Test"
    uses: ./.github/workflows/_reusable-build-test.yml
    secrets:
      GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
    with:
      run-tests: true
      run-lint: true
      upload-apk: true
      artifact-retention-days: 7
      timeout-minutes: 45
      artifact-suffix: '-ci-${{ github.run_id }}'

  # ── Website: Build validation (runs only when website/** files changed) ─────
  test-website:
    name: "Website Build (validate)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: website

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 2   # need HEAD~1 for changed-files diff

      - name: Detect website file changes
        id: changes
        run: |
          # Check if any website/** files changed in this PR or push
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -c '^website/' || true)
          echo "website_changed=${CHANGED}" >> "$GITHUB_OUTPUT"
          echo "Website files changed: ${CHANGED}"

      - name: Set up Node.js
        if: steps.changes.outputs.website_changed != '0'
        uses: actions/setup-node@v4
        with:
          node-version-file: website/.nvmrc

      - name: Install dependencies
        if: steps.changes.outputs.website_changed != '0'
        run: npm install

      - name: npm audit (security)
        if: steps.changes.outputs.website_changed != '0'
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Build Astro site
        if: steps.changes.outputs.website_changed != '0'
        run: npx astro build
        env:
          SITE_URL: https://www.zyntapos.com

      - name: Skip (no website changes)
        if: steps.changes.outputs.website_changed == '0'
        run: echo "No website/** files changed — skipping website build."

  # ── Backend: Compile + Unit Tests ─────────────────────────────────────────
  test-backend:
    name: "Backend Compile & Test"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        service: [api, license, sync]
    defaults:
      run:
        working-directory: backend/${{ matrix.service }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ matrix.service }}-${{ hashFiles(format('backend/{0}/**/*.gradle.kts', matrix.service)) }}
          restore-keys: gradle-${{ runner.os }}-${{ matrix.service }}-

      - name: Compile backend/${{ matrix.service }}
        run: |
          chmod +x ./gradlew
          ./gradlew compileKotlin --no-daemon --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx2g -Xms512m"

      - name: Run unit tests — ${{ matrix.service }}
        run: |
          ./gradlew test --no-daemon --continue --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx2g -Xms512m"
        continue-on-error: false

      - name: Verify Kover coverage threshold (95%) — ${{ matrix.service }}
        run: |
          ./gradlew koverVerify --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx2g -Xms512m"

      - name: Generate Kover coverage report — ${{ matrix.service }}
        if: always()
        run: |
          ./gradlew koverXmlReport --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx2g -Xms512m"
        continue-on-error: true

      - name: Upload test reports — ${{ matrix.service }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports-${{ matrix.service }}-${{ github.run_id }}
          path: backend/${{ matrix.service }}/build/reports/tests/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload coverage report — ${{ matrix.service }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-${{ matrix.service }}-${{ github.run_id }}
          path: backend/${{ matrix.service }}/build/reports/kover/report.xml
          retention-days: 7
          if-no-files-found: ignore

  # ── Admin Panel: TypeScript, ESLint, Vitest, npm audit, Playwright ────────
  test-admin-panel:
    name: "Admin Panel Tests"
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: admin-panel

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: admin-panel/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit (security)
        run: npm audit --audit-level=high
        continue-on-error: true   # Report-only until audit backlog is triaged

      - name: TypeScript check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Vitest unit tests (with coverage)
        run: npm run test:ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Playwright e2e tests (nav + a11y + smoke)
        run: npx playwright test e2e/navigation.spec.ts e2e/accessibility.spec.ts e2e/smoke.spec.ts
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: admin-panel/playwright-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Vitest coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-coverage-${{ github.run_id }}
          path: admin-panel/coverage/
          retention-days: 7
          if-no-files-found: ignore

  # ── Flyway Migration Validation ───────────────────────────────────────────
  validate-migrations:
    name: "Validate DB Migrations (${{ matrix.service }})"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            db: zyntapos_api
          - service: license
            db: zyntapos_license

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: ${{ matrix.db }}
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Run Flyway migrations — ${{ matrix.service }}
        uses: docker://flyway/flyway:10
        with:
          args: >-
            -url=jdbc:postgresql://postgres:5432/${{ matrix.db }}
            -user=ci
            -password=ci
            -locations=filesystem:/github/workspace/backend/${{ matrix.service }}/src/main/resources/db/migration
            migrate

  # ── Docker Compose Config Validation ─────────────────────────────────────
  validate-compose:
    name: "Validate docker-compose.yml"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate docker-compose.yml
        run: docker compose config --quiet

      - name: Validate docker-compose.admin.yml
        run: |
          if [ -f docker-compose.admin.yml ]; then
            docker compose -f docker-compose.admin.yml config --quiet
          fi

  # ── Test Result Reporting ────────────────────────────────────────────────
  test-report:
    name: "Publish Test Results"
    needs: build-and-test
    if: always() && needs.build-and-test.result != 'cancelled'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download JUnit XML
        uses: actions/download-artifact@v4
        with:
          name: junit-xml-ci-${{ github.run_id }}
          path: test-results
        continue-on-error: true

      - name: Publish test results
        if: hashFiles('test-results/**/TEST-*.xml') != ''
        uses: dorny/test-reporter@v1
        with:
          name: 'JUnit Test Results'
          path: 'test-results/**/TEST-*.xml'
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

  # ── Security Scanning: Trivy filesystem scan (dependency vulnerabilities) ──
  # Scans backend Gradle dependency trees for CRITICAL/HIGH CVEs.
  # Trivy natively parses build.gradle.kts — no lockfile generation needed.
  # Completes in ~1-2 min (vs 25-30 min for OWASP Dependency Check).
  # Required check — blocks PR merge if CRITICAL/HIGH vulnerabilities found.
  security-scan-backend:
    name: "Security Scan (Trivy)"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Generate Gradle lockfiles
        run: |
          for svc in api license sync; do
            cd backend/$svc
            chmod +x ./gradlew
            ./gradlew dependencies --write-locks --no-daemon -q \
              -Dorg.gradle.jvmargs="-Xmx2g -Xms512m"
            cd ../..
          done

      - name: Run Trivy vulnerability scan — backend
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          scan-ref: ./backend
          scanners: vuln
          format: json
          output: trivy-results.json
          severity: CRITICAL,HIGH
          exit-code: "1"
          timeout: 10m

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-results-${{ github.run_id }}
          path: trivy-results.json
          retention-days: 14
          if-no-files-found: ignore

  # ── CI Gate Status (single required check for branch protection) ─────────
  # Aggregates ALL required jobs into a single check. Branch protection
  # requires "CI Gate Status" to pass before auto-merge proceeds.
  #
  ci-gate-status:
    name: "CI Gate Status"
    needs: [build-and-test, test-website, test-admin-panel, test-backend, validate-migrations, validate-compose, security-scan-backend]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check all job results
        env:
          BUILD_AND_TEST: ${{ needs.build-and-test.result }}
          TEST_WEBSITE: ${{ needs.test-website.result }}
          TEST_ADMIN_PANEL: ${{ needs.test-admin-panel.result }}
          TEST_BACKEND: ${{ needs.test-backend.result }}
          VALIDATE_MIGRATIONS: ${{ needs.validate-migrations.result }}
          VALIDATE_COMPOSE: ${{ needs.validate-compose.result }}
          SECURITY_SCAN: ${{ needs.security-scan-backend.result }}
        run: |
          echo "=== CI Gate Job Results ==="
          echo "build-and-test:        $BUILD_AND_TEST"
          echo "test-website:          $TEST_WEBSITE"
          echo "test-admin-panel:      $TEST_ADMIN_PANEL"
          echo "test-backend:          $TEST_BACKEND"
          echo "validate-migrations:   $VALIDATE_MIGRATIONS"
          echo "validate-compose:      $VALIDATE_COMPOSE"
          echo "security-scan:         $SECURITY_SCAN"

          # Fail if any required job failed or was cancelled
          FAILED=false
          for PAIR in \
            "build-and-test:$BUILD_AND_TEST" \
            "test-website:$TEST_WEBSITE" \
            "test-admin-panel:$TEST_ADMIN_PANEL" \
            "test-backend:$TEST_BACKEND" \
            "validate-migrations:$VALIDATE_MIGRATIONS" \
            "validate-compose:$VALIDATE_COMPOSE" \
            "security-scan:$SECURITY_SCAN"; do
            JOB_NAME="${PAIR%%:*}"
            RESULT="${PAIR#*:}"
            if [ "$RESULT" != "success" ]; then
              echo "::error::Job '$JOB_NAME' did not succeed (result: $RESULT)"
              FAILED=true
            fi
          done

          if [ "$FAILED" = "true" ]; then
            echo "::error::CI Gate FAILED — one or more required jobs did not pass"
            exit 1
          fi

          echo "All CI Gate checks passed"
