name: 'Health Check Endpoints'
description: 'Tests /ping and / on ZyntaPOS subdomains with retry logic and markdown reporting'

# ─────────────────────────────────────────────────────────────────────────────
# COMPOSITE ACTION — Shared health-check logic for smoke tests and monitoring.
#
# Used by:
#   - step6-smoke-rollback.yml (post-deploy smoke test)
#   - verify.yml              (scheduled + post-deploy verification)
#
# EDGE CASES HANDLED:
#   - Container startup delay: configurable initial wait + per-endpoint retries
#   - DNS resolution failure: curl returns 000 → treated as degraded
#   - TLS handshake timeout: curl --max-time prevents indefinite hangs
#   - Partial outage: individual endpoint failures don't short-circuit remaining checks
#   - Cloudflare 5xx: treated as degraded (not healthy redirect)
#   - Empty response body: /ping body check uses exact match ("ok"), empty ≠ ok
#   - Rate limiting: 20s timeout per curl prevents IP-level rate limit accumulation
# ─────────────────────────────────────────────────────────────────────────────

inputs:
  subdomains:
    description: 'Space-separated list of subdomains to check'
    default: 'api license panel docs status sync'
  domain:
    description: 'Base domain'
    default: 'zyntapos.com'
  initial-wait:
    description: 'Seconds to wait before first check (container startup)'
    default: '0'
  max-retries:
    description: 'Max retry attempts for /ping endpoint'
    default: '1'
  retry-delay:
    description: 'Seconds between retry attempts'
    default: '30'
  curl-timeout:
    description: 'Max seconds for each curl request'
    default: '20'

outputs:
  healthy:
    description: '"true" if all endpoints passed, "false" otherwise'
    value: ${{ steps.check.outputs.healthy }}
  summary:
    description: 'Markdown table of endpoint health results'
    value: ${{ steps.check.outputs.summary }}

runs:
  using: "composite"
  steps:
    - name: Wait for containers
      if: inputs.initial-wait != '0'
      shell: bash
      run: |
        echo "Waiting ${{ inputs.initial-wait }}s for containers to initialise..."
        sleep ${{ inputs.initial-wait }}

    - name: Check endpoints
      id: check
      shell: bash
      run: |
        PASS=true
        DOMAIN="${{ inputs.domain }}"
        MAX_RETRIES="${{ inputs.max-retries }}"
        RETRY_DELAY="${{ inputs.retry-delay }}"
        CURL_TIMEOUT="${{ inputs.curl-timeout }}"
        SUMMARY_FILE=$(mktemp)

        # ── Summary header ──────────────────────────────────────────────
        {
          echo "| Endpoint | /ping | Homepage | Status |"
          echo "|----------|-------|----------|--------|"
        } > "$SUMMARY_FILE"

        # ── Console header ──────────────────────────────────────────────
        echo "=================================================="
        echo " ZyntaPOS Endpoint Health Check"
        echo " Domain: ${DOMAIN}"
        echo " Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
        echo "=================================================="
        echo ""

        for sub in ${{ inputs.subdomains }}; do
          BASE_URL="https://${sub}.${DOMAIN}"
          PING_HTTP="000"
          PING_BODY=""

          # /ping — retry logic for container startup
          # NOTE: Do NOT use curl -f here. With -f, curl exits non-zero on 4xx/5xx
          # but still prints the http_code to stdout, causing "403" + "000" = "403000"
          # when the || fallback also fires. Use -s only and check http_code manually.
          for attempt in $(seq 1 "$MAX_RETRIES"); do
            PING_HTTP=$(curl -s --max-time "$CURL_TIMEOUT" -o /dev/null -w "%{http_code}" \
              "${BASE_URL}/ping" 2>/dev/null) || PING_HTTP="000"
            PING_BODY=$(curl -s --max-time "$CURL_TIMEOUT" \
              "${BASE_URL}/ping" 2>/dev/null) || PING_BODY=""

            if [ "$PING_HTTP" = "200" ] && [ "$PING_BODY" = "ok" ]; then
              break
            fi

            if [ "$attempt" -lt "$MAX_RETRIES" ]; then
              echo "  ⏳ ${sub} /ping attempt ${attempt}/${MAX_RETRIES} — HTTP ${PING_HTTP}, retrying in ${RETRY_DELAY}s..."
              sleep "$RETRY_DELAY"
            fi
          done

          # Homepage check (2xx or 3xx = healthy)
          HOME_HTTP=$(curl -s --max-time "$CURL_TIMEOUT" -o /dev/null -w "%{http_code}" \
            "${BASE_URL}/" 2>/dev/null) || HOME_HTTP="000"

          # ── Evaluate /ping ──────────────────────────────────────────────
          if [ "$PING_HTTP" = "200" ] && [ "$PING_BODY" = "ok" ]; then
            PING_ICON="✅ ${PING_HTTP}"
            PING_OK=true
          else
            PING_ICON="❌ ${PING_HTTP}"
            PING_OK=false
          fi

          # ── Evaluate homepage ───────────────────────────────────────────
          HOME_FIRST="${HOME_HTTP:0:1}"
          if [ "$HOME_FIRST" = "2" ] || [ "$HOME_FIRST" = "3" ]; then
            HOME_ICON="✅ ${HOME_HTTP}"
            HOME_OK=true
          else
            HOME_ICON="❌ ${HOME_HTTP}"
            HOME_OK=false
          fi

          # ── Row result ──────────────────────────────────────────────────
          if $PING_OK && $HOME_OK; then
            ROW="✅ HEALTHY"
            echo "  ✅  ${sub}.${DOMAIN}  /ping → ${PING_HTTP} (ok)  / → ${HOME_HTTP}"
          else
            ROW="❌ DEGRADED"
            echo "  ❌  ${sub}.${DOMAIN}  /ping → ${PING_HTTP}  / → ${HOME_HTTP}"
            PASS=false
          fi

          echo "| \`${sub}.${DOMAIN}\` | ${PING_ICON} | ${HOME_ICON} | ${ROW} |" >> "$SUMMARY_FILE"
        done

        echo ""
        echo "=================================================="

        # ── Outputs ─────────────────────────────────────────────────────
        echo "healthy=${PASS}" >> "$GITHUB_OUTPUT"

        # Multi-line output via delimiter
        {
          echo "summary<<HEALTH_EOF"
          cat "$SUMMARY_FILE"
          echo "HEALTH_EOF"
        } >> "$GITHUB_OUTPUT"

        rm -f "$SUMMARY_FILE"

        if $PASS; then
          echo "Result: ALL ENDPOINTS HEALTHY ✅"
        else
          echo "Result: ONE OR MORE ENDPOINTS DEGRADED ❌"
        fi
        echo "=================================================="
