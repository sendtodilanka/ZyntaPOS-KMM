<!doctype html>
<html lang="en">
  <head>
    <!-- Prevent flash of wrong theme: read persisted preference before React mounts -->
    <script>
      try {
        var s = JSON.parse(localStorage.getItem('zynta-admin-ui') || '{}');
        if ((s.state || s).theme !== 'light') document.documentElement.classList.add('dark');
      } catch (_) { document.documentElement.classList.add('dark'); }
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ZyntaPOS Admin Panel — Internal Management Console" />
    <title>ZyntaPOS Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
