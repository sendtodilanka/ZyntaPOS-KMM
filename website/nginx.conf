server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Liveness probe for Docker healthcheck and Caddy health_uri
    location = /ping {
        return 200 "ok";
        add_header Content-Type "text/plain; charset=utf-8";
        add_header Cache-Control "no-store" always;
    }

    # Long-lived cache for hashed static assets (Astro adds content hash to filenames)
    location ~* \.(css|js|woff2?|ttf|otf|eot|png|jpg|jpeg|gif|ico|webp|avif|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # No cache for XML/TXT (sitemap, robots) so crawlers always get fresh copy
    location ~* \.(xml|txt)$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Astro generates file-per-route: /about → /about/index.html or /about.html
    location / {
        try_files $uri $uri/ $uri.html /404.html =404;
    }
}
