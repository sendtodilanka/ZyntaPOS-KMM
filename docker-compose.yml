# ═══════════════════════════════════════════════════════════════════
# ZyntaPOS — Docker Compose (Production)
#
# Services:
#   • caddy       — Cloudflare TLS reverse proxy (ports 80/443)
#   • api         — Ktor REST API (port 8080, internal)
#   • license     — Ktor license server (port 8083, internal)
#   • sync        — Ktor WebSocket sync (port 8082, internal)
#   • postgres    — PostgreSQL 16 database (internal only)
#   • redis       — Redis 7 cache + pub/sub (internal only)
#   • canary      — nginx canary pages (fallback during migration)
#
# Secrets never go in this file. Use Docker secrets (files in ./secrets/).
# Copy secrets.env.template → secrets.env and fill in values.
#
# TODO-007 Phase 2 canary → real services migration:
#   When deploying a real service, update the matching Caddyfile
#   reverse_proxy directive from `canary:80` to the service container
#   name and port (e.g., `api:8080`, `license:8083`, `sync:8082`).
# ═══════════════════════════════════════════════════════════════════

services:

  # ── Reverse proxy ─────────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: zyntapos_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # Cloudflare Origin Certificate — stored in backend/caddy/certs/ on VPS host
      # Generate at: Cloudflare → SSL/TLS → Origin Server → Create Certificate
      # Or use self-signed for testing: see docs/adr/ADR-006
      - ./backend/caddy/certs:/etc/caddy/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - canary
    networks:
      - zyntapos_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Ktor REST API ──────────────────────────────────────────────────
  # Image built by CI (ci-gate.yml build-backend-images job) and pushed to GHCR.
  # VPS pulls the pre-built image — no Gradle or build tooling needed on server.
  # See: docs/adr/ADR-006-backend-docker-build-in-ci.md
  api:
    image: ghcr.io/sendtodilanka/zyntapos-api:latest
    container_name: zyntapos_api
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      - PORT=8080
      - DB_URL=jdbc:postgresql://postgres:5432/zyntapos_api
      - DB_USER=zyntapos
      - DB_PASSWORD=${ZYNTAPOS_DB_PASSWORD}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - JWT_ISSUER=https://api.zyntapos.com
      - JWT_AUDIENCE=zyntapos-app
      - RS256_PRIVATE_KEY_PATH=/run/secrets/rs256_private_key
      - RS256_PUBLIC_KEY_PATH=/run/secrets/rs256_public_key
      - ADMIN_JWT_SECRET_FILE=/run/secrets/admin_jwt_secret
      - ACCESS_TOKEN_TTL_MINUTES=60
      - REFRESH_TOKEN_TTL_DAYS=30
      - ADMIN_PANEL_URL=${ADMIN_PANEL_URL:-https://panel.zyntapos.com}
      - SENTRY_DSN=${SENTRY_DSN_API}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-production}
      # S3-14: HikariCP pool tuning (DB_POOL_MAX * num_services must not exceed PostgreSQL max_connections=100)
      # API handles more concurrent request types → larger pool than License (15)
      - DB_POOL_MAX=20
      - DB_POOL_MIN=3
      - DB_CONNECTION_TIMEOUT_MS=30000
      - DB_POOL_IDLE_TIMEOUT=600000
      - REDIS_POOL_SIZE=8
      # Play Integrity API — device attestation (TODO-008 ASO)
      - PLAY_INTEGRITY_PACKAGE_NAME=com.zyntasolutions.zyntapos
      - PLAY_INTEGRITY_API_KEY=${PLAY_INTEGRITY_API_KEY}
      # Inbound email HMAC — CF Worker authentication (TODO-008a)
      - INBOUND_EMAIL_HMAC_SECRET=${INBOUND_EMAIL_HMAC_SECRET}
      # Chatwoot — customer support platform (TODO-008a)
      - CHATWOOT_API_URL=http://chatwoot-web:3000
      - CHATWOOT_API_TOKEN=${CHATWOOT_API_TOKEN}
      - CHATWOOT_ACCOUNT_ID=${CHATWOOT_ACCOUNT_ID}
      - CHATWOOT_INBOX_ID=${CHATWOOT_INBOX_ID}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - zyntapos_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - ./secrets/rs256_private_key.pem:/run/secrets/rs256_private_key:ro
      - ./secrets/rs256_public_key.pem:/run/secrets/rs256_public_key:ro
      - ./secrets/admin_jwt_secret.txt:/run/secrets/admin_jwt_secret:ro
    # ── TODO-009 Level 3: Container hardening ─────────────────────────
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777,noexec,nosuid
    security_opt:
      - no-new-privileges:true
      - seccomp:./config/seccomp/ktor.json
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    mem_limit: 512m
    memswap_limit: 512m

  # ── Ktor License Server ────────────────────────────────────────────
  license:
    image: ghcr.io/sendtodilanka/zyntapos-license:latest
    container_name: zyntapos_license
    restart: unless-stopped
    expose:
      - "8083"
    environment:
      - PORT=8083
      - DB_URL=jdbc:postgresql://postgres:5432/zyntapos_license
      - DB_USER=zyntapos
      - DB_PASSWORD=${ZYNTAPOS_DB_PASSWORD}
      - JWT_ISSUER=https://api.zyntapos.com
      - JWT_AUDIENCE=zyntapos-app
      - RS256_PUBLIC_KEY_PATH=/run/secrets/rs256_public_key
      - SENTRY_DSN=${SENTRY_DSN_LICENSE}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-production}
      # S3-14: HikariCP pool tuning — License handles heartbeats + activations
      - DB_POOL_MAX=15
      - DB_POOL_MIN=2
      - DB_CONNECTION_TIMEOUT_MS=30000
      - DB_POOL_IDLE_TIMEOUT=600000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - zyntapos_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - ./secrets/rs256_public_key.pem:/run/secrets/rs256_public_key:ro
    # ── TODO-009 Level 3: Container hardening ─────────────────────────
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777,noexec,nosuid
    security_opt:
      - no-new-privileges:true
      - seccomp:./config/seccomp/ktor.json
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    mem_limit: 256m
    memswap_limit: 256m

  # ── Ktor WebSocket Sync Server ─────────────────────────────────────
  sync:
    image: ghcr.io/sendtodilanka/zyntapos-sync:latest
    container_name: zyntapos_sync
    restart: unless-stopped
    expose:
      - "8082"
    environment:
      - PORT=8082
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - JWT_ISSUER=https://api.zyntapos.com
      - JWT_AUDIENCE=zyntapos-app
      - RS256_PUBLIC_KEY_PATH=/run/secrets/rs256_public_key
      - SENTRY_DSN=${SENTRY_DSN_SYNC}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-production}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - zyntapos_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - ./secrets/rs256_public_key.pem:/run/secrets/rs256_public_key:ro
    # ── TODO-009 Level 3: Container hardening ─────────────────────────
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777,noexec,nosuid
    security_opt:
      - no-new-privileges:true
      - seccomp:./config/seccomp/ktor.json
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    mem_limit: 256m
    memswap_limit: 256m

  # ── PostgreSQL 16 ─────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: zyntapos_postgres
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      - POSTGRES_DB=zyntapos
      - POSTGRES_USER=zyntapos
      - POSTGRES_PASSWORD_FILE=/run/secrets/db_password
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./secrets/db_password.txt:/run/secrets/db_password:ro
      # Tuning for 8 GB VPS (Contabo Cloud VPS 10)
      - ./backend/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      # Init script creates per-service databases on first run
      - ./backend/postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    networks:
      - zyntapos_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zyntapos -d zyntapos"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # ── TODO-009 Level 3: Container hardening ─────────────────────────
    security_opt:
      - no-new-privileges:true
    mem_limit: 1g
    memswap_limit: 1g

  # ── Redis 7 ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: zyntapos_redis
    restart: unless-stopped
    expose:
      - "6379"
    command: >
      sh -c "redis-server
        --requirepass $${REDIS_PASSWORD}
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --appendonly yes
        --save 900 1
        --save 300 10"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    networks:
      - zyntapos_net
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # ── TODO-009 Level 3: Container hardening ─────────────────────────
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    memswap_limit: 512m

  # ── Marketing website (www.zyntapos.com) ────────────────────────────
  # Astro static site built by CI and pushed to GHCR.
  # Image: ghcr.io/sendtodilanka/zyntapos-website:latest
  website:
    image: ghcr.io/sendtodilanka/zyntapos-website:latest
    container_name: zyntapos_website
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - zyntapos_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    mem_limit: 64m
    memswap_limit: 64m
    security_opt:
      - no-new-privileges:true

  # ── Admin Panel — React SPA (panel.zyntapos.com) ────────────────────
  admin-panel:
    image: ghcr.io/sendtodilanka/zyntapos-kmm/admin-panel:latest
    container_name: zyntapos_admin_panel
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - zyntapos_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    mem_limit: 128m
    memswap_limit: 128m
    security_opt:
      - no-new-privileges:true

  # ── Canary static pages (fallback for docs/status placeholder) ──────
  canary:
    image: nginx:1-alpine
    container_name: zyntapos_canary
    restart: unless-stopped
    volumes:
      - ./healthcheck:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "80"
    networks:
      - zyntapos_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    mem_limit: 64m
    memswap_limit: 64m
    security_opt:
      - no-new-privileges:true

  # ── API Documentation — Scalar OpenAPI viewer (TODO-007e) ───────────
  docs:
    build:
      context: ./zyntapos-docs
      dockerfile: Dockerfile
    container_name: zyntapos_docs
    restart: unless-stopped
    expose:
      - "3001"
    networks:
      - zyntapos_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    mem_limit: 64m
    memswap_limit: 64m
    security_opt:
      - no-new-privileges:true

  # ── Uptime Kuma — Self-hosted monitoring & status page ──────────────
  uptime-kuma:
    image: louislam/uptime-kuma:2
    container_name: zyntapos_uptime_kuma
    restart: unless-stopped
    volumes:
      - uptime_kuma_data:/app/data
    expose:
      - "3001"
    networks:
      - zyntapos_net
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http = require('http'); http.get('http://localhost:3001/api/entry', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    mem_limit: 256m
    memswap_limit: 256m
    security_opt:
      - no-new-privileges:true

  # ── Falcosidekick — Routes Falco alerts to Slack + webhook ────────
  falcosidekick:
    image: falcosecurity/falcosidekick:latest
    container_name: zyntapos_falcosidekick
    restart: unless-stopped
    ports:
      - "127.0.0.1:2801:2801"
    environment:
      - SLACK_WEBHOOKURL=${SLACK_WEBHOOK_URL}
    volumes:
      - ./config/falco/falcosidekick.yaml:/etc/falcosidekick/config.yaml:ro
    networks:
      - zyntapos_net
    mem_limit: 128m
    memswap_limit: 128m
    security_opt:
      - no-new-privileges:true

  # ── Stalwart Mail Server — SMTP/IMAP/JMAP (TODO-008a) ──────────────────────
  # Handles @zyntapos.com staff mailboxes (name@zyntapos.com).
  # Support inboxes (support@, billing@, bugs@) are handled by CF Email Worker
  # which POSTs to the API; staff mailboxes are forwarded directly here via MX.
  #
  # Ports exposed to host (VPS MX record points to VPS public IP):
  #   25  — SMTP (inbound from internet / CF Email Routing custom destination)
  #   143 — IMAP (staff clients: Thunderbird, Apple Mail, etc.)
  #   587 — SMTP submission (authenticated outbound from staff clients)
  # Admin UI (internal only, proxied by Caddy as mail.zyntapos.com):
  #   8080 — Stalwart JMAP + admin console
  #
  # Setup checklist (see docs/setup/stalwart-setup.md):
  #   1. Generate STALWART_ADMIN_PASSWORD and STALWART_JMAP_TOKEN secrets
  #   2. Add MX record: zyntapos.com → mail.zyntapos.com (VPS IP)
  #   3. Add SPF, DKIM, DMARC DNS records as shown in admin console
  #   4. Create staff mailboxes via admin console or REST API
  stalwart:
    image: stalwartlabs/stalwart:latest
    container_name: zyntapos_stalwart
    restart: unless-stopped
    ports:
      - "25:25"     # SMTP inbound (public — required for MX delivery)
      - "143:143"   # IMAP (staff access)
      - "587:587"   # SMTP submission (authenticated outbound)
    expose:
      - "8080"      # JMAP/admin (internal — Caddy proxies mail.zyntapos.com)
    environment:
      - STALWART_ADMIN_PASSWORD=${STALWART_ADMIN_PASSWORD}
    volumes:
      - stalwart_data:/opt/stalwart
      - ./stalwart/config/config.toml:/opt/stalwart/etc/config.toml:ro
    networks:
      - zyntapos_net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    mem_limit: 256m
    memswap_limit: 256m
    security_opt:
      - no-new-privileges:true

  # ── Chatwoot — Customer support platform (TODO-008a) ────────────────────────
  # Shared inbox for support@, billing@, bugs@ — HELPDESK agents reply here.
  # CF Email Worker creates conversations via Chatwoot REST API.
  # Admin panel links to support.zyntapos.com for the support inbox view.
  #
  # Requires:
  #   CHATWOOT_SECRET       — Rails SECRET_KEY_BASE (min 64 chars random hex)
  #   CHATWOOT_DB_PASS      — PostgreSQL password for zyntapos_chatwoot DB
  #   CHATWOOT_SMTP_PASS    — Stalwart app password for Chatwoot outbound email
  #
  # After first deploy:
  #   1. Visit https://support.zyntapos.com → create superadmin account
  #   2. Create inbox "Support" (email type) linked to support@zyntapos.com
  #   3. Set CHATWOOT_API_TOKEN and CHATWOOT_ACCOUNT_ID in VPS .env
  chatwoot-web:
    image: chatwoot/chatwoot:latest
    container_name: zyntapos_chatwoot_web
    restart: unless-stopped
    command: ["bundle", "exec", "rails", "s", "-p", "3000", "-b", "0.0.0.0"]
    expose:
      - "3000"
    environment:
      - SECRET_KEY_BASE=${CHATWOOT_SECRET}
      - DATABASE_URL=postgresql://zyntapos:${CHATWOOT_DB_PASS}@postgres:5432/zyntapos_chatwoot
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - FRONTEND_URL=https://support.zyntapos.com
      - MAILER_SENDER_EMAIL=support@zyntapos.com
      - SMTP_ADDRESS=stalwart
      - SMTP_PORT=587
      - SMTP_USERNAME=support@zyntapos.com
      - SMTP_PASSWORD=${CHATWOOT_SMTP_PASS}
      - SMTP_AUTHENTICATION=plain
      - SMTP_ENABLE_STARTTLS_AUTO=true
      - ACTIVE_STORAGE_SERVICE=local
      - RAILS_ENV=production
      - NODE_ENV=production
    volumes:
      - chatwoot_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      stalwart:
        condition: service_healthy
    networks:
      - zyntapos_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/auth/sign_in"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    mem_limit: 1g
    memswap_limit: 1g
    security_opt:
      - no-new-privileges:true

  chatwoot-sidekiq:
    image: chatwoot/chatwoot:latest
    container_name: zyntapos_chatwoot_sidekiq
    restart: unless-stopped
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]
    environment:
      - SECRET_KEY_BASE=${CHATWOOT_SECRET}
      - DATABASE_URL=postgresql://zyntapos:${CHATWOOT_DB_PASS}@postgres:5432/zyntapos_chatwoot
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - FRONTEND_URL=https://support.zyntapos.com
      - MAILER_SENDER_EMAIL=support@zyntapos.com
      - SMTP_ADDRESS=stalwart
      - SMTP_PORT=587
      - SMTP_USERNAME=support@zyntapos.com
      - SMTP_PASSWORD=${CHATWOOT_SMTP_PASS}
      - SMTP_AUTHENTICATION=plain
      - SMTP_ENABLE_STARTTLS_AUTO=true
      - ACTIVE_STORAGE_SERVICE=local
      - RAILS_ENV=production
      - NODE_ENV=production
    volumes:
      - chatwoot_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - zyntapos_net
    mem_limit: 512m
    memswap_limit: 512m
    security_opt:
      - no-new-privileges:true

  # ── Cloudflared — Cloudflare Tunnel for panel.zyntapos.com ──────────
  # Exposes the admin panel and status page via Cloudflare Tunnel without
  # opening inbound ports. Protected by Cloudflare Access (Zero Trust).
  #
  # Setup:
  #   1. Create tunnel in Cloudflare Zero Trust dashboard
  #   2. Set CLOUDFLARE_TUNNEL_TOKEN in .env on VPS
  #   3. Configure public hostnames in Cloudflare dashboard (Route tunnel step)
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: zyntapos_cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    profiles:
      - tunnel
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - zyntapos_net
    mem_limit: 128m
    memswap_limit: 128m
    security_opt:
      - no-new-privileges:true
    depends_on:
      - uptime-kuma

# ── Volumes ──────────────────────────────────────────────────────────
# Secret files are bind-mounted directly via volumes: sections above.
# Store secret files at ./secrets/ on the VPS host (git-ignored).
volumes:
  pgdata:
  redisdata:
  caddy_data:
  caddy_config:
  uptime_kuma_data:
  stalwart_data:       # Stalwart mail server data + DKIM keys (TODO-008a)
  chatwoot_storage:    # Chatwoot file attachments (TODO-008a)

# ── Networks ─────────────────────────────────────────────────────────
networks:
  zyntapos_net:
    driver: bridge
